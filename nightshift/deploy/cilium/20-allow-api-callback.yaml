# nightshift worker — API callback egress.
#
# The worker calls back to nightshift-api on its inner-surface RPCs
# (PostWorkerEvent, GetRunCancellation, CompleteRun, FailRun). gRPC is
# served on 50051; HTTP/grpc-gateway on 8080. Egress allowed only to
# pods labeled `app.kubernetes.io/component: nightshift-api` in the
# same namespace.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: nightshift-worker-allow-api-callback
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: nightshift
      app.kubernetes.io/component: worker
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: nightshift
            app.kubernetes.io/component: nightshift-api
      toPorts:
        - ports:
            - port: "50051"
              protocol: TCP
            - port: "8080"
              protocol: TCP
