# nightshift worker — DNS egress.
#
# The worker resolves the nightshift-api Service name; without DNS the
# default-deny CNP would block hostname resolution. Egress allowed only
# to kube-dns on port 53; the L7 DNS proxy logs every query for audit.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: nightshift-worker-allow-dns
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: nightshift
      app.kubernetes.io/component: worker
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
