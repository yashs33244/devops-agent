# nightshift worker — TCP connect audit.
#
# Audits non-loopback `tcp_connect` from worker pods. Cilium's
# default-deny CNP already blocks unauthorized destinations at the
# packet level; this policy provides the syscall-level audit trail
# (pid, container, full destination) for forensics and intrusion
# detection. Loopback excluded to keep the signal high.
#
# Service CIDR is intentionally not excluded: legitimate destinations
# (kube-dns, nightshift-api) are governed by Cilium and Hubble can
# filter by destination pod label downstream. Hardcoding a service
# CIDR here would break operators on non-default clusters.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: nightshift-worker-network-audit
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nightshift
      app.kubernetes.io/component: worker
  kprobes:
    - call: "tcp_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
      selectors:
        - matchArgs:
            - index: 0
              operator: "NotDAddr"
              values:
                - "127.0.0.1"
          matchActions:
            - action: Post
