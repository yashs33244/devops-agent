# Helm values for grafana/promtail
# Install: helm upgrade --install promtail grafana/promtail \
#   -n monitoring -f values-promtail.yaml

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

config:
  clients:
    - url: http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/push

  snippets:
    # Add chicklet label to default kubernetes-pods scrape
    extraRelabelConfigs:
      - source_labels: ['__meta_kubernetes_pod_label_chicklet']
        target_label: chicklet

    # Scrape host systemd journal (captures chicklet-api, k3s, kernel logs)
    extraScrapeConfigs: |
      - job_name: journal
        journal:
          max_age: 12h
          path: /var/log/journal
          labels:
            job: systemd-journal
        relabel_configs:
          - source_labels: ['__journal__systemd_unit']
            target_label: unit
          - source_labels: ['__journal__hostname']
            target_label: hostname
          - source_labels: ['__journal_priority_keyword']
            target_label: level

# Mount host journal for systemd log scraping
extraVolumes:
  - name: journal
    hostPath:
      path: /var/log/journal
  - name: machine-id
    hostPath:
      path: /etc/machine-id

extraVolumeMounts:
  - name: journal
    mountPath: /var/log/journal
    readOnly: true
  - name: machine-id
    mountPath: /etc/machine-id
    readOnly: true
