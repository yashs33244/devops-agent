apiVersion: v1
kind: ConfigMap
metadata:
  name: chicklet-cluster-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  chicklet-cluster-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Active Chicklets",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_pod_info{pod=~\"cl-.*\"})",
              "legendFormat": "Active"
            }
          ]
        },
        {
          "title": "CPU Usage by Chicklet",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "rate(host_cpu_seconds_total{mode!=\"idle\", pod=~\"cl-.*\"}[5m])",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Memory Usage by Chicklet",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "host_memory_total_bytes{pod=~\"cl-.*\"} - host_memory_available_bytes{pod=~\"cl-.*\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Disk Usage by Chicklet",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "host_filesystem_used_bytes{pod=~\"cl-.*\", mountpoint=\"/\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Network Traffic by Chicklet",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "rate(host_network_receive_bytes_total{pod=~\"cl-.*\"}[5m])",
              "legendFormat": "{{pod}} rx"
            },
            {
              "expr": "rate(host_network_transmit_bytes_total{pod=~\"cl-.*\"}[5m])",
              "legendFormat": "{{pod}} tx"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["chicklet", "cluster"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Chicklet Cluster Overview",
      "uid": "chicklet-cluster-overview"
    }
