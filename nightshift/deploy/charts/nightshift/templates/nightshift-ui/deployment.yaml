{{- /* nightshift-ui as a Deployment — rendered only when shared
       Postgres is configured. better-auth state (user, session,
       account, verification) lives in Postgres so pods are stateless
       and can scale horizontally. For sqlite mode, see
       statefulset.yaml. The Service for both modes lives in
       service.yaml. */ -}}
{{- if and .Values.ui.enabled .Values.postgres.enabled }}
{{- $name := include "nightshift.fullname" (dict "Release" .Release "component" "nightshift-ui") }}
{{- $apiSvc := include "nightshift.fullname" (dict "Release" .Release "component" "nightshift-api") }}
{{- $apiURL := printf "http://%s.%s.svc:8080" $apiSvc .Release.Namespace }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: nightshift-ui
  annotations:
    # Argo CD: apply after the openbao bootstrap chain (waves 5/10/15)
    # and the schema-migrate Jobs (wave 18). See nightshift-api
    # deployment.yaml for the full rationale on the sync-wave layout.
    "argocd.argoproj.io/sync-wave": "20"
spec:
  replicas: {{ .Values.ui.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "nightshift.selectorLabels" (dict "Release" .Release "component" "nightshift-ui") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nightshift.labels" . | nindent 8 }}
        app.kubernetes.io/component: nightshift-ui
    spec:
      serviceAccountName: {{ $name }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- if .Values.openbao.enabled }}
      # Init container polls for the OIDC ui-client Secret to be
      # populated by the openbao-oidc-bootstrap Job before letting
      # the app start. Identical to the StatefulSet path.
      initContainers:
        - name: wait-oidc
          image: curlimages/curl:8.8.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              API="https://kubernetes.default.svc"
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              SEC="{{ include "nightshift.openbaoOidcUiClientSecret" . }}"
              NS="{{ .Release.Namespace }}"
              echo "[wait-oidc] polling for Secret $NS/$SEC ..."
              i=0
              while true; do
                code=$(curl -sS -o /tmp/resp -w '%{http_code}' \
                  --cacert "$CA" -H "Authorization: Bearer $TOKEN" \
                  "$API/api/v1/namespaces/$NS/secrets/$SEC")
                if [ "$code" = "200" ]; then
                  if grep -q '"client_id"' /tmp/resp && ! grep -q '"client_id":""' /tmp/resp; then
                    echo "[wait-oidc] secret populated"
                    exit 0
                  fi
                fi
                i=$((i+1)); if [ "$i" -gt 300 ]; then
                  echo "[wait-oidc] timed out (last code=$code)"; exit 1
                fi
                sleep 2
              done
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
      {{- end }}
      containers:
        - name: ui
          image: {{ include "nightshift.uiImage" . }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          # No command override — image default CMD is `next start`.
          # Schema migrations are applied by the chart's UI migration
          # Helm Job (templates/ui-migrate/job.yaml), so pods start
          # cleanly without per-pod drizzle-kit invocations.
          ports:
            - containerPort: 3000
              name: http
          env:
            # DATABASE_URL is composed at pod start from the live
            # nightshift-postgres Secret via K8s $(VAR) substitution,
            # so a placeholder password in values.yaml never reaches
            # the rendered DSN. See _helpers.tpl `nightshift.postgresEnv`.
            # (This Deployment only renders when postgres.enabled — the
            # sqlite path is in statefulset.yaml.)
            {{- include "nightshift.postgresEnv" (dict "dsnVar" "DATABASE_URL" "context" .) | nindent 12 }}
            - name: BETTER_AUTH_URL
              value: "{{ include "nightshift.uiPublicURL" . }}"
            - name: BETTER_AUTH_TRUSTED_ORIGINS
              value: "{{ include "nightshift.uiPublicURL" . }}{{- with .Values.ui.trustedOrigins }},{{ join "," . }}{{- end }}"
            - name: NIGHTSHIFT_API_URL
              value: {{ $apiURL | quote }}
            - name: TENANT_ID
              value: {{ .Values.tenant.name | quote }}
            - name: TENANT_NAME
              value: {{ .Values.tenant.name | quote }}
            {{- if .Values.ui.emailPasswordFallback }}
            - name: AUTH_EMAIL_PASSWORD_ENABLED
              value: "true"
            {{- end }}
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}
                  key: BETTER_AUTH_SECRET
            {{- if .Values.openbao.enabled }}
            - name: OIDC_AUTHORIZATION_URL
              value: "{{ include "nightshift.uiPublicURL" . }}/login/openbao"
            - name: OIDC_TOKEN_URL
              value: "{{ include "nightshift.openbaoEndpoint" . }}/v1/identity/oidc/provider/nightshift/token"
            - name: OIDC_USERINFO_URL
              value: "{{ include "nightshift.openbaoEndpoint" . }}/v1/identity/oidc/provider/nightshift/userinfo"
            - name: OPENBAO_INTERNAL_URL
              value: "{{ include "nightshift.openbaoEndpoint" . }}"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "nightshift.openbaoOidcUiClientSecret" . }}
                  key: client_id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "nightshift.openbaoOidcUiClientSecret" . }}
                  key: client_secret
            {{- end }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 30
{{- end }}
