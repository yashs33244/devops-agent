{{- if and .Values.ui.enabled .Values.ui.ingress.enabled }}
{{- $name := include "nightshift.fullname" (dict "Release" .Release "component" "nightshift-ui") }}
{{- /* When clusterIssuer is set, default tls.secretName to <fullname>-tls
       so cert-manager has a deterministic place to write the issued cert. */ -}}
{{- $tlsSecret := .Values.ui.ingress.tls.secretName }}
{{- if and (not $tlsSecret) .Values.ui.ingress.clusterIssuer }}
{{- $tlsSecret = printf "%s-tls" $name }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: nightshift-ui
  {{- if or .Values.ui.ingress.annotations .Values.ui.ingress.clusterIssuer }}
  annotations:
    {{- with .Values.ui.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.ui.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ . | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ui.ingress.className }}
  ingressClassName: {{ .Values.ui.ingress.className | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ui.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: 3000
  {{- if $tlsSecret }}
  tls:
    - hosts:
        - {{ .Values.ui.ingress.host | quote }}
      secretName: {{ $tlsSecret | quote }}
  {{- end }}
{{- end }}
