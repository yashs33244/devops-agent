{{- if .Values.ui.enabled }}
{{- $name := include "nightshift.fullname" (dict "Release" .Release "component" "nightshift-ui") }}
{{- /* DATABASE_URL is only written to this Secret when the operator
       supplies an explicit ui.databaseURL (external-Postgres
       override). For bundled Postgres, the UI Deployment + ui-migrate
       Job compose DATABASE_URL at pod start from the live
       nightshift-postgres Secret — see _helpers.tpl
       `nightshift.postgresEnv`. */ -}}
{{- $dbURL := .Values.ui.databaseURL | default "" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: nightshift-ui
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  # 64-hex-char random string per fresh install. Once landed, helm-
  # upgrade reuses the existing Secret (resource-policy: keep), so
  # signing keys stay stable across upgrades. Operators rotate by
  # deleting this Secret + restarting the UI workload.
  BETTER_AUTH_SECRET: {{ randAlphaNum 64 | quote }}
  {{- if $dbURL }}
  # External-Postgres path: operator-supplied connection string. Pod
  # consumes this via secretKeyRef in deployment.yaml. Bundled-Postgres
  # path doesn't render this key (DSN is composed at pod start from
  # the live nightshift-postgres Secret).
  DATABASE_URL: {{ $dbURL | quote }}
  {{- end }}
{{- end }}
