{{- if .Values.openbao.enabled }}
{{- $name := include "nightshift.openbaoFullname" . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao
spec:
  serviceName: {{ $name }}
  replicas: {{ .Values.openbao.replicas }}
  selector:
    matchLabels:
      {{- include "nightshift.selectorLabels" (dict "Release" .Release "component" "openbao") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nightshift.selectorLabels" (dict "Release" .Release "component" "openbao") | nindent 8 }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/part-of: nightshift
        {{- if .Values.tenant.name }}
        tenant: {{ .Values.tenant.name }}
        {{- end }}
    spec:
      serviceAccountName: openbao
      securityContext:
        # Upstream ghcr.io/openbao/openbao image has the openbao user
        # at uid=100 gid=1000 — fsGroup must be 1000 (the user's
        # primary gid) for the data PVC to be writable on AWS EBS gp3.
        # OnRootMismatch reliably triggers the chown on first mount.
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: openbao
          image: "{{ .Values.openbao.image.repository }}:{{ .Values.openbao.image.tag }}"
          imagePullPolicy: {{ .Values.openbao.image.pullPolicy }}
          args: ["server", "-config=/openbao/config/config.hcl"]
          ports:
            - containerPort: 8200
              name: api
            - containerPort: 8201
              name: cluster
          env:
            - name: BAO_ADDR
              value: "http://127.0.0.1:8200"
          readinessProbe:
            httpGet:
              # standbyok=true tolerates standby nodes; uninitcode=204
              # + sealedcode=204 keep the pod Ready before bootstrap so
              # the post-install init Job can reach it via the Service.
              path: /v1/sys/health?standbyok=true&uninitcode=204&sealedcode=204
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.openbao.resources.api | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /openbao/data
            - name: config
              mountPath: /openbao/config
        {{- if not .Values.openbao.autoUnseal.enabled }}
        - name: unseal
          image: "{{ .Values.openbao.image.repository }}:{{ .Values.openbao.image.tag }}"
          imagePullPolicy: {{ .Values.openbao.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              set -u
              export BAO_ADDR=http://127.0.0.1:8200
              echo "[unseal] waiting for openbao to start..."
              until bao status 2>&1 | grep -q "Seal Type"; do
                sleep 1
              done
              if [ -z "${UNSEAL_KEY:-}" ]; then
                # Fresh install: openbao-init populates the Secret +
                # unseals; this sidecar is idle until pod restart.
                echo "[unseal] unseal key empty — openbao-init will unseal"
              elif bao status 2>&1 | grep -q "Sealed.*true"; then
                echo "[unseal] unsealing openbao..."
                bao operator unseal "$UNSEAL_KEY" >/dev/null
              else
                echo "[unseal] openbao already unsealed"
              fi
              echo "[unseal] sidecar idle"
              sleep infinity
          env:
            - name: UNSEAL_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nightshift.openbaoSeedSecret" . }}
                  key: unseal-key
                  # Tolerate the Secret being absent on first boot —
                  # the post-install init Job creates + populates it
                  # only AFTER OpenBao is up. Without optional, kubelet
                  # would block this pod's startup, deadlocking init.
                  optional: true
          resources:
            {{- toYaml .Values.openbao.resources.unseal | nindent 12 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: openbao-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.openbao.storage.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.openbao.storage.size }}
{{- end }}
