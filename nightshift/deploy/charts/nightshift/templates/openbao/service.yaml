{{- if .Values.openbao.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nightshift.openbaoFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao
spec:
  selector:
    {{- include "nightshift.selectorLabels" (dict "Release" .Release "component" "openbao") | nindent 4 }}
  ports:
    - name: api
      port: 8200
      targetPort: 8200
      protocol: TCP
    - name: cluster
      port: 8201
      targetPort: 8201
      protocol: TCP
{{- end }}
