{{- if and .Values.openbao.enabled .Values.openbao.adminSeed.username }}
{{- /*
  Chart-managed admin seed credentials. The bootstrap Job reads from
  this Secret + creates the corresponding userpass user + adds them to
  the admin group (which carries the nightshift-admin policy). When
  the operator doesn't supply a password in values, the chart
  generates a random 24-char one on first install — `resource-policy:
  keep` makes upgrades non-destructive (the password survives helm
  upgrade so existing logins keep working).

  To rotate: delete this Secret + re-run the bootstrap Job. To
  retrieve the chart-generated password:
    kubectl -n <ns> get secret openbao-admin-seed \
      -o jsonpath='{.data.password}' | base64 -d
*/}}
{{- $name := include "nightshift.openbaoAdminSeedSecret" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $password := .Values.openbao.adminSeed.password }}
{{- if and (not $password) $existing }}
  {{- $password = index $existing.data "password" | b64dec }}
{{- else if not $password }}
  {{- $password = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao-bootstrap
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  username: {{ .Values.openbao.adminSeed.username | quote }}
  password: {{ $password | quote }}
{{- end }}
