{{- if .Values.postgres.enabled }}
{{- if not .Values.postgres.password }}
{{- fail "postgres.password is required when postgres.enabled. Provide via --set-file postgres.password=<file> with a random secret." }}
{{- end }}
{{- $name := include "nightshift.postgresFullname" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | trim | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
{{- end }}
