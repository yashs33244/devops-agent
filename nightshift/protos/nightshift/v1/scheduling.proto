// Nightshift Scheduling interface — cron-triggered runs.
//
// Scheduling is a thin domain service built on Workers. A `Schedule`
// carries the inputs for a recurring run — prompt, cron expression,
// IANA timezone, optional session continuation, and the resource
// bindings (agents, skills, connectors) the fire should resolve under
// the owning user's Config. When the schedule fires, the implementation
// issues a `CreateRun(invoker_type = SCHEDULE, invoker_id = <schedule>,
// user_id = <owning user>)` against the Workers service. Nothing else
// is specified about the firing mechanism: Kubernetes CronJobs,
// in-process timers, and external cron daemons are all conforming
// implementations.
//
// The service holds no credentials. Per-run OAuth + static tokens are
// resolved at fire time through Config's `GetUserConfig` (which in turn
// calls Secrets' dispenser). This keeps Scheduling narrowly scoped:
// it plans *when* runs happen, not *what credentials* they carry.
//
// Persisted state lives in Storage — one `Record` per Schedule in the
// `schedules` collection. The spec does NOT specify the cron runtime;
// implementations are free to use Kubernetes CronJobs, systemd timers,
// or a built-in goroutine scheduler. Whatever they choose, they MUST
// reconcile it against the `schedules` collection at startup (see
// `scheduling.md` §7).
syntax = "proto3";

package nightshift.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/nightshiftco/nightshift/gen/go/nightshift/v1;nightshiftv1";

// -----------------------------------------------------------------------------
// Entities
// -----------------------------------------------------------------------------

// Schedule is the declarative record of a recurring run.
message Schedule {
  // Server-assigned identifier.
  string id = 1;

  // Owning user. Fires are issued with `invoker_type = SCHEDULE`,
  // `invoker_id = <schedule id>`, `user_id = <this field>` — the
  // owning user's Config (agents, skills, connector tokens) is what
  // the fire runs under.
  string user_id = 2;

  // Task instruction. Sent verbatim to the agent on every fire.
  string prompt = 3;

  // 5-field cron expression ("minute hour day-of-month month
  // day-of-week"). The spec standardizes on 5-field POSIX cron;
  // implementations MAY accept extensions (6-field with seconds,
  // predefined aliases like `@hourly`) as a best-effort convenience,
  // but `cron` round-trips through Update / Get without normalization.
  string cron = 4;

  // IANA Time Zone Database identifier (for example "UTC",
  // "America/New_York", "Asia/Tokyo"). The cron expression is
  // interpreted in this zone. Defaults to "UTC" when empty.
  string timezone = 5;

  // When false, the implementation MUST NOT fire the schedule. On
  // transition to false the implementation SHOULD suspend its cron
  // runtime (for example set `suspend: true` on a Kubernetes CronJob)
  // rather than deleting it, so re-enabling is cheap.
  bool enabled = 6;

  // Optional Workers session_id. When non-empty every fire of this
  // schedule reuses the same Nightshift session, so the agent sees
  // each fire as a continuation of a single multi-turn conversation.
  // Empty means every fire starts a fresh session.
  string session_id = 7;

  // Agent definitions (by Config.Agent id) to load on every fire.
  // The schedule stores ids only; Config resolves them into
  // AgentDefinitions at run start.
  repeated string agent_ids = 8;

  // Skill definitions (by Config.Skill id) to load on every fire.
  repeated string skill_ids = 9;

  // Connectors (by Config.Connector id) to authenticate on every
  // fire. At fire time, Secrets dispenses the owning user's tokens
  // for these connectors.
  repeated string connector_ids = 10;

  // Time the schedule was first created.
  google.protobuf.Timestamp created_at = 11;

  // Time the schedule was most recently updated.
  google.protobuf.Timestamp updated_at = 12;
}

// -----------------------------------------------------------------------------
// RPCs
// -----------------------------------------------------------------------------

// CreateScheduleRequest is the request message for CreateSchedule.
message CreateScheduleRequest {
  // Owning user. Implementations typically derive this from the
  // caller's auth principal; callers MAY set it explicitly when the
  // control plane is creating schedules on another user's behalf.
  string user_id = 1;

  // Task instruction.
  string prompt = 2;

  // 5-field cron expression.
  string cron = 3;

  // IANA timezone. Empty means "UTC".
  string timezone = 4;

  // Whether the schedule should fire immediately. Defaults to true
  // when unset; pass `enabled: false` explicitly to create a paused
  // schedule.
  optional bool enabled = 5;

  // Optional session_id — if set, every fire continues the same
  // session.
  string session_id = 6;

  // Resource bindings.
  repeated string agent_ids = 7;
  repeated string skill_ids = 8;
  repeated string connector_ids = 9;

  // Optional idempotency key.
  string idempotency_key = 10;
}

// CreateScheduleResponse is the response message for CreateSchedule.
message CreateScheduleResponse {
  // The newly created schedule.
  Schedule schedule = 1;
}

// GetScheduleRequest is the request message for GetSchedule.
message GetScheduleRequest {
  // Target schedule identifier.
  string schedule_id = 1;
}

// GetScheduleResponse is the response message for GetSchedule.
message GetScheduleResponse {
  // The requested schedule.
  Schedule schedule = 1;
}

// ListSchedulesRequest is the request message for ListSchedules.
message ListSchedulesRequest {
  // Optional owner filter. Implementations typically require a
  // non-admin caller to set this to their own user id.
  string user_id = 1;

  // Optional enabled filter. When unset, both enabled and disabled
  // schedules are returned.
  optional bool enabled = 2;

  // Maximum number of schedules to return.
  int32 page_size = 3;

  // Opaque pagination token.
  string page_token = 4;
}

// ListSchedulesResponse is the response message for ListSchedules.
message ListSchedulesResponse {
  // Matching schedules on this page.
  repeated Schedule schedules = 1;

  // Opaque pagination token. Empty when there are no further
  // results.
  string next_page_token = 2;
}

// UpdateScheduleRequest is the request message for UpdateSchedule.
// Any field left unset is preserved.
message UpdateScheduleRequest {
  // Target schedule identifier.
  string schedule_id = 1;

  // Optional replacement prompt.
  optional string prompt = 2;

  // Optional replacement cron expression. Implementations MUST
  // re-register the cron runtime when this field changes.
  optional string cron = 3;

  // Optional replacement IANA timezone. Implementations MUST
  // re-register the cron runtime when this field changes.
  optional string timezone = 4;

  // Optional replacement enabled flag. On a true -> false transition
  // the cron runtime is suspended; on false -> true it is resumed.
  optional bool enabled = 5;

  // Optional replacement session_id. An empty explicit string is a
  // distinct value from "leave unchanged"; use `set_session_id` to
  // disambiguate.
  string session_id = 6;

  // Whether `session_id` is being set (true) or left alone (false).
  bool set_session_id = 7;

  // Optional replacement resource bindings. Sent in full; partial
  // merges are not supported. Paired with `set_*` flags so clearing
  // a binding is distinguishable from leaving it alone.
  repeated string agent_ids = 8;
  bool set_agent_ids = 9;
  repeated string skill_ids = 10;
  bool set_skill_ids = 11;
  repeated string connector_ids = 12;
  bool set_connector_ids = 13;
}

// UpdateScheduleResponse is the response message for UpdateSchedule.
message UpdateScheduleResponse {
  // The schedule after the update.
  Schedule schedule = 1;
}

// DeleteScheduleRequest is the request message for DeleteSchedule.
//
// Deleting a schedule removes the metadata record and cancels its
// cron runtime registration. Runs already fired by this schedule are
// NOT affected; they remain in the `runs` collection with
// `invoker_type = SCHEDULE`, `invoker_id = <deleted schedule id>`.
message DeleteScheduleRequest {
  // Target schedule identifier.
  string schedule_id = 1;
}

// DeleteScheduleResponse is the response message for DeleteSchedule.
// It is intentionally empty.
message DeleteScheduleResponse {}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

// Scheduling is the Nightshift scheduling interface. It exposes CRUD
// on `Schedule` records; each mutation is reflected into the
// implementation's cron runtime (Kubernetes CronJob, in-process
// timer, systemd timer, etc.) so fires map to `CreateRun` calls on
// Workers.
service Scheduling {
  // CreateSchedule registers a new recurring run and registers its
  // cron runtime entry.
  //
  // The additional /v1/internal/schedules binding mirrors cr0n-a's
  // worker-facing route shape so the chunk-14 Python worker's
  // create_schedule MCP tool reuses cr0n's tool implementation
  // (modulo the body-shape remap from chunk 17).
  rpc CreateSchedule(CreateScheduleRequest) returns (CreateScheduleResponse) {
    option (google.api.http) = {
      post: "/v1/schedules"
      body: "*"
      additional_bindings {
        post: "/v1/internal/schedules"
        body: "*"
      }
    };
  }

  // GetSchedule reads a schedule by id.
  rpc GetSchedule(GetScheduleRequest) returns (GetScheduleResponse) {
    option (google.api.http) = {
      get: "/v1/schedules/{schedule_id}"
    };
  }

  // ListSchedules returns schedules visible to the caller.
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse) {
    option (google.api.http) = {
      get: "/v1/schedules"
    };
  }

  // UpdateSchedule modifies a schedule. Changes to `cron`,
  // `timezone`, or `enabled` MUST be reflected into the cron runtime
  // before the RPC returns.
  rpc UpdateSchedule(UpdateScheduleRequest) returns (UpdateScheduleResponse) {
    option (google.api.http) = {
      patch: "/v1/schedules/{schedule_id}"
      body: "*"
    };
  }

  // DeleteSchedule removes the schedule and its cron runtime entry.
  rpc DeleteSchedule(DeleteScheduleRequest) returns (DeleteScheduleResponse) {
    option (google.api.http) = {
      delete: "/v1/schedules/{schedule_id}"
    };
  }
}
