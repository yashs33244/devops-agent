name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-build-test:
    name: lint + build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.1

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          version: 1.69.0

      - name: buf lint
        run: buf lint

      - name: buf generate drift check
        run: |
          buf generate
          if ! git diff --exit-code -- gen/; then
            echo "::error::buf generate produced a diff. Run 'make proto' and commit the result."
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race ./...

  records-postgres-integration:
    name: records postgres integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: postgres compliance suite
        run: go test -race -tags=integration ./internal/records/...

  docker-helm:
    name: docker + helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: build nightshift-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/nightshift-api/Dockerfile
          push: false

      - name: build nightshift-worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/nightshift-worker/Dockerfile
          push: false

      - name: build nightshift-worker-claude image
        uses: docker/build-push-action@v6
        with:
          context: cmd/nightshift-worker-claude
          file: cmd/nightshift-worker-claude/Dockerfile
          push: false

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: helm lint
        run: |
          helm lint deploy/charts/nightshift \
            --set tenant.name=ci \
            --set nightshift_api.workerHmac=0123456789abcdef0123456789abcdef \
            --set nightshift_api.objectsHmac=fedcba9876543210fedcba9876543210

      - name: helm template (default)
        run: |
          helm template ci deploy/charts/nightshift \
            --set tenant.name=ci \
            --set nightshift_api.workerHmac=0123456789abcdef0123456789abcdef \
            --set nightshift_api.objectsHmac=fedcba9876543210fedcba9876543210 \
            > /dev/null

      - name: helm template (cilium + tetragon enabled)
        run: |
          helm template ci deploy/charts/nightshift \
            --set tenant.name=ci \
            --set nightshift_api.workerHmac=0123456789abcdef0123456789abcdef \
            --set nightshift_api.objectsHmac=fedcba9876543210fedcba9876543210 \
            --set cilium.enabled=true \
            --set tetragon.enabled=true \
            > /dev/null

      - name: helm template (s3 backend + bundled MinIO)
        run: |
          helm template ci deploy/charts/nightshift \
            --set tenant.name=ci \
            --set nightshift_api.workerHmac=0123456789abcdef0123456789abcdef \
            --set nightshift_api.objectsBackend=s3 \
            --set minio.enabled=true \
            --set minio.rootPassword=ci-minio-password \
            --set cilium.enabled=true \
            --set tetragon.enabled=true \
            > /dev/null

      - name: helm template (openbao OIDC enabled)
        run: |
          helm template ci deploy/charts/nightshift \
            --set tenant.name=ci \
            --set nightshift_api.workerHmac=0123456789abcdef0123456789abcdef \
            --set nightshift_api.objectsHmac=fedcba9876543210fedcba9876543210 \
            --set openbao.enabled=true \
            --set openbao.adminSeed.username=admin \
            --set openbao.adminSeed.password=ci-admin-password \
            > /dev/null

      - name: helm template (postgres records backend + UI)
        run: |
          helm template ci deploy/charts/nightshift \
            --set tenant.name=ci \
            --set nightshift_api.workerHmac=0123456789abcdef0123456789abcdef \
            --set nightshift_api.objectsHmac=fedcba9876543210fedcba9876543210 \
            --set nightshift_api.recordsBackend=postgres \
            --set nightshift_api.replicas=2 \
            --set postgres.enabled=true \
            --set postgres.password=ci-postgres-password \
            --set ui.enabled=true \
            --set ui.replicas=2 \
            --set ui.publicURL=http://localhost:13000 \
            > /dev/null

      - name: helm template (workerClaude enabled)
        run: |
          helm template ci deploy/charts/nightshift \
            --set tenant.name=ci \
            --set nightshift_api.workerHmac=0123456789abcdef0123456789abcdef \
            --set nightshift_api.objectsHmac=fedcba9876543210fedcba9876543210 \
            --set openbao.enabled=true \
            --set openbao.adminSeed.username=admin \
            --set openbao.adminSeed.password=ci-admin-password \
            --set nightshift_api.worker.repository=nightshift-worker-claude \
            --set nightshift_api.workerClaude.enabled=true \
            > /dev/null

      - name: helm template (EKS-flavored — UI ingress + cert-manager)
        run: |
          helm template ci deploy/charts/nightshift \
            --set tenant.name=eks \
            --set nightshift_api.workerHmac=0123456789abcdef0123456789abcdef \
            --set nightshift_api.objectsHmac=fedcba9876543210fedcba9876543210 \
            --set nightshift_api.recordsBackend=postgres \
            --set nightshift_api.replicas=2 \
            --set postgres.enabled=true \
            --set postgres.password=ci-postgres-password \
            --set minio.enabled=true \
            --set minio.rootPassword=ci-minio-password \
            --set openbao.enabled=true \
            --set openbao.adminSeed.username=admin \
            --set openbao.adminSeed.password=ci-admin-password \
            --set ui.enabled=true \
            --set ui.replicas=2 \
            --set ui.publicURL=https://nightshift.ns-apps.com \
            --set ui.ingress.enabled=true \
            --set ui.ingress.className=nginx \
            --set ui.ingress.host=nightshift.ns-apps.com \
            --set ui.ingress.clusterIssuer=letsencrypt-prod \
            > /dev/null

  ui:
    name: ui typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/nightshift-ui
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.30

      - name: install
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bunx tsc --noEmit

      - name: build
        env:
          BETTER_AUTH_SECRET: build-placeholder-not-for-runtime
          BETTER_AUTH_URL: http://localhost:3000
          NIGHTSHIFT_API_URL: http://placeholder:8080
          TENANT_ID: build
          TENANT_NAME: build
          OPENBAO_INTERNAL_URL: http://placeholder:8200
          DATABASE_URL: ":memory:"
        run: bunx next build
