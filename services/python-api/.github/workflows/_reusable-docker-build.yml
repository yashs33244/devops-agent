---
# Reusable workflow: Docker build + push with BuildKit cache, SBOM, and provenance
# Call from another workflow via `uses: ./.github/workflows/_reusable-docker-build.yml`
name: Reusable — Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Image name (e.g. myorg/myapp)"
        type: string
        required: true
      registry:
        description: "Container registry host (e.g. ghcr.io, 123456789.dkr.ecr.us-east-1.amazonaws.com)"
        type: string
        required: true
      dockerfile_path:
        description: "Path to the Dockerfile relative to repo root"
        type: string
        required: false
        default: "Dockerfile"
      push:
        description: "Whether to push the built image to the registry"
        type: boolean
        required: false
        default: true
    outputs:
      image_digest:
        description: "SHA-256 digest of the pushed image"
        value: ${{ jobs.build-push.outputs.digest }}
      image_full_tag:
        description: "Full image reference including SHA tag"
        value: ${{ jobs.build-push.outputs.full_tag }}

jobs:
  build-push:
    name: Build and push Docker image
    runs-on: ubuntu-24.04

    permissions:
      contents: read        # checkout
      id-token: write       # OIDC token for registry auth
      packages: write       # push to GHCR

    outputs:
      digest: ${{ steps.build.outputs.digest }}
      full_tag: ${{ inputs.registry }}/${{ inputs.image_name }}:${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf  # v3.2.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349  # v3.7.1
        with:
          driver-opts: |
            network=host

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81  # v5.5.1
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=ref,event=branch
            type=ref,event=pr

      - name: Log in to container registry (OIDC — no stored credentials)
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ${{ inputs.registry }}
          # For GHCR use github.actor / github.token.
          # For ECR/ACR/GAR the preceding cloud-auth step provides credentials via OIDC.
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75  # v6.9.0
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: true          # generates SLSA provenance attestation
          sbom: true                # generates SPDX SBOM attestation
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image digest as summary
        if: inputs.push == true
        run: |
          echo "## Docker Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`${{ inputs.registry }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ inputs.image_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Git SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
