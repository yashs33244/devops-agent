---
# Main CI pipeline — lint/test, security scan, Docker build
# Template variables: {{REGISTRY}}, {{IMAGE_NAME}}, GCP
name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch/PR to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# No workflow-level permissions — each job declares its own minimum set

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ── Language detection ───────────────────────────────────────────────────

      - name: Detect project language
        id: lang
        run: |
          if [ -f "package.json" ]; then
            echo "lang=node" >> "$GITHUB_OUTPUT"
          elif [ -f "pyproject.toml" ] || [ -f "setup.py" ] || [ -f "requirements.txt" ]; then
            echo "lang=python" >> "$GITHUB_OUTPUT"
          elif [ -f "go.mod" ]; then
            echo "lang=go" >> "$GITHUB_OUTPUT"
          elif [ -f "pom.xml" ]; then
            echo "lang=java-maven" >> "$GITHUB_OUTPUT"
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            echo "lang=java-gradle" >> "$GITHUB_OUTPUT"
          else
            echo "lang=unknown" >> "$GITHUB_OUTPUT"
          fi

      # ── Node ─────────────────────────────────────────────────────────────────

      - name: Setup Node.js
        if: steps.lang.outputs.lang == 'node'
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Node — install dependencies
        if: steps.lang.outputs.lang == 'node'
        run: npm ci

      - name: Node — lint
        if: steps.lang.outputs.lang == 'node'
        run: npm run lint

      - name: Node — test
        if: steps.lang.outputs.lang == 'node'
        run: npm test

      # ── Python ───────────────────────────────────────────────────────────────

      - name: Setup Python
        if: steps.lang.outputs.lang == 'python'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        if: steps.lang.outputs.lang == 'python'
        uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a  # v4.2.0

      - name: Python — install dependencies
        if: steps.lang.outputs.lang == 'python'
        run: uv pip install --system -e ".[dev]"

      - name: Python — lint (ruff)
        if: steps.lang.outputs.lang == 'python'
        run: ruff check .

      - name: Python — test (pytest)
        if: steps.lang.outputs.lang == 'python'
        run: pytest --tb=short -q

      # ── Go ───────────────────────────────────────────────────────────────────

      - name: Setup Go
        if: steps.lang.outputs.lang == 'go'
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.1.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Go — vet
        if: steps.lang.outputs.lang == 'go'
        run: go vet ./...

      - name: Go — test (with race detector)
        if: steps.lang.outputs.lang == 'go'
        run: go test ./... -race -count=1

      # ── Java (Maven) ─────────────────────────────────────────────────────────

      - name: Setup JDK
        if: steps.lang.outputs.lang == 'java-maven' || steps.lang.outputs.lang == 'java-gradle'
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b  # v4.6.0
        with:
          distribution: "temurin"
          java-version-file: ".java-version"
          cache: ${{ steps.lang.outputs.lang == 'java-maven' && 'maven' || 'gradle' }}

      - name: Java — Maven test
        if: steps.lang.outputs.lang == 'java-maven'
        run: mvn --batch-mode --no-transfer-progress test

      - name: Java — Gradle test
        if: steps.lang.outputs.lang == 'java-gradle'
        run: ./gradlew test --no-daemon

      - name: Unknown language — warn
        if: steps.lang.outputs.lang == 'unknown'
        run: |
          echo "::warning::Could not detect project language. Add a package.json, pyproject.toml, go.mod, pom.xml, or build.gradle."

  # ── Security Scan ────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-24.04
    needs: lint-test

    permissions:
      contents: read
      security-events: write   # upload SARIF to GitHub Security tab

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@18f2505d82c4d5ad3de67cefab9de8e87a5a1f7b  # v0.29.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@dd746615b3b9d728a6a37ca2045b68ca76d4841f  # v3.27.9
        with:
          sarif_file: "trivy-results.sarif"

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    needs: lint-test
    uses: ./.github/workflows/_reusable-docker-build.yml

    permissions:
      contents: read
      id-token: write
      packages: write

    with:
      image_name: "{{IMAGE_NAME}}"
      registry: "{{REGISTRY}}"
      dockerfile_path: "Dockerfile"
      push: ${{ github.ref == 'refs/heads/main' }}
