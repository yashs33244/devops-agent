# K8s Deployment — managed by KEDA (do not set replicas manually)
# KEDA HTTPScaledObject will control replica count (0 to 10)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api
  namespace: default
  annotations:
    scaledobject.keda.sh/name: go-api-http-scaler
spec:
  replicas: 1  # KEDA will override this; start with 1 so rollout works
  selector:
    matchLabels:
      app: go-api
  template:
    metadata:
      labels:
        app: go-api
    spec:
      containers:
        - name: go-api
          image: REPLACE_WITH_YOUR_IMAGE
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
