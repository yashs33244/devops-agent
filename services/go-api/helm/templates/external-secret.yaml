{{- if .Values.externalSecrets.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "chart.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    # Indicates which cloud backend is being used — set by helm_gen.py
    devops-agent/cloud-backend: {{ .Values.externalSecrets.cloudBackend | default "aws" | quote }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName | default "cluster-secret-store" }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "chart.secretName" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
  data:
    {{- if include "chart.hasSecrets" . }}
    {{- range $key, $description := .Values.secrets }}
    - secretKey: {{ $key }}
      remoteRef:
        {{- if eq ($.Values.externalSecrets.cloudBackend | default "aws") "aws" }}
        # AWS Secrets Manager
        key: {{ $.Values.externalSecrets.secretPathPrefix | default "" }}{{ include "chart.fullname" $ }}
        property: {{ $key }}
        {{- else if eq $.Values.externalSecrets.cloudBackend "azure" }}
        # Azure Key Vault
        key: {{ include "chart.fullname" $ }}-{{ $key | replace "_" "-" | lower }}
        {{- else if eq $.Values.externalSecrets.cloudBackend "gcp" }}
        # GCP Secret Manager
        key: {{ $.Values.externalSecrets.secretPathPrefix | default "" }}{{ include "chart.fullname" $ }}-{{ $key | lower }}
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
