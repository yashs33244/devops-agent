# Test: Extract information embedded inside Confluence macros
# The page uses code blocks (ac:structured-macro name="code"), warning panels,
# info panels, status lozenges, and task lists in Confluence storage format.
# This tests whether Holmes can extract specific values from macro content.
#
# Requirements:
#   CONFLUENCE_SA_USER, CONFLUENCE_SA_API_KEY, CONFLUENCE_SA_BASE_URL

user_prompt: |
  In the Confluence space 'HLMS226', find the page titled 'Service Recovery Procedures'.
  Tell me: (1) the build hash referenced in the rollback script, (2) the critical
  memory threshold percentage from the warning, and (3) the current status of the
  Payment Gateway.

expected_output:
  - "Must report the rollback build hash: a8f3e2d1b9c7"
  - "Must report the critical memory threshold: 87.5%"
  - "Must report the Payment Gateway status: DEGRADED"

tags:
  - confluence
  - question-answer
  - medium

before_test: |
  set -e

  SPACE_KEY="HLMS226"
  SPACE_NAME="Holmes Eval 226"
  PAGE_TITLE="Service Recovery Procedures"

  echo "Creating Confluence space ${SPACE_KEY}..."
  RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/space" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"key\": \"${SPACE_KEY}\",
      \"name\": \"${SPACE_NAME}\",
      \"description\": {
        \"plain\": {
          \"value\": \"Test space for Holmes eval 226\",
          \"representation\": \"plain\"
        }
      }
    }")

  HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
  BODY=$(echo "$RESPONSE" | sed '$d')

  if [ "$HTTP_CODE" -eq 200 ]; then
    echo "Space created."
  elif echo "$BODY" | grep -q "already exists"; then
    echo "Space already exists, verifying it is accessible..."
    SPACE_CHECK=$(curl -L -s -w "\n%{http_code}" \
      "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/space/${SPACE_KEY}" \
      -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")
    SPACE_CHECK_HTTP=$(echo "$SPACE_CHECK" | tail -n1)
    if [ "$SPACE_CHECK_HTTP" -ne 200 ]; then
      echo "Space key '${SPACE_KEY}' is reserved but not accessible (HTTP ${SPACE_CHECK_HTTP}). It may be in the Confluence trash — purge it manually or wait for the trash retention period to expire."
      exit 1
    fi
    echo "Space is accessible, reusing."
  else
    echo "Failed to create space. HTTP ${HTTP_CODE}: ${BODY}"
    exit 1
  fi
  sleep 2

  # Page body uses Confluence storage format with macros:
  # - ac:structured-macro name="status" (status lozenges)
  # - ac:structured-macro name="warning" (warning panel with critical threshold)
  # - ac:structured-macro name="code" (bash code block with build hash)
  # - ac:structured-macro name="info" (info panel)
  # - ac:structured-macro name="note" (note panel)
  # - ac:task-list / ac:task (task checkboxes)
  read -r -d '' PAGE_BODY << 'PAGEEOF' || true
  <h1>Service Recovery Procedures</h1>
  <p>This runbook documents the standard operating procedures for recovering platform services after an incident.</p>

  <h2>Service Health Status</h2>
  <p>Current status of critical services:</p>
  <ul>
    <li>Authentication Service: <ac:structured-macro ac:name="status"><ac:parameter ac:name="title">OPERATIONAL</ac:parameter><ac:parameter ac:name="colour">Green</ac:parameter></ac:structured-macro></li>
    <li>Payment Gateway: <ac:structured-macro ac:name="status"><ac:parameter ac:name="title">DEGRADED</ac:parameter><ac:parameter ac:name="colour">Yellow</ac:parameter></ac:structured-macro></li>
    <li>Inventory Service: <ac:structured-macro ac:name="status"><ac:parameter ac:name="title">OUTAGE</ac:parameter><ac:parameter ac:name="colour">Red</ac:parameter></ac:structured-macro></li>
  </ul>

  <ac:structured-macro ac:name="warning">
    <ac:parameter ac:name="title">Critical Memory Threshold</ac:parameter>
    <ac:rich-text-body>
      <p>Services must be restarted immediately if memory utilization exceeds <strong>87.5%</strong> on any node. The threshold value is configured as <code>MEMORY_CRITICAL_PCT=87.5</code> in the cluster configuration. Failure to act within 5 minutes may trigger cascading OOM kills.</p>
    </ac:rich-text-body>
  </ac:structured-macro>

  <h2>Rollback Procedure</h2>
  <p>If a deployment causes service degradation, execute the following rollback command:</p>

  <ac:structured-macro ac:name="code">
    <ac:parameter ac:name="language">bash</ac:parameter>
    <ac:plain-text-body><![CDATA[#!/bin/bash
  # Emergency rollback script - build hash: a8f3e2d1b9c7
  kubectl rollout undo deployment/$SERVICE_NAME \
    --to-revision=$(kubectl rollout history deployment/$SERVICE_NAME | grep "a8f3e2d1b9c7" | awk '{print $1}') \
    --namespace=production]]></ac:plain-text-body>
  </ac:structured-macro>

  <ac:structured-macro ac:name="info">
    <ac:rich-text-body>
      <p>The rollback script references build hash <strong>a8f3e2d1b9c7</strong> which is the last known stable deployment. Always verify this hash against the release registry before executing.</p>
    </ac:rich-text-body>
  </ac:structured-macro>

  <h2>Post-Incident Checklist</h2>
  <ac:task-list>
    <ac:task>
      <ac:task-id>101</ac:task-id>
      <ac:task-status>complete</ac:task-status>
      <ac:task-body>Verify all pods are running with <code>kubectl get pods --field-selector=status.phase=Running</code></ac:task-body>
    </ac:task>
    <ac:task>
      <ac:task-id>102</ac:task-id>
      <ac:task-status>incomplete</ac:task-status>
      <ac:task-body>Run integration test suite with endpoint verification code INTEG-4R7X9M2K</ac:task-body>
    </ac:task>
    <ac:task>
      <ac:task-id>103</ac:task-id>
      <ac:task-status>incomplete</ac:task-status>
      <ac:task-body>Update incident timeline in PagerDuty with RCA reference PD-2025-0847</ac:task-body>
    </ac:task>
  </ac:task-list>

  <ac:structured-macro ac:name="note">
    <ac:rich-text-body>
      <p>All incidents must be logged in the tracking system within 24 hours. Reference the SLA compliance document for escalation procedures.</p>
    </ac:rich-text-body>
  </ac:structured-macro>
  PAGEEOF

  echo "Creating page..."
  ESCAPED_BODY=$(echo "$PAGE_BODY" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

  PAGE_RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"type\": \"page\",
      \"title\": \"${PAGE_TITLE}\",
      \"space\": {
        \"key\": \"${SPACE_KEY}\"
      },
      \"body\": {
        \"storage\": {
          \"value\": ${ESCAPED_BODY},
          \"representation\": \"storage\"
        }
      }
    }")

  PAGE_HTTP_CODE=$(echo "$PAGE_RESPONSE" | tail -n1)
  PAGE_BODY_RESP=$(echo "$PAGE_RESPONSE" | sed '$d')

  if [ "$PAGE_HTTP_CODE" -eq 200 ]; then
    PAGE_ID=$(echo "$PAGE_BODY_RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
  else
    echo "Page creation returned HTTP ${PAGE_HTTP_CODE}, searching for existing page..."
    SEARCH_RESP=$(curl -L -s -w "\n%{http_code}" -G \
      "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content" \
      --data-urlencode "title=${PAGE_TITLE}" \
      --data-urlencode "spaceKey=${SPACE_KEY}" \
      -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")
    SEARCH_HTTP=$(echo "$SEARCH_RESP" | tail -n1)
    SEARCH_BODY=$(echo "$SEARCH_RESP" | sed '$d')
    if [ "$SEARCH_HTTP" -ne 200 ]; then
      echo "Page search returned HTTP ${SEARCH_HTTP}: ${SEARCH_BODY}"
      exit 1
    fi
    PAGE_ID=$(echo "$SEARCH_BODY" | python3 -c 'import sys,json; r=json.load(sys.stdin).get("results",[]); print(r[0]["id"]) if r else sys.exit(1)')
    if [ -z "$PAGE_ID" ]; then
      echo "Failed to create or find page."
      exit 1
    fi
    echo "Found existing page."
  fi
  echo "Page created with ID: ${PAGE_ID}"

  echo "Verifying page content..."
  VERIFY=$(curl -L -s \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content/${PAGE_ID}?expand=body.storage" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")

  if echo "$VERIFY" | grep -q "a8f3e2d1b9c7"; then
    echo "Page content verified - build hash found"
  else
    echo "Page verification failed - build hash not found in content"
    exit 1
  fi

  echo "Setup complete"

# No after_test cleanup — intentionally omitted for reentrancy.
# Cloud service evals with static resource names must NOT delete resources
# in after_test because parallel CI runs would race. The space/page are tiny
# and reused across runs. See CLAUDE.md "Cloud Service Eval Reentrancy".
