  <h2>Change Log</h2>
  <p><strong>2025-01-15:</strong> Added DR endpoints for all services after the DR readiness initiative completed. Updated Redis host for recommendation-engine to use dedicated cluster after the memory pressure incident in December.</p>
  <p><strong>2024-11-02:</strong> Migrated search-indexer from Elasticsearch to OpenSearch. Updated DB host column accordingly. Added analytics-collector service (new service launched in Q4).</p>
  <p><strong>2024-09-18:</strong> Upgraded all production endpoints from TLS 1.2 to TLS 1.3. Changed port from 443 to 8443 for internal routing consistency. Updated auth-service to dedicated Redis cluster after session store eviction incidents.</p>
  <p><strong>2024-07-01:</strong> Initial version of the environment matrix. Covers 12 original platform services across dev, staging, and prod environments.</p>
  PAGEEOF

  echo "Creating page..."
  # Escape the body for JSON
  ESCAPED_BODY=$(echo "$PAGE_BODY" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

  PAGE_RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"type\": \"page\",
      \"title\": \"${PAGE_TITLE}\",
      \"space\": {
        \"key\": \"${SPACE_KEY}\"
      },
      \"body\": {
        \"storage\": {
          \"value\": ${ESCAPED_BODY},
          \"representation\": \"storage\"
        }
      }
    }")

  PAGE_HTTP_CODE=$(echo "$PAGE_RESPONSE" | tail -n1)
  PAGE_BODY_RESP=$(echo "$PAGE_RESPONSE" | sed '$d')

  if [ "$PAGE_HTTP_CODE" -eq 200 ]; then
    PAGE_ID=$(echo "$PAGE_BODY_RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
  else
    echo "Page creation returned HTTP ${PAGE_HTTP_CODE}, searching for existing page..."
    SEARCH_RESP=$(curl -L -s -w "\n%{http_code}" -G \
      "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content" \
      --data-urlencode "title=${PAGE_TITLE}" \
      --data-urlencode "spaceKey=${SPACE_KEY}" \
      -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")
    SEARCH_HTTP=$(echo "$SEARCH_RESP" | tail -n1)
    SEARCH_BODY=$(echo "$SEARCH_RESP" | sed '$d')
    if [ "$SEARCH_HTTP" -ne 200 ]; then
      echo "Page search returned HTTP ${SEARCH_HTTP}: ${SEARCH_BODY}"
      exit 1
    fi
    PAGE_ID=$(echo "$SEARCH_BODY" | python3 -c 'import sys,json; r=json.load(sys.stdin).get("results",[]); print(r[0]["id"]) if r else sys.exit(1)')
    if [ -z "$PAGE_ID" ]; then
      echo "Failed to create or find page."
      exit 1
    fi
    echo "Found existing page."
  fi
  echo "Page created with ID: ${PAGE_ID}"

  echo "Verifying page content..."
  VERIFY=$(curl -L -s \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content/${PAGE_ID}?expand=body.storage" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")

  if echo "$VERIFY" | grep -q "${VERIFICATION_ENDPOINT}"; then
    echo "Page content verified - target endpoint found"
  else
    echo "Page verification failed - target endpoint not found in content"
    exit 1
  fi

  echo "Setup complete"

# No after_test cleanup — intentionally omitted for reentrancy.
# Cloud service evals with static resource names must NOT delete resources
# in after_test because parallel CI runs would race. The space/page are tiny
# and reused across runs. See CLAUDE.md "Cloud Service Eval Reentrancy".
