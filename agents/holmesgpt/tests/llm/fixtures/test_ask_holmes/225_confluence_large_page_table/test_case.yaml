# Test: Extract a specific cell from a large table in a big Confluence page
# The page simulates a platform engineering environment matrix document with
# ~3000 words of prose followed by a 15-row config table. Holmes must find a
# specific service's production endpoint by looking up the row (service name)
# and column (Prod Endpoint).
#
# Requirements:
#   CONFLUENCE_SA_USER, CONFLUENCE_SA_API_KEY, CONFLUENCE_SA_BASE_URL

user_prompt: |
  Look up the environment matrix page titled 'Platform Services Environment Matrix'
  in Confluence space 'HLMS225'. What is the production endpoint for the
  inventory-service?

expected_output:
  - "Must report the production endpoint: https://inventory.prod.internal.acme.io:8443/api/v2"

tags:
  - confluence
  - question-answer
  - medium

before_test: |
  set -e

  SPACE_KEY="HLMS225"
  SPACE_NAME="Holmes Eval 225"
  PAGE_TITLE="Platform Services Environment Matrix"
  VERIFICATION_ENDPOINT="https://inventory.prod.internal.acme.io:8443/api/v2"

  echo "Creating Confluence space ${SPACE_KEY}..."
  RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/space" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"key\": \"${SPACE_KEY}\",
      \"name\": \"${SPACE_NAME}\",
      \"description\": {
        \"plain\": {
          \"value\": \"Test space for Holmes eval 225\",
          \"representation\": \"plain\"
        }
      }
    }")

  HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
  BODY=$(echo "$RESPONSE" | sed '$d')

  if [ "$HTTP_CODE" -eq 200 ]; then
    echo "Space created."
  elif echo "$BODY" | grep -q "already exists"; then
    echo "Space already exists, verifying it is accessible..."
    # A space in Confluence's trash still reserves the key but isn't queryable.
    # Verify we can actually reach it before continuing.
    SPACE_CHECK=$(curl -L -s -w "\n%{http_code}" \
      "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/space/${SPACE_KEY}" \
      -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")
    SPACE_CHECK_HTTP=$(echo "$SPACE_CHECK" | tail -n1)
    if [ "$SPACE_CHECK_HTTP" -ne 200 ]; then
      echo "Space key '${SPACE_KEY}' is reserved but not accessible (HTTP ${SPACE_CHECK_HTTP}). It may be in the Confluence trash — purge it manually or wait for the trash retention period to expire."
      exit 1
    fi
    echo "Space is accessible, reusing."
  else
    echo "Failed to create space. HTTP ${HTTP_CODE}: ${BODY}"
    exit 1
  fi
  sleep 2

  # Build the large page body. The prose sections are deliberately long to push
  # the table far down and test whether Holmes can extract from a big page.
  read -r -d '' PAGE_BODY << 'PAGEEOF' || true
  <h1>Platform Services Environment Matrix</h1>

  <h2>Overview</h2>
  <p>This document serves as the canonical reference for all platform microservices operated by the Infrastructure Platform team. It covers deployment topology, networking configuration, database assignments, caching layers, and feature-flag states across all four standard environments: Development (dev), Staging (staging), Production (prod), and Disaster Recovery (dr). All teams shipping services on the Acme Platform must keep this page up to date whenever infrastructure changes are made. The page is reviewed quarterly by the Architecture Review Board.</p>

  <h2>Deployment Architecture</h2>
  <p>Every microservice is deployed as a set of Kubernetes Deployments behind a ClusterIP Service. Ingress is managed by an NGINX-based Ingress Controller in dev and staging, and by an AWS ALB Ingress Controller in production and DR. Each service is assigned a unique internal DNS name following the pattern <code>&lt;service&gt;.&lt;env&gt;.internal.acme.io</code>. TLS termination happens at the load balancer in production using certificates issued by the internal PKI (Vault-managed). In non-production environments, services communicate over plain HTTP within the cluster mesh, while external access uses self-signed certificates managed by cert-manager.</p>
  <p>All production services run with a minimum of three replicas spread across availability zones us-east-1a, us-east-1b, and us-east-1c. Horizontal Pod Autoscalers are configured with CPU target utilization of 65% and memory target of 70%. The maximum replica count varies per service and is documented in each service's Helm values file stored in the <code>infra-helm-charts</code> repository. Staging mirrors the production topology at reduced scale (two replicas, single AZ) to catch topology-sensitive bugs before they reach production. Dev runs single-replica deployments with relaxed resource requests to keep costs low.</p>

  <h2>Database Strategy</h2>
  <p>The platform uses Amazon RDS PostgreSQL 15.4 as the primary relational database engine. Each service that requires persistent storage is assigned a dedicated database within a shared RDS cluster per environment. Connection pooling is handled by PgBouncer sidecars injected via a mutating admission webhook. The connection pool size defaults to 20 connections per pod, with a maximum of 50 for high-throughput services like the order-processor and payment-gateway. Read replicas are provisioned in production and DR for services that perform heavy analytical queries, and these replicas are exposed via a separate read-only endpoint.</p>
  <p>Schema migrations are executed during the CI/CD pipeline using Flyway. Migration scripts are versioned and stored alongside application code. Backward-compatible migrations are enforced by a pre-merge check that verifies no DROP or ALTER TABLE ... DROP COLUMN statements appear without a corresponding feature flag gating the code path. This policy was introduced after the Q2-2024 incident where a premature column drop caused the notification-service to crash loop for 47 minutes in production (see Postmortem PM-2024-0091).</p>

  <h2>Caching Layer</h2>
  <p>Redis 7.2 clusters provide the caching layer. A shared ElastiCache cluster is used per environment, with logical databases (db0 through db15) assigned to individual services. Cache eviction policies are set to <code>allkeys-lru</code> by default. Services that require guaranteed cache availability (such as the auth-service session store) use a dedicated Redis cluster with <code>noeviction</code> policy and persistence enabled (RDB snapshots every 60 seconds, AOF with fsync every second). Cache key prefixes follow the pattern <code>&lt;service-name&gt;:&lt;version&gt;:</code> to prevent key collisions during blue-green deployments.</p>
  <p>The recommendation-engine service uses a separate Redis instance configured as a sorted-set store for real-time ranking. This instance runs on r6g.2xlarge nodes with 52 GiB of memory to accommodate the full product catalog ranking data. Cache warming is performed by a Kubernetes Job that runs immediately after each deployment, pre-populating the top 10,000 product rankings from the analytics data warehouse.</p>

  <h2>Feature Flags</h2>
  <p>Feature flags are managed by LaunchDarkly. Each environment has a separate LaunchDarkly project, and flag evaluations are cached locally by the LaunchDarkly SDK with a polling interval of 30 seconds in production (streaming mode disabled due to proxy limitations). New features must be gated behind a feature flag if they modify user-facing behavior or change data schemas. Flags are reviewed monthly and archived if they have been at 100% rollout for more than 30 days. The current flag count per environment is: dev (312 flags), staging (287 flags), prod (198 flags), dr (198 flags, mirrored from prod).</p>

  <h2>Monitoring and Alerting</h2>
  <p>All services expose Prometheus metrics on the <code>/metrics</code> endpoint. Service-level indicators (SLIs) are defined for latency (p99), error rate (5xx / total), and availability. Service-level objectives (SLOs) are tracked in Grafana dashboards under the "Platform SLOs" folder. PagerDuty is configured for production alerts with a 5-minute escalation window. Non-production alerts route to a shared Slack channel (#platform-staging-alerts). Each service owner is required to maintain a runbook linked from the PagerDuty service configuration. On-call rotations follow a weekly schedule with a primary and secondary on each rotation.</p>
  <p>Distributed tracing is implemented using OpenTelemetry with Jaeger as the backend. Trace sampling is set at 1% in production and 100% in dev/staging. Critical paths (payment processing, authentication flows) have forced sampling enabled regardless of the global sampling rate. Log aggregation uses Fluent Bit shipping to OpenSearch, with a retention policy of 7 days in dev, 30 days in staging, 90 days in production, and 90 days in DR.</p>

  <h2>Networking and Security</h2>
  <p>Network policies are enforced by Calico. Each namespace has a default-deny ingress policy, and services must explicitly declare their allowed communication partners via NetworkPolicy resources. The API gateway (Kong) serves as the single entry point for external traffic, performing rate limiting (1000 req/s per client), JWT validation, and request transformation. Internal service-to-service calls use mTLS provided by Istio sidecar proxies in production. Staging uses plain-text communication for easier debugging. IP whitelisting is configured for administrative endpoints using Kubernetes annotations on the Ingress resources.</p>
  <p>Secrets are managed by HashiCorp Vault with the Kubernetes auth method. Each service's ServiceAccount is bound to a Vault role that grants read access to the service-specific secret path <code>secret/data/&lt;env&gt;/&lt;service-name&gt;</code>. Vault Agent injector handles secret injection at pod startup. Secret rotation is automated for database credentials (every 24 hours) and API keys (every 7 days). Manual rotation is required for third-party service credentials, and the rotation schedule is tracked in this page's companion document "Secret Rotation Schedule".</p>

  <h2>CI/CD Pipeline</h2>
  <p>The CI/CD pipeline runs on GitHub Actions. Each repository follows a trunk-based development model with short-lived feature branches. Merges to main trigger the following stages: lint, unit test, integration test, container build, security scan (Trivy), push to ECR, deploy to dev, smoke test, promote to staging, integration test in staging, and finally a manual approval gate for production deployment. Production deployments use a canary strategy with 10% traffic shift, 5-minute bake time, and automatic rollback if error rate exceeds 1% or p99 latency exceeds the SLO by more than 20%. The average deployment frequency is 4.2 deploys per service per week in production.</p>

