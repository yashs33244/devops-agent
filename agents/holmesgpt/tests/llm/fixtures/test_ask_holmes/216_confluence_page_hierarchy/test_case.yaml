user_prompt: |
  In Confluence space 'HOLMES216', find the page titled 'Child Page 216' and tell me
  the title of its parent page.

expected_output:
  - "Must report the parent page title: Parent Page 216X"

tags:
  - confluence
  - question-answer
  - hard

before_test: |
  set -e

  SPACE_KEY="HOLMES216"
  SPACE_NAME="Holmes Test Space 216"
  PARENT_TITLE="Parent Page 216X"
  CHILD_TITLE="Child Page 216"

  echo "Creating Confluence space ${SPACE_KEY}..."
  RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/space" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"key\": \"${SPACE_KEY}\",
      \"name\": \"${SPACE_NAME}\",
      \"description\": {
        \"plain\": {
          \"value\": \"Test space for Holmes eval 216\",
          \"representation\": \"plain\"
        }
      }
    }")

  HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
  BODY=$(echo "$RESPONSE" | sed '$d')

  if [ "$HTTP_CODE" -eq 200 ]; then
    echo "Space created."
  elif echo "$BODY" | grep -q "already exists"; then
    echo "Space already exists, reusing."
  else
    echo "Failed to create space. HTTP ${HTTP_CODE}: ${BODY}"
    exit 1
  fi

  sleep 2

  echo "Creating parent page..."
  PARENT_RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"type\": \"page\",
      \"title\": \"${PARENT_TITLE}\",
      \"space\": {
        \"key\": \"${SPACE_KEY}\"
      },
      \"body\": {
        \"storage\": {
          \"value\": \"<p>This is the parent page for testing page hierarchy.</p>\",
          \"representation\": \"storage\"
        }
      }
    }")

  PARENT_HTTP_CODE=$(echo "$PARENT_RESPONSE" | tail -n1)
  PARENT_BODY=$(echo "$PARENT_RESPONSE" | sed '$d')

  if [ "$PARENT_HTTP_CODE" -eq 200 ]; then
    PARENT_ID=$(echo "$PARENT_BODY" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
  else
    echo "Parent page creation returned HTTP ${PARENT_HTTP_CODE}, searching for existing page..."
    SEARCH_RESP=$(curl -L -s -w "\n%{http_code}" -G \
      "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content" \
      --data-urlencode "title=${PARENT_TITLE}" \
      --data-urlencode "spaceKey=${SPACE_KEY}" \
      -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")
    SEARCH_HTTP=$(echo "$SEARCH_RESP" | tail -n1)
    SEARCH_BODY=$(echo "$SEARCH_RESP" | sed '$d')
    if [ "$SEARCH_HTTP" -ne 200 ]; then
      echo "Page search returned HTTP ${SEARCH_HTTP}: ${SEARCH_BODY}"
      exit 1
    fi
    PARENT_ID=$(echo "$SEARCH_BODY" | python3 -c 'import sys,json; r=json.load(sys.stdin).get("results",[]); print(r[0]["id"]) if r else sys.exit(1)')
    if [ -z "$PARENT_ID" ]; then
      echo "Failed to create or find parent page."
      exit 1
    fi
    echo "Found existing parent page."
  fi
  echo "Parent page created with ID: ${PARENT_ID}"

  sleep 2

  echo "Creating child page under parent..."
  CHILD_RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"type\": \"page\",
      \"title\": \"${CHILD_TITLE}\",
      \"space\": {
        \"key\": \"${SPACE_KEY}\"
      },
      \"ancestors\": [
        {
          \"id\": \"${PARENT_ID}\"
        }
      ],
      \"body\": {
        \"storage\": {
          \"value\": \"<p>This is a child page. Its parent should be discoverable via the API.</p>\",
          \"representation\": \"storage\"
        }
      }
    }")

  CHILD_HTTP_CODE=$(echo "$CHILD_RESPONSE" | tail -n1)
  CHILD_BODY=$(echo "$CHILD_RESPONSE" | sed '$d')

  if [ "$CHILD_HTTP_CODE" -eq 200 ]; then
    CHILD_ID=$(echo "$CHILD_BODY" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
  else
    echo "Child page creation returned HTTP ${CHILD_HTTP_CODE}, searching for existing page..."
    SEARCH_RESP=$(curl -L -s -w "\n%{http_code}" -G \
      "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content" \
      --data-urlencode "title=${CHILD_TITLE}" \
      --data-urlencode "spaceKey=${SPACE_KEY}" \
      -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")
    SEARCH_HTTP=$(echo "$SEARCH_RESP" | tail -n1)
    SEARCH_BODY=$(echo "$SEARCH_RESP" | sed '$d')
    if [ "$SEARCH_HTTP" -ne 200 ]; then
      echo "Page search returned HTTP ${SEARCH_HTTP}: ${SEARCH_BODY}"
      exit 1
    fi
    CHILD_ID=$(echo "$SEARCH_BODY" | python3 -c 'import sys,json; r=json.load(sys.stdin).get("results",[]); print(r[0]["id"]) if r else sys.exit(1)')
    if [ -z "$CHILD_ID" ]; then
      echo "Failed to create or find child page."
      exit 1
    fi
    echo "Found existing child page."
  fi
  echo "Child page created with ID: ${CHILD_ID}"

  echo "Verifying page hierarchy..."
  VERIFY=$(curl -L -s \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content/${CHILD_ID}?expand=ancestors" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")

  if echo "$VERIFY" | grep -q "${PARENT_TITLE}"; then
    echo "Page hierarchy verified"
  else
    echo "Warning: Parent title not found in ancestors, but continuing"
  fi

  echo "Setup complete"

after_test: |
  set -e

  SPACE_KEY="HOLMES216"

  echo "Deleting space ${SPACE_KEY}..."
  HTTP_CODE=$(curl -L -s -w "%{http_code}" -o /dev/null -X DELETE \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/space/${SPACE_KEY}" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")

  if [ "$HTTP_CODE" -eq 204 ] || [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 404 ]; then
    echo "Cleanup complete"
  else
    echo "Warning: Cleanup returned HTTP ${HTTP_CODE}"
  fi
