apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: app-228
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: holmes
  MONGO_INITDB_ROOT_PASSWORD: holmespass
  MONGO_INITDB_DATABASE: opsdb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: app-228
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0.17
        ports:
        - containerPort: 27017
        envFrom:
        - secretRef:
            name: mongodb-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: app-228
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
