# Test: Fetch Confluence page content via HTTP toolset (API key variant)
# Tests that the HTTP toolset can fetch page content using personal API key credentials
# routed directly to the Confluence instance (not via api.atlassian.com gateway).
#
# Requirements:
#   CONFLUENCE_BASE_URL - e.g., https://robusta-llm-test.atlassian.net
#   CONFLUENCE_USER - Email/username for Confluence
#   CONFLUENCE_API_KEY - Atlassian API token
#   CONFLUENCE_SA_BASE_URL, CONFLUENCE_SA_USER, CONFLUENCE_SA_API_KEY - For setup/teardown

user_prompt: |
  In the Confluence space 'HOLMES224', find the page titled 'Release Notes'
  and tell me the build number mentioned in it.

expected_output:
  - "Must report the build number: BUILD-2024-Q4-7M3X9R"

tags:
  - confluence
  - question-answer
  - medium

before_test: |
  set -e

  SPACE_KEY="HOLMES224"
  SPACE_NAME="Holmes Test Space 224"
  PAGE_TITLE="Release Notes"
  BUILD_NUMBER="BUILD-2024-Q4-7M3X9R"

  echo "Creating Confluence space ${SPACE_KEY}..."
  RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/space" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"key\": \"${SPACE_KEY}\",
      \"name\": \"${SPACE_NAME}\",
      \"description\": {
        \"plain\": {
          \"value\": \"Test space for Holmes eval 224\",
          \"representation\": \"plain\"
        }
      }
    }")

  HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
  BODY=$(echo "$RESPONSE" | sed '$d')

  if [ "$HTTP_CODE" -eq 200 ]; then
    echo "Space created."
  elif echo "$BODY" | grep -q "already exists"; then
    echo "Space already exists, reusing."
  else
    echo "Failed to create space. HTTP ${HTTP_CODE}: ${BODY}"
    exit 1
  fi

  sleep 2

  echo "Creating page with build number..."
  PAGE_RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"type\": \"page\",
      \"title\": \"${PAGE_TITLE}\",
      \"space\": {
        \"key\": \"${SPACE_KEY}\"
      },
      \"body\": {
        \"storage\": {
          \"value\": \"<h2>Release Notes - Q4 2024</h2><p>This release includes several improvements and bug fixes.</p><p>Build number: <strong>${BUILD_NUMBER}</strong></p><p>Key changes:</p><ul><li>Improved search performance</li><li>Fixed pagination in dashboard</li><li>Updated dependencies</li></ul>\",
          \"representation\": \"storage\"
        }
      }
    }")

  PAGE_HTTP_CODE=$(echo "$PAGE_RESPONSE" | tail -n1)
  PAGE_BODY=$(echo "$PAGE_RESPONSE" | sed '$d')

  if [ "$PAGE_HTTP_CODE" -eq 200 ]; then
    PAGE_ID=$(echo "$PAGE_BODY" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
  else
    echo "Page creation returned HTTP ${PAGE_HTTP_CODE}, searching for existing page..."
    SEARCH_RESP=$(curl -L -s -w "\n%{http_code}" -G \
      "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content" \
      --data-urlencode "title=${PAGE_TITLE}" \
      --data-urlencode "spaceKey=${SPACE_KEY}" \
      -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")
    SEARCH_HTTP=$(echo "$SEARCH_RESP" | tail -n1)
    SEARCH_BODY=$(echo "$SEARCH_RESP" | sed '$d')
    if [ "$SEARCH_HTTP" -ne 200 ]; then
      echo "Page search returned HTTP ${SEARCH_HTTP}: ${SEARCH_BODY}"
      exit 1
    fi
    PAGE_ID=$(echo "$SEARCH_BODY" | python3 -c 'import sys,json; r=json.load(sys.stdin).get("results",[]); print(r[0]["id"]) if r else sys.exit(1)')
    if [ -z "$PAGE_ID" ]; then
      echo "Failed to create or find page."
      exit 1
    fi
    echo "Found existing page."
  fi
  echo "Page created with ID: ${PAGE_ID}"

  echo "Verifying page content..."
  VERIFY=$(curl -L -s \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/content/${PAGE_ID}?expand=body.storage" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")

  if echo "$VERIFY" | grep -q "${BUILD_NUMBER}"; then
    echo "Page content verified"
  else
    echo "Page verification failed - build number not found in content"
    exit 1
  fi

  echo "Setup complete"

after_test: |
  set -e

  SPACE_KEY="HOLMES224"

  echo "Deleting space ${SPACE_KEY}..."
  HTTP_CODE=$(curl -L -s -w "%{http_code}" -o /dev/null -X DELETE \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/space/${SPACE_KEY}" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")

  if [ "$HTTP_CODE" -eq 204 ] || [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 404 ]; then
    echo "Cleanup complete"
  else
    echo "Warning: Cleanup returned HTTP ${HTTP_CODE}"
  fi
