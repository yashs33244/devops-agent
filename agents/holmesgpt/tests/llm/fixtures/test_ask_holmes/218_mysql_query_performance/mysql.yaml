apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: app-218
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootpass
  MYSQL_DATABASE: testdb
  MYSQL_USER: holmes
  MYSQL_PASSWORD: holmespass
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: app-218
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0.40
        ports:
        - containerPort: 3306
        envFrom:
        - secretRef:
            name: mysql-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -u
            - root
            - -prootpass
          initialDelaySeconds: 10
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: app-218
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
