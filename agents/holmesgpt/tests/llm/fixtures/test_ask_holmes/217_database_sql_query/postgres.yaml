apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: app-217
type: Opaque
stringData:
  POSTGRES_USER: holmes
  POSTGRES_PASSWORD: holmespass
  POSTGRES_DB: holmesdb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: app-217
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:17.2-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - holmes
          initialDelaySeconds: 5
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: app-217
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
