{{- if and .Values.mcpAddons.gitlabMcp.enabled .Values.mcpAddons.gitlabMcp.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-gitlab-mcp-network-policy
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-gitlab-mcp
    app.kubernetes.io/name: gitlab-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: holmes
    {{- include "holmes.commonLabels" . | nindent 4 }}
  {{- with (include "holmes.commonAnnotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-gitlab-mcp
      app.kubernetes.io/name: gitlab-mcp-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic only from Holmes pods
  - from:
    - podSelector:
        matchLabels:
          app: holmes
    ports:
    - protocol: TCP
      port: 8000
{{- end }}
