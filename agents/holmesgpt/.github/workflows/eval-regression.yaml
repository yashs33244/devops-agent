            });
            const isPersistent = ${{ toJSON(steps.initial-comment.outputs.is_persistent) }} === 'true';
            const progressSteps = [
              [true, 'Setup HolmesGPT environment'],
              [true, `Collect evals to run (${p.testCount} tests)`],
              [true, 'Setup KIND cluster'],
              [false, 'Run evals']
            ];

            let body;
            if (isPersistent) {
              // Preserve history for automated runs
              const existingComment = await github.rest.issues.getComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: p.commentId
              });
              const previousRuns = parseRunHistory(existingComment.data.body);
              const currentContent = buildBody(p, progressSteps, { testPreview: p.testCount !== '0' ? p.testPreview : null, context });
              const footer = buildRerunFooter(p, context);
              body = buildAutoCommentWithHistory(currentContent, previousRuns, footer);
            } else {
              body = buildBody(p, progressSteps, { testPreview: p.testCount !== '0' ? p.testPreview : null, context }) + buildRerunFooter(p, context);
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: p.commentId,
              body: body
            });

      - name: Run tests
        if: steps.check-tests.outputs.should-run == 'true'
        id: evals
        continue-on-error: true
        working-directory: code
        shell: bash
        env:
          RUN_LIVE: "true"
          AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION_NAME: ${{ vars.AWS_REGION_NAME }}
          MODEL: ${{ steps.eval-params.outputs.model }}
          ITERATIONS: ${{ steps.eval-params.outputs.iterations }}
          CLASSIFIER_MODEL: ${{ vars.CLASSIFIER_MODEL || 'gpt-4.1' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          ELASTICSEARCH_URL: ${{ secrets.ELASTICSEARCH_URL }}
          ELASTICSEARCH_API_KEY: ${{ secrets.ELASTICSEARCH_API_KEY }}
          VICTORIALOGS_URL: ${{ secrets.VICTORIALOGS_URL }}
          CONFLUENCE_BASE_URL: ${{ vars.CONFLUENCE_BASE_URL }}
          CONFLUENCE_SA_USER: ${{ secrets.CONFLUENCE_SA_USER }}
          CONFLUENCE_SA_API_KEY: ${{ secrets.CONFLUENCE_SA_API_KEY }}
          CONFLUENCE_USER: ${{ secrets.CONFLUENCE_USER }}
          CONFLUENCE_API_KEY: ${{ secrets.CONFLUENCE_API_KEY }}
          CORALOGIX_API_KEY: ${{ secrets.CORALOGIX_API_KEY }}
          CORALOGIX_SEND_API_KEY: ${{ secrets.CORALOGIX_SEND_API_KEY }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          # Needed by tests/llm/utils/braintrust_history.py to authenticate the
          # GitHub Actions API lookup that finds recent master-* / ci-benchmark-*
          # workflow runs. Without it the unauthenticated 60 req/h rate limit is
          # exhausted within minutes on shared runners and the "vs master" /
          # "vs benchmark" columns silently come back empty.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_LIST_FILE_LOCATION: /tmp/model_list.yaml
          UPLOAD_DATASET: "true"
          EXPERIMENT_ID: github-${{ github.run_id }}.${{ github.run_number }}.${{ github.run_attempt }}
          GENERATE_REGRESSIONS_FILE: "true"
          EVAL_MARKER_EXPR: ${{ steps.eval-params.outputs.marker_expr }}
          EVAL_FILTER: ${{ steps.eval-params.outputs.filter }}
          EVAL_BRANCH: ${{ steps.eval-params.outputs.branch }}
        run: |
          # Unset MODEL if empty so get_models() uses DEFAULT_MODEL
          [[ -z "$MODEL" ]] && unset MODEL

          echo "🧪 Run tests params:"
          echo "  MODEL=${MODEL:-<unset>}"
          echo "  EVAL_MARKER_EXPR=${EVAL_MARKER_EXPR}"
          echo "  EVAL_FILTER=${EVAL_FILTER:-<empty>}"
          echo "  MODEL_LIST_FILE_LOCATION=${MODEL_LIST_FILE_LOCATION:-<unset>}"
          echo "  pwd=$(pwd)"

          START_TIME=$(date +%s)

          # Collect test files dynamically
          TEST_FILES=()
          for f in tests/llm/test_ask_holmes.py tests/llm/test_holmes_checks.py; do
            [[ -f "$f" ]] && TEST_FILES+=("$f")
          done
          if [[ ${#TEST_FILES[@]} -eq 0 ]]; then
            echo "❌ No test files found"
            exit 1
          fi
          PYTEST_ARGS=(--no-cov "${TEST_FILES[@]}" -s -n10 -m "$EVAL_MARKER_EXPR")
          [[ -n "$EVAL_FILTER" ]] && PYTEST_ARGS+=(-k "$EVAL_FILTER")
          echo "  pytest args: ${PYTEST_ARGS[*]}"
          set +e
          poetry run pytest "${PYTEST_ARGS[@]}"
          PYTEST_EXIT=$?
          set -e
          echo "pytest_exit=$PYTEST_EXIT" >> $GITHUB_OUTPUT

          # Exit code handling:
          # 0 = all tests passed
          # 1 = some tests failed (normal) OR collection error under pytest-xdist
          # 2 = collection errors (e.g. invalid MODEL, import error)
          # 3 = interrupted by user
          # 4 = internal pytest error
          # 5 = no tests collected (markers/filters matched nothing)
          #
          # IMPORTANT: pytest-xdist (-n) returns exit code 1 for collection errors
          # instead of 2. We detect this by checking if any results were produced.
          if [[ $PYTEST_EXIT -eq 0 ]]; then
            echo "pytest passed, all tests ok"
          elif [[ $PYTEST_EXIT -eq 1 ]]; then
            # Could be normal test failures OR collection error (pytest-xdist quirk).
            # Check if results were actually produced. If not, it's a collection error.
            if [[ ! -f "regressions.txt" && ! -f "evals_report.md" ]]; then
              echo "❌ pytest exit code 1 but no results produced — treating as collection error"
              echo "pytest_error=collection" >> $GITHUB_OUTPUT
              {
                echo "## ❌ Test Collection Failed"
                echo ""
                echo "pytest exited with code 1 but produced no results."
                echo ""
                echo "Common causes:"
                echo "- **Invalid MODEL name** — check that the model short name exists in the model list"
                echo "- **Import error** in test files"
                echo "- **Invalid markers or filters**"
                echo ""
                echo "Check the [workflow logs](${{ steps.eval-params.outputs.run_url }}) for details."
              } > evals_report.md
            else
              echo "pytest had test failures (exit code 1), results were produced"
            fi
          elif [[ $PYTEST_EXIT -eq 2 || $PYTEST_EXIT -eq 5 ]]; then
            echo "❌ pytest failed with exit code $PYTEST_EXIT (collection error)"
            echo "pytest_error=collection" >> $GITHUB_OUTPUT
            {
              echo "## ❌ Test Collection Failed"
              echo ""
              echo "pytest exited with code $PYTEST_EXIT. This usually means:"
              echo "- **Exit 2**: Collection error (invalid MODEL name, import error, bad markers)"
              echo "- **Exit 5**: No tests matched the given markers/filters"
              echo ""
              echo "Check the [workflow logs](${{ steps.eval-params.outputs.run_url }}) for details."
            } > evals_report.md
          elif [[ $PYTEST_EXIT -eq 3 || $PYTEST_EXIT -eq 4 ]]; then
            echo "❌ pytest failed with exit code $PYTEST_EXIT (infrastructure error)"
            echo "pytest_error=infrastructure" >> $GITHUB_OUTPUT
            {
              echo "## ❌ Pytest Internal Error"
              echo ""
              echo "pytest exited with code $PYTEST_EXIT. This usually means:"
              echo "- **Exit 3**: Test run was interrupted"
              echo "- **Exit 4**: Internal pytest error"
              echo ""
              echo "Check the [workflow logs](${{ steps.eval-params.outputs.run_url }}) for details."
            } > evals_report.md
          else
            echo "❌ pytest failed with unexpected exit code $PYTEST_EXIT"
            echo "pytest_error=unknown" >> $GITHUB_OUTPUT
            echo "## ❌ Pytest Failed (exit code $PYTEST_EXIT)" > evals_report.md
          fi

          DURATION=$(($(date +%s) - START_TIME))
          if [[ $DURATION -ge 3600 ]]; then
            echo "duration=$((DURATION/3600))h $(((DURATION%3600)/60))m $((DURATION%60))s" >> $GITHUB_OUTPUT
          elif [[ $DURATION -ge 60 ]]; then
            echo "duration=$((DURATION/60))m $((DURATION%60))s" >> $GITHUB_OUTPUT
          else
            echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          fi

      - name: Post evaluation results
        if: always() && steps.check-tests.outputs.should-run == 'true' && steps.eval-params.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // SECURITY: Load helpers from trusted checkout (base branch) to prevent code injection from PRs
            const {
              buildParams, buildBody, buildRerunFooter, parseRunHistory, buildAutoCommentWithHistory
            } = require('./.trusted/.github/scripts/eval-comment-helpers.js');

            const p = buildParams({
              ...JSON.parse(${{ toJSON(steps.eval-params.outputs.base_params) }}),
              comment_id: ${{ toJSON(steps.initial-comment.outputs.comment_id) }},
              duration: ${{ toJSON(steps.evals.outputs.duration) }},
              valid_markers: ${{ toJSON(steps.test-preview.outputs.valid_markers) }},
              valid_models: ${{ toJSON(steps.test-preview.outputs.valid_models) }},
              triggered_by: ${{ toJSON(steps.eval-params.outputs.triggered_by) }}
            });
            const isPersistent = ${{ toJSON(steps.initial-comment.outputs.is_persistent) }} === 'true';
            const report = fs.existsSync('code/evals_report.md') ? fs.readFileSync('code/evals_report.md', 'utf8') : '';
            const failures = fs.existsSync('code/regressions.txt') ? fs.readFileSync('code/regressions.txt', 'utf8').trim() : '';
            const hasFailures = failures && failures !== '0';
            const pytestError = ${{ toJSON(steps.evals.outputs.pytest_error) }} || '';
            const hasPytestError = pytestError !== '';


            // Build notification header for the user who triggered the eval (only for manual runs)
            const triggeredBy = p.triggered_by || '';
            const statusText = hasPytestError
              ? pytestError === 'collection'
                ? '❌ Test collection failed (no tests ran)'
                : '❌ Pytest internal error (no tests ran)'
              : hasFailures
                ? `⚠️ Completed with ${failures} failure${failures === '1' ? '' : 's'}`
                : '✅ Completed successfully';
            const notifyHeader = triggeredBy ? `@${triggeredBy} Your eval run has finished. ${statusText}\n\n---\n\n` : '';

            // Build current run content
            const icon = hasPytestError ? '❌' : hasFailures ? '⚠️' : (p.isManual ? '🧪' : '✅');
            const title = hasPytestError ? 'Eval Run Failed' : hasFailures ? 'Eval Results (with failures)' : (p.isManual ? 'Manual Eval Results' : 'Results of HolmesGPT evals');
            let currentContent = buildBody(p, null, {
              icon,
              title,
              context
            });

            // Insert failures warning before "Historical Comparison Details" if present
            let reportContent = report || '⚠️ No eval report was generated.\n\n';
            if (hasFailures) {
              const failuresWarning = `\n### ⚠️ ${failures} Failure${failures === '1' ? '' : 's'} Detected\n\n`;
              const historyMarker = '### Historical Comparison Details';
              const historyIdx = reportContent.indexOf(historyMarker);
              if (historyIdx !== -1) {
                // Insert before Historical Comparison Details
                reportContent = reportContent.slice(0, historyIdx) + failuresWarning + reportContent.slice(historyIdx);
              } else {
                // Append at the end if no Historical Comparison Details section
                reportContent += failuresWarning;
              }
            }
            currentContent += '\n' + reportContent;
            const footer = buildRerunFooter(p, context, { includeLegend: true });

            if (isPersistent && p.commentId) {
              // For automated runs: update the persistent comment, preserving history
              const existingComment = await github.rest.issues.getComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: p.commentId
              });
              const previousRuns = parseRunHistory(existingComment.data.body);
              const body = buildAutoCommentWithHistory(currentContent, previousRuns, footer);
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: p.commentId,
                body: body
              });
            } else {
              // For manual runs: delete progress comment and create fresh results comment
              // This ensures the user gets a GitHub notification when evals complete
              const body = notifyHeader + currentContent + footer;
              if (p.commentId) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: p.commentId
                });
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: p.prNumber, body
              });
            }

      - name: Add completion reaction
        if: always() && github.event_name == 'issue_comment' && steps.eval-comment.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // Remove eyes reaction (was added to indicate processing started)
            const reactions = await github.rest.reactions.listForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id
            });
            const eyesReaction = reactions.data.find(r => r.content === 'eyes' && r.user.login === 'github-actions[bot]');
            if (eyesReaction) {
              await github.rest.reactions.deleteForIssueComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: context.payload.comment.id, reaction_id: eyesReaction.id
              });
            }
            // Add hooray reaction to indicate completion
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: 'hooray'
            });

      - name: Check test results
        if: always() && steps.check-tests.outputs.should-run == 'true'
        working-directory: code
        run: |
          if [[ -f "regressions.txt" ]]; then
            echo "⚠️ There are failures in the evals. Please check the file for details."
            cat regressions.txt
          else
            echo "✅ All tests passed."
          fi
