name: Docker Build on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'mkdocs.yml'

# Cancel in-progress runs for the same PR
concurrency:
  group: docker-build-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: 'write'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history so git describe can find the latest release tag

    - name: Compute dev version from git
      id: dev_version
      run: |
        # Get the last release tag (e.g. "0.5.2" or "v0.5.2")
        TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
        TAG="${TAG#v}"

        # Parse semver components and bump patch
        IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
        NEXT_PATCH=$((PATCH + 1))

        # Commits since last tag and short hash
        COUNT=$(git rev-list "${TAG}..HEAD" --count 2>/dev/null || echo "0")
        HASH=$(git rev-parse --short HEAD)

        # Strict semver: greater than last release, lower than next release
        # e.g. 0.5.3-dev.3+a1b2c3f  (0.5.2 < this < 0.5.3)
        VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev.${COUNT}+${HASH}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Dev version: ${VERSION} (based on tag ${TAG})"

    - name: Patch __version__ for dev build
      run: |
        sed -i 's/__version__ = .*/__version__ = "${{ steps.dev_version.outputs.version }}"/g' holmes/__init__.py

    - name: Check if PR is from fork
      id: fork_check
      run: |
        HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
        BASE_REPO="${{ github.repository }}"

        if [ -z "$HEAD_REPO" ]; then
          # Head repo data is unavailable (repo may have been deleted)
          # Treat as fork to avoid attempting authenticated pushes
          echo "⚠️ Head repo data is unavailable - skipping authenticated push"
          echo "is_fork=true" >> $GITHUB_OUTPUT
        elif [ "$HEAD_REPO" != "$BASE_REPO" ]; then
          echo "📌 PR is from a fork ($HEAD_REPO != $BASE_REPO) - will build but not push"
          echo "is_fork=true" >> $GITHUB_OUTPUT
        else
          echo "✅ PR is from the same repo ($HEAD_REPO)"
          echo "is_fork=false" >> $GITHUB_OUTPUT
        fi

    - name: Get short SHA
      id: short_sha
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Record start time
      id: start_time
      run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

    - name: Comment build started
      if: steps.fork_check.outputs.is_fork != 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const shortSha = `${{ steps.short_sha.outputs.sha_short }}`;
          const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${{ github.run_id }}`;
          const marker = '<!-- docker-build-comment -->';
          const registryLink = 'https://console.cloud.google.com/artifacts/docker/robusta-development/us-central1/temporary-builds/holmes?project=robusta-development';

          const issue_number = context.payload.pull_request.number;

          const existingComments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
          });
          const existing = existingComments.find(c => c.body?.includes(marker));

          // Clean up old-style comments from previous workflow version
          const oldMarker = 'Dev Docker images are ready for this commit:';
          const oldComments = existingComments.filter(c => c.body?.includes(oldMarker));
          for (const old of oldComments) {
            await github.rest.issues.deleteComment({ owner, repo, comment_id: old.id });
            core.info(`Deleted old-style comment #${old.id}`);
          }

          // Extract previous image tag from existing comment if present
          let previousImageSection = '';
          if (existing) {
            const tagMatch = existing.body.match(/holmes:([a-f0-9]{7})/);
            if (tagMatch && tagMatch[1] !== shortSha) {
              const prevSha = tagMatch[1];
              const prevHolmesTag = `us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes:${prevSha}`;
              const prevOperatorTag = `us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes-operator:${prevSha}`;
              previousImageSection = [
                '',
                '---',
                `📦 **Previous images (\`${prevSha}\`):**`,
                `- [${prevHolmesTag}](${registryLink})`,
                `- [${prevOperatorTag}](${registryLink.replace('holmes', 'holmes-operator')})`,
                '',
                '<details>',
                '<summary>📋 Copy commands</summary>',
                '',
                '⚠️ Temporary images are deleted after 30 days. Copy to a permanent registry before using them:',
                '```bash',
                'gcloud auth configure-docker us-central1-docker.pkg.dev',
                `docker pull ${prevHolmesTag}`,
                `docker tag ${prevHolmesTag} me-west1-docker.pkg.dev/robusta-development/development/holmes-dev:${prevSha}`,
                `docker push me-west1-docker.pkg.dev/robusta-development/development/holmes-dev:${prevSha}`,
                `docker pull ${prevOperatorTag}`,
                `docker tag ${prevOperatorTag} me-west1-docker.pkg.dev/robusta-development/development/holmes-operator-dev:${prevSha}`,
                `docker push me-west1-docker.pkg.dev/robusta-development/development/holmes-operator-dev:${prevSha}`,
                '```',
                '',
                'Patch Helm values in one line (choose the chart you use):',
                '',
                '**HolmesGPT chart:**',
                '```bash',
                'helm upgrade --install holmesgpt ./helm/holmes \\\\',
                '  --set registry=me-west1-docker.pkg.dev/robusta-development/development \\\\',
                `  --set image=holmes-dev:${prevSha} \\\\`,
                '  --set operator.registry=me-west1-docker.pkg.dev/robusta-development/development \\\\',
                `  --set operator.image=holmes-operator-dev:${prevSha}`,
                '```',
                '',
                '**Robusta wrapper chart:**',
                '```bash',
                'helm upgrade --install robusta robusta/robusta \\\\',
                '  --reuse-values \\\\',
                '  --set holmes.registry=me-west1-docker.pkg.dev/robusta-development/development \\\\',
                `  --set holmes.image=holmes-dev:${prevSha} \\\\`,
                '  --set holmes.operator.registry=me-west1-docker.pkg.dev/robusta-development/development \\\\',
                `  --set holmes.operator.image=holmes-operator-dev:${prevSha}`,
                '```',
                '</details>',
              ].join('\n');
            }
          }

          const message = [
            marker,
            `🔨 **Building Docker images for \`${shortSha}\`...** (x64 only)`,
            '',
            `[View build logs](${runUrl})`,
            previousImageSection,
          ].join('\n');

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body: message,
            });
            core.info(`Updated existing PR comment #${existing.id}`);
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: message,
            });
            core.info(`Commented on PR #${issue_number}`);
          }

    # Registry auth - only for non-fork PRs (fork PRs don't have access to push anyway)
    - uses: google-github-actions/auth@v2
      if: steps.fork_check.outputs.is_fork != 'true'
      with:
        project_id: 'robusta-development'
        workload_identity_provider: 'projects/479654156100/locations/global/workloadIdentityPools/github/providers/robusta-repos'

    - name: Set up gcloud CLI
      if: steps.fork_check.outputs.is_fork != 'true'
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: robusta-development

    - name: Configure Docker Registry
      if: steps.fork_check.outputs.is_fork != 'true'
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # For fork PRs: build only (no push, no registry tags)
    # For non-fork PRs: build and push to registry
    # Note: PR builds are x64-only for speed. Multi-arch builds happen on release.
    - name: Build Holmes Docker image (fork PR - no push)
      if: steps.fork_check.outputs.is_fork == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: false
        cache-from: type=gha,scope=holmes
        cache-to: type=gha,mode=max,scope=holmes

    - name: Build Holmes Operator Docker image (fork PR - no push)
      if: steps.fork_check.outputs.is_fork == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile.operator
        platforms: linux/amd64
        push: false
        cache-from: type=gha,scope=operator
        cache-to: type=gha,mode=max,scope=operator

    - name: Build and push Holmes Docker image
      if: steps.fork_check.outputs.is_fork != 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        tags: |
          us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes:${{ github.sha }}
          us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes:${{ steps.short_sha.outputs.sha_short }}
        cache-from: type=gha,scope=holmes
        cache-to: type=gha,mode=max,scope=holmes

    - name: Build and push Holmes Operator Docker image
      if: steps.fork_check.outputs.is_fork != 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile.operator
        platforms: linux/amd64
        push: true
        tags: |
          us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes-operator:${{ github.sha }}
          us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes-operator:${{ steps.short_sha.outputs.sha_short }}
        cache-from: type=gha,scope=operator
        cache-to: type=gha,mode=max,scope=operator

    - name: Print image locations
      if: steps.fork_check.outputs.is_fork != 'true'
      run: |
        echo "Docker images pushed (x64 only):"
        echo "Holmes:"
        echo "  us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes:${{ github.sha }}"
        echo "  us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes:${{ steps.short_sha.outputs.sha_short }}"
        echo "Holmes Operator:"
        echo "  us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes-operator:${{ github.sha }}"
        echo "  us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes-operator:${{ steps.short_sha.outputs.sha_short }}"

    - name: Comment with image details
      if: always() && steps.fork_check.outputs.is_fork != 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const shortSha = `${{ steps.short_sha.outputs.sha_short }}`;
          const jobStatus = `${{ job.status }}`;
          const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${{ github.run_id }}`;
          const marker = '<!-- docker-build-comment -->';

          // Calculate build duration
          const startTime = parseInt(`${{ steps.start_time.outputs.start }}`);
          const endTime = Math.floor(Date.now() / 1000);
          const durationSecs = endTime - startTime;
          const minutes = Math.floor(durationSecs / 60);
          const seconds = durationSecs % 60;
          const duration = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;

          let message;
          if (jobStatus === 'success') {
            const holmesTag = `us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes:${shortSha}`;
            const operatorTag = `us-central1-docker.pkg.dev/robusta-development/temporary-builds/holmes-operator:${shortSha}`;
            const holmesRegistryLink = 'https://console.cloud.google.com/artifacts/docker/robusta-development/us-central1/temporary-builds/holmes?project=robusta-development';
            const operatorRegistryLink = 'https://console.cloud.google.com/artifacts/docker/robusta-development/us-central1/temporary-builds/holmes-operator?project=robusta-development';

            message = [
              marker,
              `✅ **Docker images ready for \`${shortSha}\`** (built in ${duration})`,
              '',
              `- [${holmesTag}](${holmesRegistryLink})`,
              `- [${operatorTag}](${operatorRegistryLink})`,
              '',
              '> ⚠️ **Warning: does not support ARM** (ARM images are built on release only - not on every PR)',
              '',
              'Use these tags to pull the images for testing.',
              '',
              '<details>',
              '<summary>📋 Copy commands</summary>',
              '',
              '⚠️ Temporary images are deleted after 30 days. Copy to a permanent registry before using them:',
              '```bash',
              'gcloud auth configure-docker us-central1-docker.pkg.dev',
              `docker pull ${holmesTag}`,
              `docker tag ${holmesTag} me-west1-docker.pkg.dev/robusta-development/development/holmes-dev:${shortSha}`,
              `docker push me-west1-docker.pkg.dev/robusta-development/development/holmes-dev:${shortSha}`,
              `docker pull ${operatorTag}`,
              `docker tag ${operatorTag} me-west1-docker.pkg.dev/robusta-development/development/holmes-operator-dev:${shortSha}`,
              `docker push me-west1-docker.pkg.dev/robusta-development/development/holmes-operator-dev:${shortSha}`,
              '```',
              '',
              'Patch Helm values in one line (choose the chart you use):',
              '',
              '**HolmesGPT chart:**',
              '```bash',
              'helm upgrade --install holmesgpt ./helm/holmes \\',
              '  --set registry=me-west1-docker.pkg.dev/robusta-development/development \\',
              `  --set image=holmes-dev:${shortSha} \\`,
              '  --set operator.registry=me-west1-docker.pkg.dev/robusta-development/development \\',
              `  --set operator.image=holmes-operator-dev:${shortSha}`,
              '```',
              '',
              '**Robusta wrapper chart:**',
              '```bash',
              'helm upgrade --install robusta robusta/robusta \\',
              '  --reuse-values \\',
              '  --set holmes.registry=me-west1-docker.pkg.dev/robusta-development/development \\',
              `  --set holmes.image=holmes-dev:${shortSha} \\`,
              '  --set holmes.operator.registry=me-west1-docker.pkg.dev/robusta-development/development \\',
              `  --set holmes.operator.image=holmes-operator-dev:${shortSha}`,
              '```',
              '</details>',
            ].join('\n');
          } else {
            message = [
              marker,
              `❌ **Docker build failed for \`${shortSha}\`** (after ${duration})`,
              '',
              `[View build logs](${runUrl})`,
            ].join('\n');
          }

          const issue_number = context.payload.pull_request.number;

          const existingComments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
          });
          const existing = existingComments.find(c => c.body?.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body: message,
            });
            core.info(`Updated existing PR comment #${existing.id}`);
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: message,
            });
            core.info(`Commented on PR #${issue_number}`);
          }
