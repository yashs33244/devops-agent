# Default Nightshift connector catalog.
#
# This file is embedded into the nightshift-api binary at build time
# (//go:embed in internal/api/config/catalog.go) and reconciled into
# the records-store on every API startup. New connectors land in the
# UI as soon as a freshly-built image is rolled out — no chart change
# required.
#
# Operators who need to add private/internal connectors without
# upstreaming them can mount their own catalog YAML and point the
# chart value `nightshift_api.connectorCatalogFile` (which becomes
# NS_CONNECTOR_CATALOG_FILE) at it. That file replaces this one
# entirely; copy these entries forward as a starting point.
#
# Schema reference: internal/api/config/catalog.go (catalogEntry +
# catalogOAuthEntry).
#
# To contribute a new connector: append an entry below, open a PR.
# Reconciliation is create-only, so existing connectors with the same
# name survive across restarts even if the upstream entry changes —
# admins use the API's UpdateConnector RPC to evolve in place.

connectors:
  # ── motherduck ────────────────────────────────────────────────────
  # Reference implementation for a static-token (PAT) connector.
  #
  # No admin OAuth app, no OpenBao client_id/secret — each user pastes
  # their own MotherDuck personal access token in the UI's connector
  # detail dialog. The token persists at:
  #
  #   secret/nightshift/tokens/<user_id>/motherduck   (OpenBao KV)
  #
  # On every run, the worker's GetUserConfig call pulls the token,
  # materializes an Authorization: Bearer <token> header, and hands the
  # MCP server config to the Claude Agent SDK as
  # mcp__motherduck__* tools.
  #
  # Generate a PAT at https://app.motherduck.com → Settings →
  # Service tokens.
  - name: motherduck
    description: MotherDuck — serverless DuckDB analytics
    mcp_url: https://api.motherduck.com/mcp
    auth_type: static_token

  # ── How to add an OAuth connector ─────────────────────────────────
  # Uncomment + adapt. OAuth requires the operator to also drop client
  # credentials into OpenBao before the connector becomes usable:
  #
  #   bao kv put secret/nightshift/connectors/<name> \
  #     client_id=<from provider's OAuth app> \
  #     client_secret=<from provider's OAuth app>
  #
  # Until those creds exist, the catalog entry shows as `configured:
  # false` in the UI (greyed out, not clickable). The provider's OAuth
  # app must list the redirect URI:
  #
  #   <BETTER_AUTH_URL>/api/connectors/<name>/oauth-callback
  #
  # `oauth.provider`: "github" | "google" | "slack" | "microsoft" use
  # OpenBao's built-in providers. Anything else: "custom" + supply
  # auth_code_url + token_url under provider_options.
  #
  # `oauth_scopes`: provider-specific. Match the provider's docs
  # exactly (some space-separated, some comma, some plus).
  #
  # `auth_url_params`: extra query params appended to the authorize
  # URL. Common case: Dropbox needs token_access_type=offline to mint
  # a refresh_token.
  #
  # - name: github
  #   description: GitHub — repositories, issues, pull requests
  #   mcp_url: https://api.githubcopilot.com/mcp
  #   auth_type: oauth
  #   oauth:
  #     provider: github
  #
  # - name: linear
  #   description: Linear — issues, projects, cycles
  #   mcp_url: https://mcp.linear.app/sse
  #   auth_type: oauth
  #   oauth_scopes: read,write
  #   oauth:
  #     provider: custom
  #     provider_options:
  #       auth_code_url: https://linear.app/oauth/authorize
  #       token_url: https://api.linear.app/oauth/token

  # ── Google Workspace ──────────────────────────────────────────────
  # Google's official remote MCP servers. Five separate endpoints —
  # one per Workspace product — each with its own scope set, so users
  # grant only what they want exposed to agents.
  #
  # IMPORTANT: as of May 2026 these MCP servers are in Google's
  # "Workspace Developer Preview Program." The OAuth client's Google
  # Cloud project must be enrolled and approved before any tool call
  # will succeed. Until then, tools/list works (auth is recognized)
  # but every actual call returns "The caller does not have
  # permission" — even when the matching `*-json.googleapis.com` and
  # `*mcp.googleapis.com` APIs are enabled and the OAuth scopes are
  # granted. Enroll at: https://developers.google.com/workspace/preview
  # (turnaround is ~couple of days).
  #
  # All five share the same Google Cloud OAuth app (one client_id /
  # client_secret pair), but live under separate OpenBao secret paths
  # because the dispenser keys server registration by connector name.
  #
  # Operator setup, one-time, before any of these go "configured":
  #
  #   1. In Google Cloud Console (https://console.cloud.google.com),
  #      enable BOTH the underlying Workspace API *and* the matching
  #      MCP API for each product you want to use. Without the MCP
  #      API, tools/list succeeds but every actual tool call returns
  #      "The caller does not have permission":
  #
  #        gmail-json.googleapis.com    + gmailmcp.googleapis.com
  #        drive.googleapis.com         + drivemcp.googleapis.com
  #        calendar-json.googleapis.com + calendarmcp.googleapis.com
  #        chat.googleapis.com          + chatmcp.googleapis.com
  #        people.googleapis.com         (no separate -mcp service)
  #
  #   2. Create an OAuth 2.0 Client ID of type "Web application". Add
  #      a redirect URI for each connector you want to enable:
  #
  #        <BETTER_AUTH_URL>/api/connectors/google_gmail/oauth-callback
  #        <BETTER_AUTH_URL>/api/connectors/google_drive/oauth-callback
  #        <BETTER_AUTH_URL>/api/connectors/google_calendar/oauth-callback
  #        <BETTER_AUTH_URL>/api/connectors/google_chat/oauth-callback
  #        <BETTER_AUTH_URL>/api/connectors/google_contacts/oauth-callback
  #
  #   3. Drop the same client_id / client_secret into OpenBao under
  #      each connector's well-known path:
  #
  #        bao kv put secret/nightshift/connectors/google_gmail \
  #          client_id=<from Google Cloud> client_secret=<from Google Cloud>
  #        # …repeat for google_drive, google_calendar, google_chat, google_contacts
  #
  # Reference: https://developers.google.com/workspace/guides/configure-mcp-servers

  - name: google_gmail
    description: Gmail — read, search, draft, and send messages
    mcp_url: https://gmailmcp.googleapis.com/mcp/v1
    auth_type: oauth
    oauth_scopes: "https://www.googleapis.com/auth/gmail.readonly,https://www.googleapis.com/auth/gmail.compose"
    oauth:
      provider: google

  - name: google_drive
    description: Google Drive — list files, fetch contents, manage permissions
    mcp_url: https://drivemcp.googleapis.com/mcp/v1
    auth_type: oauth
    oauth_scopes: "https://www.googleapis.com/auth/drive.readonly,https://www.googleapis.com/auth/drive.file"
    oauth:
      provider: google

  - name: google_calendar
    description: Google Calendar — list calendars and events
    mcp_url: https://calendarmcp.googleapis.com/mcp/v1
    auth_type: oauth
    oauth_scopes: "https://www.googleapis.com/auth/calendar.calendarlist.readonly,https://www.googleapis.com/auth/calendar.events.freebusy,https://www.googleapis.com/auth/calendar.events.readonly"
    oauth:
      provider: google

  - name: google_chat
    description: Google Chat — read spaces, memberships, and messages
    mcp_url: https://chatmcp.googleapis.com/mcp/v1
    auth_type: oauth
    oauth_scopes: "https://www.googleapis.com/auth/chat.spaces.readonly,https://www.googleapis.com/auth/chat.memberships.readonly,https://www.googleapis.com/auth/chat.messages.readonly,https://www.googleapis.com/auth/chat.users.readstate.readonly"
    oauth:
      provider: google

  - name: google_contacts
    description: Google People — directory, contacts, and profile
    mcp_url: https://people.googleapis.com/mcp/v1
    auth_type: oauth
    oauth_scopes: "https://www.googleapis.com/auth/directory.readonly,https://www.googleapis.com/auth/userinfo.profile,https://www.googleapis.com/auth/contacts.readonly"
    oauth:
      provider: google

  # ── HubSpot ───────────────────────────────────────────────────────
  # HubSpot's official remote MCP server (GA April 2026). Requires
  # OAuth 2.1 with PKCE — the dispenser handles PKCE/S256 for every
  # OAuth entry by default. Scopes are determined at install time by
  # the tools the MCP server exposes, so we leave oauth_scopes empty;
  # the consent screen surfaces the actual permissions.
  #
  # Operator setup:
  #   1. In HubSpot, create an app at https://developers.hubspot.com,
  #      then under Development → MCP Auth Apps create an MCP auth
  #      app. Add this redirect URI:
  #        <BETTER_AUTH_URL>/api/connectors/hubspot/oauth-callback
  #   2. Drop credentials into OpenBao:
  #        bao kv put secret/nightshift/connectors/hubspot \
  #          client_id=<from HubSpot> client_secret=<from HubSpot>
  #
  # Reference: https://developers.hubspot.com/mcp
  - name: hubspot
    description: HubSpot — CRM contacts, companies, deals, tickets
    mcp_url: https://mcp.hubspot.com
    auth_type: oauth
    oauth:
      provider: hubspot

  # ── Dropbox ───────────────────────────────────────────────────────
  # Dropbox's official remote MCP server. OAuth 2.1 + PKCE.
  # token_access_type=offline forces Dropbox to issue a long-lived
  # refresh token (without it, refresh after access-token expiry
  # fails with "invalid_grant"). `resource` binds the issued token to
  # the MCP endpoint (RFC 8707); without it Dropbox mints a regular
  # API token and mcp.dropbox.com/mcp rejects it as `needs-auth`,
  # causing the SDK to fall back to dynamic client registration.
  #
  # `account_info.read` is required by mcp.dropbox.com for the
  # identity handshake on initialize — without it the server returns
  # 403 insufficient_scope and the SDK reports the connector as
  # `needs-auth`. `sharing.read` rounds out shared-folder visibility
  # to match `sharing.write`.
  #
  # Operator setup:
  #   1. Create an app at https://www.dropbox.com/developers/apps
  #      (Scoped access, Full Dropbox or App folder).
  #   2. Under Permissions, enable: account_info.read,
  #      files.metadata.read, files.content.read, files.content.write,
  #      sharing.read, sharing.write.
  #   3. Add redirect URI:
  #        <BETTER_AUTH_URL>/api/connectors/dropbox/oauth-callback
  #   4. Drop credentials into OpenBao:
  #        bao kv put secret/nightshift/connectors/dropbox \
  #          client_id=<from Dropbox> client_secret=<from Dropbox>
  #
  # Reference: https://help.dropbox.com/integrations/connect-dropbox-mcp-server
  - name: dropbox
    description: Dropbox — list, fetch, write, and share files
    mcp_url: https://mcp.dropbox.com/mcp
    auth_type: oauth
    oauth_scopes: "account_info.read files.metadata.read files.content.read files.content.write sharing.read sharing.write"
    oauth:
      provider: dropbox
      auth_url_params:
        token_access_type: offline
        resource: https://mcp.dropbox.com/mcp

  # ── Asana ─────────────────────────────────────────────────────────
  # Asana's V2 MCP server (GA late 2025; V1 deprecated 2026-05-11).
  # OAuth 2.0 with PKCE + a `resource` query parameter on authorize
  # that scopes the issued token to the MCP endpoint specifically
  # (not the general Asana API).
  #
  # No oauth_scopes: Asana MCP apps don't accept scope requests —
  # they auto-grant full access to all resources/actions on the
  # connecting workspace. Including a scopes list causes Asana to
  # reject authorize with `forbidden_scopes`. App permissions are
  # constrained at the Asana app level, not in the OAuth request.
  #
  # Operator setup:
  #   1. Go to https://app.asana.com/0/my-apps and create an app.
  #      Set the app type to "MCP app".
  #   2. Add redirect URI:
  #        <BETTER_AUTH_URL>/api/connectors/asana/oauth-callback
  #   3. Drop credentials into OpenBao:
  #        bao kv put secret/nightshift/connectors/asana \
  #          client_id=<from Asana> client_secret=<from Asana>
  #
  # Reference: https://developers.asana.com/docs/connecting-mcp-clients-to-asanas-v2-server
  - name: asana
    description: Asana — tasks, projects, workspaces
    mcp_url: https://mcp.asana.com/v2/mcp
    auth_type: oauth
    oauth:
      provider: asana
      auth_url_params:
        # Scopes the issued token to the MCP server resource per
        # Asana's V2 docs. Without it, tokens land on the general
        # Asana API surface and the MCP server rejects them.
        resource: https://mcp.asana.com/v2

  # ── Monday.com ────────────────────────────────────────────────────
  # monday.com's hosted MCP server. OAuth 2.1 + PKCE per the MCP
  # spec. Read-only scope set; extend `oauth_scopes` for write
  # access (e.g. `boards:write`).
  #
  # Operator setup:
  #   1. Create an app in monday's Developer Center
  #      (https://monday.com/developers/apps).
  #   2. Under the OAuth & Permissions tab, add the same scopes
  #      listed below, plus any write scopes you want to enable.
  #   3. Add redirect URI:
  #        <BETTER_AUTH_URL>/api/connectors/monday/oauth-callback
  #   4. Drop credentials into OpenBao:
  #        bao kv put secret/nightshift/connectors/monday \
  #          client_id=<from monday> client_secret=<from monday>
  #
  # Reference: https://support.monday.com/hc/en-us/articles/28588158981266
  - name: monday
    description: monday.com — boards, items, users, teams (read-only)
    mcp_url: https://mcp.monday.com/mcp
    auth_type: oauth
    oauth_scopes: "boards:read,users:read,teams:read,me:read"
    oauth:
      provider: monday

  # ── Docusign ──────────────────────────────────────────────────────
  # Docusign's official remote MCP server (beta as of 2026-05). OAuth
  # 2.0 Authorization Code Grant with PKCE. The dispenser doesn't have
  # a built-in "docusign" provider, so we use provider: custom with
  # the demo OAuth endpoints (account-d.docusign.com). For production
  # accounts, swap to account.docusign.com — Docusign also runs a
  # pre-registered prod MCP endpoint at mcp.docusign.com/mcp, but
  # access there is gated behind the MCP beta program.
  #
  # Scope `signature` covers eSign envelopes (send, status, recipients).
  # Add `extended` if you want refresh-token rotation across long
  # sessions, or `impersonation` if you ever move to JWT (not here).
  #
  # Operator setup:
  #   1. In the Docusign Admin → Apps and Keys page, create a
  #      "User Application" with Authorization Code Grant + PKCE.
  #   2. Generate a Secret Key. Copy both the Integration Key (=
  #      client_id) and Secret Key (= client_secret).
  #   3. Add redirect URI:
  #        <BETTER_AUTH_URL>/api/connectors/docusign/oauth-callback
  #   4. Drop credentials into OpenBao:
  #        bao kv put secret/nightshift/connectors/docusign \
  #          client_id=<Integration Key> client_secret=<Secret Key>
  #
  # Reference: https://developers.docusign.com/platform/mcp-server/
  - name: docusign
    description: Docusign — send envelopes, check signing status, manage agreements
    mcp_url: https://mcp-d.docusign.com/mcp
    auth_type: oauth
    # Scopes per mcp-d.docusign.com/.well-known/oauth-protected-resource:
    #   openid                     — required; without it Docusign issues
    #                                a Mosaic Token (MT) with a binary
    #                                payload that the MCP server's JWT
    #                                validator rejects as "Jwt payload
    #                                is an invalid JSON"
    #   signature                  — eSign envelopes (send, status,
    #                                recipients, templates)
    #   adm_store_unified_repo_read — Navigator (agreement repo) tools
    #   aow_manage                 — Maestro (agreement workflow) tools
    oauth_scopes: "openid signature adm_store_unified_repo_read aow_manage"
    oauth:
      provider: custom
      provider_options:
        auth_code_url: https://account-d.docusign.com/oauth/auth
        token_url: https://account-d.docusign.com/oauth/token
