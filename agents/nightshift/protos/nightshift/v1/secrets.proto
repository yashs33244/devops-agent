// Nightshift Secrets interface — vendor-neutral credential plane.
//
// Secrets is a first-class interface, distinct from Storage, because
// credentials require guarantees Storage does not offer: encryption at
// rest, structured masking in logs, and short-lived lease-based
// issuance of derived credentials. Backends include OpenBao, HashiCorp
// Vault, and Kubernetes Secrets (for minimal deployments).
//
// Two concerns live here:
//
//   * KV (Key-Value). Opaque `map<string, string>` payloads at
//     implementation-defined paths. Used for org-level secrets
//     (Anthropic API keys, worker callback secrets) and per-user
//     static bearer tokens referenced by the Config interface's
//     static_token connector path.
//
//   * Workload authentication. The contract by which control-plane
//     and worker pods acquire a bearer token against the Secrets
//     backend. Nightshift standardizes on Kubernetes ServiceAccount
//     auth: the pod presents its projected SA JWT, the backend
//     verifies it against Kubernetes' TokenReview API, and returns
//     a scoped client token with a lease that must be renewed
//     before expiry. This is the only bootstrap path specified;
//     implementations MAY offer additional auth methods out-of-band.
//
// Per-user OAuth credential management lives in the separate `Auth`
// service (`auth.proto`); operators may pick different backends for
// KV vs. OAuth dispensing.
syntax = "proto3";

package nightshift.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/nightshiftco/nightshift/gen/go/nightshift/v1;nightshiftv1";

// -----------------------------------------------------------------------------
// Entities
// -----------------------------------------------------------------------------

// Secret is a single KV payload at a path. Values are stringly-typed
// (`map<string, string>`) to match the KV v2 shape OpenBao and Vault
// expose; binary payloads MUST be encoded (for example base64) into
// string values by the caller.
message Secret {
  // Opaque path within the Secrets backend. Path semantics and the
  // rules for which callers may read which paths are defined by the
  // implementation; see `secrets.md` §3 for the recommended
  // user-scoped and org-scoped conventions.
  string path = 1;

  // Key/value payload. All values are strings.
  map<string, string> data = 2;

  // Monotonic server-assigned version. Each PutSecret produces a new
  // version; prior versions may be retained by the backend for
  // rollback. Implementations without versioning SHOULD return a
  // strictly increasing counter.
  int64 version = 3;

  // Time the first version at this path was written.
  google.protobuf.Timestamp created_at = 4;

  // Time the most recent version was written.
  google.protobuf.Timestamp updated_at = 5;
}

// AuthToken is a bearer credential issued by the Secrets backend
// against a workload login. Callers present `token` as
// `Authorization: Bearer <token>` on subsequent Secrets RPCs.
//
// The token is bound to a lease: it expires at `expires_at` and MUST
// be renewed via RenewLease (or re-minted via a fresh Login RPC)
// before then. Tokens MAY be revoked early via RevokeLease.
message AuthToken {
  // Bearer credential string. Opaque.
  string token = 1;

  // Identifier of the lease this token is bound to. Used with
  // RenewLease and RevokeLease.
  string lease_id = 2;

  // When `token` becomes invalid if not renewed.
  google.protobuf.Timestamp expires_at = 3;

  // Whether the lease may be renewed. When false, callers that need
  // continued access must call the Login RPC again to mint a fresh
  // token.
  bool renewable = 4;
}

// -----------------------------------------------------------------------------
// KV RPCs
// -----------------------------------------------------------------------------

// GetSecretRequest is the request message for GetSecret.
message GetSecretRequest {
  // Target path.
  string path = 1;

  // Optional version selector. When zero (the default), the latest
  // version is returned. When non-zero, the requested historical
  // version is returned if the backend retains it; otherwise the RPC
  // fails with NOT_FOUND.
  int64 version = 2;
}

// GetSecretResponse is the response message for GetSecret.
message GetSecretResponse {
  // The requested secret.
  Secret secret = 1;
}

// PutSecretRequest is the request message for PutSecret.
message PutSecretRequest {
  // Target path.
  string path = 1;

  // Key/value payload.
  map<string, string> data = 2;

  // Optional optimistic-concurrency check. When set, the RPC fails
  // with FAILED_PRECONDITION if the current version at `path` does
  // not match this value. Use 0 to require that the path does not
  // yet exist.
  int64 if_version = 3;
}

// PutSecretResponse is the response message for PutSecret.
message PutSecretResponse {
  // The written secret, including the newly assigned version.
  Secret secret = 1;
}

// DeleteSecretRequest is the request message for DeleteSecret.
//
// Deletion semantics match KV v2: the default is a soft delete of
// the latest version (the path appears absent to GetSecret, but
// historical versions are retained by the backend until compacted).
// Implementations without version retention perform a hard delete.
message DeleteSecretRequest {
  // Target path.
  string path = 1;

  // When true, permanently remove all versions at the path. Requires
  // the caller to hold destroy-level ACL on the path.
  bool destroy = 2;
}

// DeleteSecretResponse is the response message for DeleteSecret. It
// is intentionally empty.
message DeleteSecretResponse {}

// ListSecretsRequest is the request message for ListSecrets.
message ListSecretsRequest {
  // Prefix to list under. Required — callers may not list the entire
  // backend.
  string prefix = 1;

  // Maximum number of paths to return. The server may cap the value.
  int32 page_size = 2;

  // Opaque pagination token.
  string page_token = 3;
}

// ListSecretsResponse is the response message for ListSecrets.
message ListSecretsResponse {
  // Matching paths under `prefix`. Values are returned relative to
  // the backend root, not relative to `prefix`.
  repeated string paths = 1;

  // Opaque pagination token. Empty when there are no further
  // results.
  string next_page_token = 2;
}

// -----------------------------------------------------------------------------
// Workload auth RPCs
// -----------------------------------------------------------------------------

// LoginWithKubernetesRequest is the request message for
// LoginWithKubernetes. The caller presents its projected
// ServiceAccount JWT; the implementation verifies it against
// Kubernetes' TokenReview API (or equivalent) and returns a scoped
// AuthToken.
message LoginWithKubernetesRequest {
  // Name of the Secrets-backend role that maps the presenting
  // ServiceAccount to an ACL policy. Implementations MUST refuse
  // login when the presented JWT's (namespace, service-account) pair
  // is not bound to the requested role.
  string role = 1;

  // Projected ServiceAccount token. The implementation passes this
  // to Kubernetes' TokenReview endpoint for verification; Nightshift
  // does not specify the projection audience (implementations
  // configure it to match their Kubernetes cluster's settings).
  string jwt = 2;
}

// LoginWithKubernetesResponse is the response message for
// LoginWithKubernetes.
message LoginWithKubernetesResponse {
  // Scoped bearer credential and its lease.
  AuthToken auth = 1;
}

// RenewLeaseRequest is the request message for RenewLease.
message RenewLeaseRequest {
  // Identifier of the lease to renew.
  string lease_id = 1;

  // Optional requested increment in seconds. The backend may cap the
  // renewal to its configured maximum; the actual new expiry is
  // returned in the response.
  int64 increment_seconds = 2;
}

// RenewLeaseResponse is the response message for RenewLease.
message RenewLeaseResponse {
  // The new expiry time.
  google.protobuf.Timestamp expires_at = 1;

  // Whether the lease remains renewable. When false, callers must
  // re-authenticate before `expires_at` rather than renewing again.
  bool renewable = 2;
}

// RevokeLeaseRequest is the request message for RevokeLease.
message RevokeLeaseRequest {
  // Identifier of the lease to revoke.
  string lease_id = 1;
}

// RevokeLeaseResponse is the response message for RevokeLease. It is
// intentionally empty.
message RevokeLeaseResponse {}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

// Secrets is the vendor-neutral credential plane of Nightshift. It
// exposes two groups of RPCs — KV operations and workload
// authentication + lease management — that together cover the
// encrypted-KV and bootstrap-credential needs of a conforming
// control plane. Per-user OAuth credential dispensing lives in the
// `Auth` service (`auth.proto`).
service Secrets {
  // -------------------- KV --------------------

  // GetSecret reads a KV secret by path. Optional `version` selects
  // a historical version when the backend supports versioning.
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse) {
    option (google.api.http) = {
      get: "/v1/secrets/{path=**}"
    };
  }

  // PutSecret writes a KV secret. Uses optimistic concurrency when
  // `if_version` is set.
  rpc PutSecret(PutSecretRequest) returns (PutSecretResponse) {
    option (google.api.http) = {
      put: "/v1/secrets/{path=**}"
      body: "*"
    };
  }

  // DeleteSecret removes a KV secret. Soft delete by default; set
  // `destroy=true` to hard-delete all versions.
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse) {
    option (google.api.http) = {
      delete: "/v1/secrets/{path=**}"
    };
  }

  // ListSecrets returns paths under a prefix. Prefix is required —
  // implementations MUST NOT permit listing the entire backend.
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse) {
    option (google.api.http) = {
      get: "/v1/secrets:list"
    };
  }

  // -------------------- Workload auth --------------------

  // LoginWithKubernetes authenticates a workload via its projected
  // ServiceAccount JWT and returns a scoped AuthToken bound to a
  // role-policy mapping in the backend.
  rpc LoginWithKubernetes(LoginWithKubernetesRequest) returns (LoginWithKubernetesResponse) {
    option (google.api.http) = {
      post: "/v1/auth/kubernetes:login"
      body: "*"
    };
  }

  // RenewLease extends the expiry of a previously issued AuthToken
  // or other lease. Implementations cap the renewal window at their
  // configured maximum.
  rpc RenewLease(RenewLeaseRequest) returns (RenewLeaseResponse) {
    option (google.api.http) = {
      post: "/v1/leases/{lease_id}:renew"
      body: "*"
    };
  }

  // RevokeLease immediately invalidates a lease.
  rpc RevokeLease(RevokeLeaseRequest) returns (RevokeLeaseResponse) {
    option (google.api.http) = {
      post: "/v1/leases/{lease_id}:revoke"
      body: "*"
    };
  }
}
