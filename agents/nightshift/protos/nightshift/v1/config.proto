// Nightshift Config interface — declarations of agents, skills, and
// connectors, plus the per-user resolver Workers call at run start.
//
// Config is a domain service layered on Storage. Three resource types
// live here:
//
//   * Agents. Per-user sub-agent definitions (name, description,
//     prompt, allowed tools, model). Passed programmatically to the
//     agent SDK at run start.
//   * Skills. Per-user skill definitions (name, description, SKILL.md
//     content). Hydrated to the worker's filesystem at run start so
//     the agent SDK can discover them.
//   * Connectors. Admin-managed registry of MCP servers with two auth
//     paths — an OAuth code flow whose per-user tokens are minted on
//     demand, and a static bearer token paste-in flow for MCP servers
//     that don't implement OAuth. MCP transport (SSE vs streamable
//     HTTP) is derived from the connector URL; see `config.md` §7.
//
// All three are persisted as Storage Records. Credentials (OAuth
// tokens, static bearer tokens) are NOT stored here — they flow
// through the Secrets interface defined in chunk 5. Config references
// a user's credential by convention; it never holds the bytes.
//
// The Config Dispenser is a single RPC (`GetUserConfig`) that
// materializes a user's effective runtime configuration: their agents,
// their skills, and the MCP server configs for every connector the
// user has successfully authorized. Workers call it once at run start.
//
// Application-level RBAC:
//
//   * Connector writes (`CreateConnector`, `DeleteConnector`) are
//     admin-only — a connector is shared organizational state and
//     mistakes ripple across every user.
//   * Agent, skill, and user-connector-token writes are personal
//     resources. Implementations gate writes on ownership (the caller
//     must match the resource's `user_id`).
syntax = "proto3";

package nightshift.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/nightshiftco/nightshift/gen/go/nightshift/v1;nightshiftv1";

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

// ConnectorAuthType declares how a connector acquires per-user
// credentials.
enum ConnectorAuthType {
  // Proto3 default. Conforming implementations should not return this.
  CONNECTOR_AUTH_TYPE_UNSPECIFIED = 0;

  // Standard OAuth 2.0 authorization code flow. Admin provisions
  // client_id/client_secret out-of-band (typically in Secrets under a
  // convention path); users complete an interactive authorization
  // flow; per-user tokens are stored and auto-refreshed by the
  // implementation's Secrets backend.
  CONNECTOR_AUTH_TYPE_OAUTH = 1;

  // Long-lived bearer token pasted in by each user (for example a
  // MotherDuck PAT). No admin OAuth app. Token is stored in Secrets
  // and set as `Authorization: Bearer <token>` on the MCP request
  // verbatim — no refresh flow.
  CONNECTOR_AUTH_TYPE_STATIC_TOKEN = 2;
}

// McpTransport is the wire protocol an MCP server speaks.
//
// The transport is NOT stored on Connector — it is derived from the
// connector URL at resolve time, so the connector catalog does not
// carry transport metadata. See `config.md` §7 for the derivation
// rule.
enum McpTransport {
  // Proto3 default. Conforming implementations should not emit this.
  MCP_TRANSPORT_UNSPECIFIED = 0;

  // Streamable HTTP transport.
  MCP_TRANSPORT_HTTP = 1;

  // Server-Sent Events transport.
  MCP_TRANSPORT_SSE = 2;
}

// -----------------------------------------------------------------------------
// Agents
// -----------------------------------------------------------------------------

// Agent is a per-user sub-agent definition. At run start, Workers
// receive the user's agents via GetUserConfig and pass them to the
// agent SDK programmatically (no filesystem writes needed).
message Agent {
  // Server-assigned identifier.
  string id = 1;

  // Owning user. Agents are personal resources and are not visible to
  // other users.
  string user_id = 2;

  // Agent identifier. Unique within the owner's collection. Used as
  // the dictionary key when the worker hands agents to the SDK.
  string name = 3;

  // Human-readable description. The agent SDK routes delegated work
  // to the sub-agent whose description best matches the intent, so
  // this text is load-bearing.
  string description = 4;

  // System prompt the sub-agent runs under.
  string prompt = 5;

  // Tools the sub-agent is allowed to use. Must be a subset of the
  // parent agent's allowed tools at run time; Config does not enforce
  // this — the worker does.
  repeated string tools = 6;

  // Model identifier (for example `"haiku"`, `"sonnet"`, `"opus"`).
  // Empty means the run-level default.
  string model = 7;

  // Time the agent was first created.
  google.protobuf.Timestamp created_at = 8;

  // Time the agent was most recently updated.
  google.protobuf.Timestamp updated_at = 9;
}

// CreateAgentRequest is the request message for CreateAgent.
message CreateAgentRequest {
  // Owning user.
  string user_id = 1;

  // Unique name within `user_id`.
  string name = 2;

  // Description used by the SDK for delegation matching.
  string description = 3;

  // System prompt.
  string prompt = 4;

  // Allowed tool names.
  repeated string tools = 5;

  // Optional model override.
  string model = 6;

  // Optional idempotency key.
  string idempotency_key = 7;
}

// CreateAgentResponse is the response message for CreateAgent.
message CreateAgentResponse {
  // The newly created agent.
  Agent agent = 1;
}

// GetAgentRequest is the request message for GetAgent.
message GetAgentRequest {
  // Target agent identifier.
  string agent_id = 1;
}

// GetAgentResponse is the response message for GetAgent.
message GetAgentResponse {
  // The requested agent.
  Agent agent = 1;
}

// ListAgentsRequest is the request message for ListAgents. Always
// scoped to a single user.
message ListAgentsRequest {
  // Owning user to list agents for.
  string user_id = 1;

  // Maximum number of agents to return. The server may cap the value.
  int32 page_size = 2;

  // Opaque pagination token.
  string page_token = 3;
}

// ListAgentsResponse is the response message for ListAgents.
message ListAgentsResponse {
  // Matching agents on this page.
  repeated Agent agents = 1;

  // Opaque pagination token. Empty when there are no further results.
  string next_page_token = 2;
}

// UpdateAgentRequest is the request message for UpdateAgent. Unset
// fields are preserved.
message UpdateAgentRequest {
  // Target agent identifier.
  string agent_id = 1;

  // Optional replacement name. Must remain unique within the owner's
  // collection.
  optional string name = 2;

  // Optional replacement description.
  optional string description = 3;

  // Optional replacement prompt.
  optional string prompt = 4;

  // Optional replacement tool list. Sent in full; partial merges are
  // not supported.
  repeated string tools = 5;

  // Whether `tools` is being set (true) or left alone (false). Needed
  // to distinguish "clear the tool list" (set=true, tools empty) from
  // "leave the tool list" (set=false).
  bool set_tools = 6;

  // Optional replacement model.
  optional string model = 7;
}

// UpdateAgentResponse is the response message for UpdateAgent.
message UpdateAgentResponse {
  // The agent after the update.
  Agent agent = 1;
}

// DeleteAgentRequest is the request message for DeleteAgent.
message DeleteAgentRequest {
  // Target agent identifier.
  string agent_id = 1;
}

// DeleteAgentResponse is the response message for DeleteAgent. It is
// intentionally empty.
message DeleteAgentResponse {}

// -----------------------------------------------------------------------------
// Skills
// -----------------------------------------------------------------------------

// Skill is a per-user skill definition. Unlike Agents, skills must be
// filesystem artifacts at `.claude/skills/{name}/SKILL.md` at run time
// — the agent SDK has no programmatic API for skills. Workers hydrate
// `content` to the workspace filesystem at run start.
message Skill {
  // Server-assigned identifier.
  string id = 1;

  // Owning user.
  string user_id = 2;

  // Skill identifier. Unique within the owner's collection. Used as
  // the directory name under `.claude/skills/`.
  string name = 3;

  // Human-readable description. The agent SDK matches delegation
  // targets on this text.
  string description = 4;

  // Full SKILL.md text, including the YAML frontmatter block the SDK
  // parses.
  string content = 5;

  // Time the skill was first created.
  google.protobuf.Timestamp created_at = 6;

  // Time the skill was most recently updated.
  google.protobuf.Timestamp updated_at = 7;
}

// CreateSkillRequest is the request message for CreateSkill.
message CreateSkillRequest {
  // Owning user.
  string user_id = 1;

  // Unique name within `user_id`.
  string name = 2;

  // Description used by the SDK for delegation matching.
  string description = 3;

  // Full SKILL.md text.
  string content = 4;

  // Optional idempotency key.
  string idempotency_key = 5;
}

// CreateSkillResponse is the response message for CreateSkill.
message CreateSkillResponse {
  // The newly created skill.
  Skill skill = 1;
}

// GetSkillRequest is the request message for GetSkill.
message GetSkillRequest {
  // Target skill identifier.
  string skill_id = 1;
}

// GetSkillResponse is the response message for GetSkill.
message GetSkillResponse {
  // The requested skill.
  Skill skill = 1;
}

// ListSkillsRequest is the request message for ListSkills.
message ListSkillsRequest {
  // Owning user.
  string user_id = 1;

  // Maximum number of skills to return.
  int32 page_size = 2;

  // Opaque pagination token.
  string page_token = 3;
}

// ListSkillsResponse is the response message for ListSkills.
message ListSkillsResponse {
  // Matching skills on this page.
  repeated Skill skills = 1;

  // Opaque pagination token.
  string next_page_token = 2;
}

// UpdateSkillRequest is the request message for UpdateSkill. Unset
// fields are preserved.
message UpdateSkillRequest {
  // Target skill identifier.
  string skill_id = 1;

  // Optional replacement name.
  optional string name = 2;

  // Optional replacement description.
  optional string description = 3;

  // Optional replacement SKILL.md content.
  optional string content = 4;
}

// UpdateSkillResponse is the response message for UpdateSkill.
message UpdateSkillResponse {
  // The skill after the update.
  Skill skill = 1;
}

// DeleteSkillRequest is the request message for DeleteSkill.
message DeleteSkillRequest {
  // Target skill identifier.
  string skill_id = 1;
}

// DeleteSkillResponse is the response message for DeleteSkill. It is
// intentionally empty.
message DeleteSkillResponse {}

// -----------------------------------------------------------------------------
// Connectors
// -----------------------------------------------------------------------------

// Connector is an admin-managed MCP server registry entry. One row
// per connector name (for example `"github"`, `"linear"`,
// `"motherduck"`) — connectors are shared organizational state, not
// per-user.
message Connector {
  // Server-assigned identifier.
  string id = 1;

  // Display identifier used in URLs and user-facing labels. Unique
  // across the control plane.
  string name = 2;

  // Human-readable description of what the connector provides.
  string description = 3;

  // How this connector authenticates per-user — OAuth vs static
  // token.
  ConnectorAuthType auth_type = 4;

  // Remote MCP server URL. The transport (HTTP vs SSE) is derived
  // from this URL at resolve time; see `config.md` §7.
  string mcp_url = 5;

  // Tool name wildcards the agent is allowed to invoke on this MCP
  // server (for example `["mcp__github__*"]`). Passed through to the
  // agent SDK's allowed-tools list when the user has authorized the
  // connector.
  repeated string mcp_allowed_tools = 6;

  // OAuth-only: comma-separated scopes the authorization flow
  // requests. Empty for static-token connectors.
  string oauth_scopes = 7;

  // Optional implementation-specific hint pointing at the Secrets
  // backend's representation of the OAuth app registration (for
  // example an OpenBao `oauthapp` server name). Implementations that
  // don't need this leave it empty. Not meaningful for static-token
  // connectors.
  string auth_provider_ref = 8;

  // Time the connector was first created.
  google.protobuf.Timestamp created_at = 9;

  // Time the connector was most recently updated.
  google.protobuf.Timestamp updated_at = 10;

  // Tool names the agent must NOT invoke. Passed through to the agent
  // SDK's `disallowed_tools` list. Use exact fully-qualified names
  // like `["mcp__dropbox__list_folder"]` — suffix wildcards do NOT
  // match exact names (verified against claude-agent-sdk 0.1.39).
  // Use to bypass upstream MCP tools whose JSON Schema is rejected by
  // the Anthropic Messages API (top-level oneOf/allOf/anyOf).
  repeated string mcp_disallowed_tools = 11;
}

// ConnectorCatalogEntry is a single row in ListConnectors — the
// Connector plus per-user, per-catalog state.
message ConnectorCatalogEntry {
  // The connector definition.
  Connector connector = 1;

  // Whether the connector is backed by admin credentials in Secrets.
  // For OAuth connectors this means client_id + client_secret are
  // present in the Secrets backend. For static-token connectors this
  // is always true (no admin setup is required).
  bool configured = 2;

  // Whether the caller user has successfully authorized the
  // connector — i.e. Secrets holds a usable credential under the
  // per-user convention. Only populated when the request carries a
  // user_id.
  bool connected = 3;
}

// CreateConnectorRequest is the request message for CreateConnector.
// Admin-only; writes a shared organizational resource.
message CreateConnectorRequest {
  // Display identifier. Unique across the control plane.
  string name = 1;

  // Human-readable description.
  string description = 2;

  // OAuth vs static-token auth flow.
  ConnectorAuthType auth_type = 3;

  // Remote MCP server URL.
  string mcp_url = 4;

  // Tool name wildcards allowed on this connector.
  repeated string mcp_allowed_tools = 5;

  // OAuth-only scopes.
  string oauth_scopes = 6;

  // Optional auth-provider hint for the Secrets backend.
  string auth_provider_ref = 7;

  // Optional idempotency key.
  string idempotency_key = 8;

  // Tool names the agent must NOT invoke. See `Connector.mcp_disallowed_tools`.
  repeated string mcp_disallowed_tools = 9;
}

// CreateConnectorResponse is the response message for CreateConnector.
message CreateConnectorResponse {
  // The newly created connector.
  Connector connector = 1;
}

// DeleteConnectorRequest is the request message for DeleteConnector.
// Admin-only. Cascades to delete every user's stored credentials for
// this connector.
message DeleteConnectorRequest {
  // Target connector identifier.
  string connector_id = 1;
}

// DeleteConnectorResponse is the response message for DeleteConnector.
// It is intentionally empty.
message DeleteConnectorResponse {}

// ListConnectorsRequest is the request message for ListConnectors.
message ListConnectorsRequest {
  // Optional user whose per-connector connection state should be
  // reflected in the `connected` field of each entry. When empty,
  // `connected` is always false.
  string user_id = 1;

  // Maximum number of connectors to return.
  int32 page_size = 2;

  // Opaque pagination token.
  string page_token = 3;
}

// ListConnectorsResponse is the response message for ListConnectors.
message ListConnectorsResponse {
  // Matching connector catalog entries on this page.
  repeated ConnectorCatalogEntry entries = 1;

  // Opaque pagination token.
  string next_page_token = 2;
}

// StartConnectorOAuthFlowRequest is the request message for
// StartConnectorOAuthFlow. Applicable only to OAuth connectors.
message StartConnectorOAuthFlowRequest {
  // User initiating the flow.
  string user_id = 1;

  // Target connector by display identifier.
  string connector_name = 2;

  // URL the OAuth provider will redirect to after authorization. The
  // implementation's OAuth callback handler must be reachable at
  // this URL.
  string redirect_url = 3;
}

// StartConnectorOAuthFlowResponse is the response message for
// StartConnectorOAuthFlow.
message StartConnectorOAuthFlowResponse {
  // URL the caller should redirect the user's browser to.
  string authorize_url = 1;

  // Opaque state token the caller must pass back to
  // CompleteConnectorOAuthFlow to prove the callback corresponds to
  // this flow. Implementations typically encode user_id and a nonce.
  string state = 2;
}

// CompleteConnectorOAuthFlowRequest is the request message for
// CompleteConnectorOAuthFlow. Invoked by the implementation's HTTP
// OAuth callback endpoint after the user returns from the provider.
message CompleteConnectorOAuthFlowRequest {
  // User whose flow this completes. Implementations verify this
  // matches the user encoded in `state`.
  string user_id = 1;

  // Target connector by display identifier.
  string connector_name = 2;

  // Authorization code the OAuth provider sent back to the redirect
  // URL.
  string code = 3;

  // State token from StartConnectorOAuthFlow. Must match to prevent
  // CSRF.
  string state = 4;

  // The same redirect URL passed to StartConnectorOAuthFlow.
  string redirect_url = 5;
}

// CompleteConnectorOAuthFlowResponse is the response message for
// CompleteConnectorOAuthFlow. Intentionally empty — on success the
// per-user credential is stored in Secrets under the implementation's
// convention and GetUserConfig will surface the connector in the
// user's `mcp_servers`.
message CompleteConnectorOAuthFlowResponse {}

// SetConnectorStaticTokenRequest is the request message for
// SetConnectorStaticToken. Applicable only to static-token connectors.
message SetConnectorStaticTokenRequest {
  // User the token belongs to.
  string user_id = 1;

  // Target connector by display identifier.
  string connector_name = 2;

  // The bearer token the user supplies. Stored in Secrets under the
  // per-user convention.
  string token = 3;
}

// SetConnectorStaticTokenResponse is the response message for
// SetConnectorStaticToken. It is intentionally empty.
message SetConnectorStaticTokenResponse {}

// DisconnectConnectorRequest is the request message for
// DisconnectConnector. Works for both auth types — deletes the
// per-user OAuth credential or static token.
message DisconnectConnectorRequest {
  // User whose credential should be cleared.
  string user_id = 1;

  // Target connector by display identifier.
  string connector_name = 2;
}

// DisconnectConnectorResponse is the response message for
// DisconnectConnector. It is intentionally empty.
message DisconnectConnectorResponse {}

// -----------------------------------------------------------------------------
// Config Dispenser
// -----------------------------------------------------------------------------

// AgentDefinition is the shape a worker consumes when handing a
// sub-agent to the agent SDK at run time. It is a strict subset of
// Agent with `id`, `user_id`, and timestamps stripped.
message AgentDefinition {
  string name = 1;
  string description = 2;
  string prompt = 3;
  repeated string tools = 4;
  string model = 5;
}

// SkillDefinition is the shape a worker consumes when hydrating a
// skill onto the run workspace filesystem.
message SkillDefinition {
  string name = 1;
  string content = 2;
}

// McpServerConfig is one entry in the `mcp_servers` map a worker
// passes to the agent SDK. `transport` is derived from `url` by the
// Config Dispenser (see `config.md` §7); `headers` carries the
// per-user `Authorization` header materialized from Secrets.
message McpServerConfig {
  // Connector name.
  string name = 1;

  // Transport derived from `url`.
  McpTransport transport = 2;

  // Remote MCP server URL.
  string url = 3;

  // HTTP headers to send with every MCP request. Typically contains
  // `Authorization: Bearer <token>`.
  map<string, string> headers = 4;
}

// UserConfig is the materialized runtime configuration for a user,
// returned by GetUserConfig. It captures a point-in-time snapshot —
// implementations MAY re-resolve on every call or cache briefly.
message UserConfig {
  // User this config belongs to.
  string user_id = 1;

  // All sub-agent definitions this user owns.
  repeated AgentDefinition agents = 2;

  // All skill definitions this user owns.
  repeated SkillDefinition skills = 3;

  // MCP server configs for every connector the user has successfully
  // authorized. Keyed by connector name for convenience on the wire;
  // the name is duplicated inside each McpServerConfig.
  map<string, McpServerConfig> mcp_servers = 4;

  // Tool-name wildcards to add to the agent SDK's allowed-tools list.
  // The union of `mcp_allowed_tools` across every entry in
  // `mcp_servers`.
  repeated string allowed_mcp_tools = 5;

  // Tool names to add to the agent SDK's disallowed-tools list. The
  // union of `mcp_disallowed_tools` across every entry in `mcp_servers`.
  repeated string disallowed_mcp_tools = 6;
}

// GetUserConfigRequest is the request message for GetUserConfig. This
// is the Config Dispenser resolver — Workers call it once at run
// start to materialize the user's effective runtime configuration.
message GetUserConfigRequest {
  // User to resolve config for.
  string user_id = 1;
}

// GetUserConfigResponse is the response message for GetUserConfig.
message GetUserConfigResponse {
  // The materialized config.
  UserConfig config = 1;
}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

// Config is the Nightshift configuration interface. It exposes CRUD
// for per-user agents and skills, an admin + per-user mix for
// connectors, and a single resolver RPC (`GetUserConfig`) that
// materializes a user's effective runtime configuration for Workers.
service Config {
  // -------------------- Agents --------------------

  // CreateAgent registers a new sub-agent definition for a user.
  // Owner write.
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse) {
    option (google.api.http) = {
      post: "/v1/agents"
      body: "*"
    };
  }

  // GetAgent reads an agent by id.
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse) {
    option (google.api.http) = {
      get: "/v1/agents/{agent_id}"
    };
  }

  // ListAgents returns a user's agents.
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse) {
    option (google.api.http) = {
      get: "/v1/agents"
    };
  }

  // UpdateAgent modifies fields on an existing agent. Owner write.
  rpc UpdateAgent(UpdateAgentRequest) returns (UpdateAgentResponse) {
    option (google.api.http) = {
      patch: "/v1/agents/{agent_id}"
      body: "*"
    };
  }

  // DeleteAgent removes an agent. Owner write.
  rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse) {
    option (google.api.http) = {
      delete: "/v1/agents/{agent_id}"
    };
  }

  // -------------------- Skills --------------------

  // CreateSkill registers a new skill for a user. Owner write.
  rpc CreateSkill(CreateSkillRequest) returns (CreateSkillResponse) {
    option (google.api.http) = {
      post: "/v1/skills"
      body: "*"
    };
  }

  // GetSkill reads a skill by id.
  rpc GetSkill(GetSkillRequest) returns (GetSkillResponse) {
    option (google.api.http) = {
      get: "/v1/skills/{skill_id}"
    };
  }

  // ListSkills returns a user's skills.
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse) {
    option (google.api.http) = {
      get: "/v1/skills"
    };
  }

  // UpdateSkill modifies fields on an existing skill. Owner write.
  rpc UpdateSkill(UpdateSkillRequest) returns (UpdateSkillResponse) {
    option (google.api.http) = {
      patch: "/v1/skills/{skill_id}"
      body: "*"
    };
  }

  // DeleteSkill removes a skill. Owner write.
  rpc DeleteSkill(DeleteSkillRequest) returns (DeleteSkillResponse) {
    option (google.api.http) = {
      delete: "/v1/skills/{skill_id}"
    };
  }

  // -------------------- Connectors --------------------

  // CreateConnector registers a new MCP connector. Admin-only —
  // connectors are shared organizational state.
  rpc CreateConnector(CreateConnectorRequest) returns (CreateConnectorResponse) {
    option (google.api.http) = {
      post: "/v1/connectors"
      body: "*"
    };
  }

  // DeleteConnector removes a connector and cascades to delete every
  // user's stored credentials for it. Admin-only.
  rpc DeleteConnector(DeleteConnectorRequest) returns (DeleteConnectorResponse) {
    option (google.api.http) = {
      delete: "/v1/connectors/{connector_id}"
    };
  }

  // ListConnectors returns the connector catalog with per-user
  // connection state. Visible to any authenticated caller; the
  // `connected` field is populated only when `user_id` is set on the
  // request.
  rpc ListConnectors(ListConnectorsRequest) returns (ListConnectorsResponse) {
    option (google.api.http) = {
      get: "/v1/connectors"
    };
  }

  // StartConnectorOAuthFlow returns the URL the caller should
  // redirect the user's browser to. OAuth connectors only.
  rpc StartConnectorOAuthFlow(StartConnectorOAuthFlowRequest) returns (StartConnectorOAuthFlowResponse) {
    option (google.api.http) = {
      post: "/v1/connectors/{connector_name}:startOAuthFlow"
      body: "*"
    };
  }

  // CompleteConnectorOAuthFlow exchanges the authorization code
  // returned by the OAuth provider for per-user tokens, which are
  // stored in Secrets under the implementation's convention. OAuth
  // connectors only.
  rpc CompleteConnectorOAuthFlow(CompleteConnectorOAuthFlowRequest) returns (CompleteConnectorOAuthFlowResponse) {
    option (google.api.http) = {
      post: "/v1/connectors/{connector_name}:completeOAuthFlow"
      body: "*"
    };
  }

  // SetConnectorStaticToken stores a user-supplied bearer token for
  // a static-token connector. Static-token connectors only.
  rpc SetConnectorStaticToken(SetConnectorStaticTokenRequest) returns (SetConnectorStaticTokenResponse) {
    option (google.api.http) = {
      post: "/v1/connectors/{connector_name}:setStaticToken"
      body: "*"
    };
  }

  // DisconnectConnector deletes the caller user's stored credential
  // for a connector. Works for both auth types.
  rpc DisconnectConnector(DisconnectConnectorRequest) returns (DisconnectConnectorResponse) {
    option (google.api.http) = {
      post: "/v1/connectors/{connector_name}:disconnect"
      body: "*"
    };
  }

  // -------------------- Config Dispenser --------------------

  // GetUserConfig returns a user's materialized runtime configuration
  // — agents, skills, and the MCP server configs for every connector
  // the user has successfully authorized. Workers call this once at
  // run start. Credentials come from Secrets at resolve time; the
  // returned `mcp_servers[*].headers` entries carry the live tokens.
  rpc GetUserConfig(GetUserConfigRequest) returns (GetUserConfigResponse) {
    option (google.api.http) = {
      get: "/v1/users/{user_id}/config"
    };
  }
}
