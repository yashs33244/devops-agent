# nightshift worker — default deny.
#
# Empty ingress and egress on the worker selector means: deny everything
# unless an explicit allow CNP (sibling files in this directory) adds it.
# The reference worker speaks gRPC to nightshift-api and resolves DNS;
# everything else is unauthorized and dropped at the kernel.
#
# Forward note for chunk 14: the LLM worker (`nightshift-worker-claude`)
# will add an FQDN allowlist CNP for the Anthropic API. Do NOT relax
# this default-deny — extend via additive rules only.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: nightshift-worker-default-deny
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: nightshift
      app.kubernetes.io/component: worker
  ingress: []
  egress: []
