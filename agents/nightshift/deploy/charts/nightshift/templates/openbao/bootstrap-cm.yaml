{{- if .Values.openbao.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-oidc-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao-bootstrap
  annotations:
    # Pre-install hook so the ConfigMap exists before the post-install
    # bootstrap Job mounts it. Helm keeps it across upgrades so re-runs
    # read the same scripts.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  oidc-bootstrap.sh: |-
{{ .Files.Get "files/openbao/oidc-bootstrap.sh" | indent 4 }}
  nightshift-api-policy.hcl: |-
{{ .Files.Get "files/openbao/nightshift-api-policy.hcl" | indent 4 }}
  nightshift-worker-policy.hcl: |-
{{ .Files.Get "files/openbao/nightshift-worker-policy.hcl" | indent 4 }}
  nightshift-admin-policy.hcl: |-
{{ .Files.Get "files/openbao/nightshift-admin-policy.hcl" | indent 4 }}
{{- end }}
