{{- /*
  Post-install Job that runs the OIDC bootstrap script against the
  initialized + unsealed OpenBao. Runs at hook weight 0, after the
  init Job (weight -5).

  Hook, not workload — disappears after `ttlSecondsAfterFinished`.
*/}}
{{- if .Values.openbao.enabled }}
{{- $apiName := include "nightshift.fullname" (dict "Release" .Release "component" "nightshift-api") }}
apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-oidc-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao-bootstrap
  annotations:
    # helm install path.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    # Argo CD path: Sync hook with wave 15. Runs after the init Job
    # (wave 10) and before the api/ui migrate Jobs (wave 18) and
    # api/ui Deployments (wave 20). The chain creates
    # openbao-oidc-{,ui-}client Secrets that the api/ui Pods consume.
    "argocd.argoproj.io/hook": Sync
    "argocd.argoproj.io/sync-wave": "15"
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "nightshift.labels" . | nindent 8 }}
        app.kubernetes.io/component: openbao-bootstrap
    spec:
      serviceAccountName: openbao-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              apk add --no-cache curl ca-certificates jq >/dev/null
              curl -sSLo /usr/local/bin/kubectl \
                "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x /usr/local/bin/kubectl
              sh /scripts/oidc-bootstrap.sh
          env:
            - name: BAO_ADDR
              value: "{{ include "nightshift.openbaoEndpoint" . }}"
            - name: BAO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "nightshift.openbaoSeedSecret" . }}
                  key: root-token
            # The base URL ONLY — OpenBao appends the canonical path
            # to form the actual `iss` claim. Any path here is rejected.
            - name: OIDC_ISSUER
              value: "{{ include "nightshift.openbaoIssuerBase" . }}"
            - name: OIDC_CLIENT_NAME
              value: "{{ .Values.openbao.oidc.clientName }}"
            - name: CLIENT_REDIRECT_URI
              value: "{{ .Values.openbao.oidc.clientRedirectURI }}"
            - name: CLIENT_REDIRECT_URIS
              value: "{{ .Values.openbao.oidc.clientRedirectURIs }}"
            - name: OIDC_CLIENT_SECRET_K8S
              value: "{{ include "nightshift.openbaoOidcClientSecret" . }}"
            # Chunk 19 — when ui.enabled + uiClientRedirectURI set, the
            # bootstrap also provisions a second OIDC client for the UI.
            - name: UI_CLIENT_NAME
              value: "{{ .Values.openbao.oidc.uiClientName }}"
            - name: UI_CLIENT_REDIRECT_URI
              # When ui.enabled is set, auto-derive the redirect URI
              # from ui.publicURL + better-auth's canonical callback
              # path. Operators can still set
              # openbao.oidc.uiClientRedirectURI explicitly to
              # override (multi-domain registrations, etc).
              {{- if .Values.openbao.oidc.uiClientRedirectURI }}
              value: "{{ .Values.openbao.oidc.uiClientRedirectURI }}"
              {{- else if .Values.ui.enabled }}
              value: "{{ include "nightshift.uiOidcCallbackURL" . }}"
              {{- else }}
              value: ""
              {{- end }}
            - name: UI_CLIENT_SECRET_K8S
              value: "{{ include "nightshift.openbaoOidcUiClientSecret" . }}"
            - name: K8S_NAMESPACE
              value: "{{ .Release.Namespace }}"
            - name: API_SA_NAME
              value: "{{ $apiName }}"
            - name: WORKER_SA_NAME
              value: "{{ .Values.nightshift_api.kube.workerServiceAccount }}"
            # Sourced from the chart-managed openbao-admin-seed Secret
            # so the password never lives in the helm release values
            # (which are stored plain in etcd as a Secret of their own).
            # An empty username at chart-level skips the seed entirely.
            {{- if .Values.openbao.adminSeed.username }}
            - name: ADMIN_SEED_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "nightshift.openbaoAdminSeedSecret" . }}
                  key: username
            - name: ADMIN_SEED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nightshift.openbaoAdminSeedSecret" . }}
                  key: password
            {{- end }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
      volumes:
        - name: scripts
          configMap:
            name: openbao-oidc-bootstrap
            items:
              - key: oidc-bootstrap.sh
                path: oidc-bootstrap.sh
              - key: nightshift-api-policy.hcl
                path: nightshift-api-policy.hcl
              - key: nightshift-worker-policy.hcl
                path: nightshift-worker-policy.hcl
              - key: nightshift-admin-policy.hcl
                path: nightshift-admin-policy.hcl
{{- end }}
