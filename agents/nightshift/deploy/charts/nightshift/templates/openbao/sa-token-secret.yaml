{{- /*
  Long-lived service-account token for the openbao SA, used as the
  `token_reviewer_jwt` on the OpenBao kubernetes auth method.

  Without this, OpenBao falls back to its in-pod projected token,
  which on Kubernetes 1.24+ (BoundServiceAccountTokenVolume) rotates
  every ~50 min. We've observed `permission denied` from
  `auth/kubernetes/login` when OpenBao tries to TokenReview-validate
  a SUBJECT pod's JWT using its own rotated token; supplying a
  long-lived legacy SA token Secret here works around that without
  granting OpenBao any extra perms (the binding still goes through
  TokenReview, just with a stable reviewer JWT).

  K8s 1.24+ does not auto-create these Secrets, so we declare it
  explicitly. K8s populates `token` + `ca.crt` automatically once the
  named SA exists. The bootstrap Job reads both back and pushes them
  into auth/kubernetes/config.

  Hook ordering:
    -20: bootstrap CM, bootstrap RBAC
    -15: this Secret (after openbao SA but before init/bootstrap Jobs)
     -5: openbao-init
      0: openbao-oidc-bootstrap
*/}}
{{- if .Values.openbao.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: openbao-reviewer-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao
  annotations:
    kubernetes.io/service-account.name: openbao
    # helm install path: post-install hook ordered before the openbao
    # init / OIDC bootstrap Jobs.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation
    # Argo CD path: explicit Sync hook tells Argo to ignore the
    # helm-hook → PostSync translation and treat this as a regular
    # Sync resource. Wave 5 places it after the openbao SA + RBAC
    # (default wave 0) but before the init Job (wave 10). Without
    # this, Argo CD waits for the api Deployment to be Healthy before
    # firing PostSync, and the api can't be Healthy without the
    # bootstrap output → deadlock.
    "argocd.argoproj.io/hook": Sync
    "argocd.argoproj.io/sync-wave": "5"
type: kubernetes.io/service-account-token
{{- end }}
