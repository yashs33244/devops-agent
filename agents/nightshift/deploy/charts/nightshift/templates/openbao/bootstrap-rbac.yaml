{{- /*
  SA + Role for the OpenBao init + bootstrap Jobs. Both run inside this
  release's namespace and need to write a small set of named Secrets:
    - openbao-seed (init writes the unseal-key + root-token)
    - openbao-oidc-client (bootstrap writes client_id + client_secret)
*/}}
{{- if .Values.openbao.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  # `create` is not nameable in RBAC — must allow any Secret create
  # in this namespace, then narrow read/update to the two we own.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "update", "patch"]
    resourceNames:
      - {{ include "nightshift.openbaoSeedSecret" . }}
      - {{ include "nightshift.openbaoOidcClientSecret" . }}
      - {{ include "nightshift.openbaoOidcUiClientSecret" . }}
      - openbao-reviewer-token
  # exec into the openbao pod to read the oauthapp plugin sha256
  # during plugin-catalog registration (chunk 12).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
    resourceNames: ["openbao-0"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
    resourceNames: ["openbao-0"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openbao-bootstrap
subjects:
  - kind: ServiceAccount
    name: openbao-bootstrap
    namespace: {{ .Release.Namespace }}
{{- end }}
