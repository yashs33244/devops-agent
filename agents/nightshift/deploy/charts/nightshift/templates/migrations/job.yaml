{{- /* Post-install / post-upgrade migration Job. Rendered only when
       records backend is postgres. Runs `nightshift-api` with
       NS_MIGRATE_ONLY=1, which causes the binary to apply schema
       (via OpenPostgres) and exit 0 — without starting any
       listeners.

       Why post- instead of pre-: pre-install hooks run BEFORE
       regular chart resources, so Postgres (a regular StatefulSet)
       wouldn't exist yet — the Job would never reach a reachable
       database. post-install runs after the chart's regular
       resources are applied, so by then Postgres is up.

       Race note: API Deployment pods come up during the install
       phase too and apply schema via their own OpenPostgres call.
       That's fine — CREATE TABLE IF NOT EXISTS is mostly race-safe
       and kubelet retries handle the rare failure. The Job exists
       as operational confirmation that schema-apply succeeded
       independent of API readiness, and as the canonical place to
       run real migration tooling later (golang-migrate / atlas).

       For sqlite mode, no Job: SQLite is in-process per pod, no
       shared schema. */ -}}
{{- if eq (.Values.nightshift_api.recordsBackend | default "sqlite") "postgres" }}
{{- $apiName := include "nightshift.fullname" (dict "Release" .Release "component" "nightshift-api") }}
{{- $name := printf "%s-migrate" $apiName | trunc 63 | trimSuffix "-" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: nightshift-api-migrate
  annotations:
    # helm install path: post-install hook so Postgres (a regular
    # release resource) exists by the time this Job runs. Rerun on
    # every upgrade so a chart that adds new schema applies it before
    # pods restart.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    # Delete the previous Job before creating a new one (pre-install
    # vs pre-upgrade name collisions); keep the successful one around
    # for `kubectl logs` debugging.
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    # Argo CD path: Sync hook with wave 18. Runs after the openbao
    # bootstrap chain (waves 5/10/15) and before the api Deployment
    # (wave 20), so schema is applied before any api pod starts.
    "argocd.argoproj.io/hook": Sync
    "argocd.argoproj.io/sync-wave": "18"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "nightshift.selectorLabels" (dict "Release" .Release "component" "nightshift-api") | nindent 8 }}
        app.kubernetes.io/component: nightshift-api-migrate
        {{- if .Values.tenant.name }}
        tenant: {{ .Values.tenant.name }}
        {{- end }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ $apiName }}
      securityContext:
        {{- toYaml .Values.nightshift_api.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "nightshift.apiImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.nightshift_api.containerSecurityContext | nindent 12 }}
          # Pull NS_RECORDS_BACKEND from the API ConfigMap +
          # everything else (worker HMAC, OIDC audience, etc.) from
          # the API Secret. NS_MIGRATE_ONLY tells the binary to apply
          # schema and exit. Most envs are unused on this code path —
          # safe to over-include.
          envFrom:
            - configMapRef:
                name: {{ $apiName }}
            - secretRef:
                name: {{ $apiName }}
          env:
            - name: NS_MIGRATE_ONLY
              value: "true"
            {{- if .Values.postgres.enabled }}
            # NS_POSTGRES_DSN is composed at pod start from the live
            # nightshift-postgres Secret rather than baked into the API
            # Secret at template time. Decouples the rendered DSN from
            # whatever placeholder lives in values.yaml (operators using
            # the customers-repo / Argo CD pattern keep real passwords
            # out of git, the chart-rendered values are placeholders).
            {{- include "nightshift.postgresEnv" (dict "dsnVar" "NS_POSTGRES_DSN" "context" .) | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: secrets
              mountPath: /etc/nightshift/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: secrets
          secret:
            secretName: {{ $apiName }}
            items:
              - key: secrets.yaml
                path: secrets.yaml
        - name: tmp
          emptyDir: {}
{{- end }}
