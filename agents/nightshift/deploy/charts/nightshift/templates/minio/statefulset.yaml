{{- if .Values.minio.enabled }}
{{- $name := include "nightshift.minioFullname" . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  serviceName: {{ $name }}
  replicas: {{ .Values.minio.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nightshift
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nightshift
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: minio
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/part-of: nightshift
        {{- if .Values.tenant.name }}
        tenant: {{ .Values.tenant.name }}
        {{- end }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/minio/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          args:
            - server
            - /data
            - --address
            - ":9000"
            {{- if .Values.minio.console.enabled }}
            - --console-address
            - ":{{ .Values.minio.console.port }}"
            {{- end }}
          ports:
            - name: s3
              containerPort: 9000
            {{- if .Values.minio.console.enabled }}
            - name: console
              containerPort: {{ .Values.minio.console.port }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ $name }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.minio.storage.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.storage.size }}
{{- end }}
