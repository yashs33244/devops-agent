{{- if .Values.minio.enabled }}
{{- if not .Values.minio.rootPassword }}
{{- fail "minio.rootPassword is required when minio.enabled. Provide via --set-file minio.rootPassword=<file>." }}
{{- end }}
{{- $name := include "nightshift.minioFullname" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ .Values.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword | trim | quote }}
{{- end }}
