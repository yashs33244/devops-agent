{{- if .Values.nightshift_api.ingress.enabled }}
{{- $name := include "nightshift.fullname" (dict "Release" .Release "component" "nightshift-api") }}
{{- $tlsSecret := .Values.nightshift_api.ingress.tls.secretName }}
{{- if and (not $tlsSecret) .Values.nightshift_api.ingress.clusterIssuer }}
{{- $tlsSecret = printf "%s-tls" $name }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: nightshift-api
  {{- if or .Values.nightshift_api.ingress.annotations .Values.nightshift_api.ingress.clusterIssuer }}
  annotations:
    {{- with .Values.nightshift_api.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.nightshift_api.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ . | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- with .Values.nightshift_api.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.nightshift_api.ingress.host | quote }}
      http:
        paths:
          - path: /v1/
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
  {{- if $tlsSecret }}
  tls:
    - hosts:
        - {{ .Values.nightshift_api.ingress.host | quote }}
      secretName: {{ $tlsSecret | quote }}
  {{- end }}
{{- end }}
