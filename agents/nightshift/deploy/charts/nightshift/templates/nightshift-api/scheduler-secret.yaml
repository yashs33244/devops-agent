{{- if .Values.nightshift_api.scheduling.token }}
{{- $secretName := .Values.nightshift_api.scheduling.tokenSecretName | default "nightshift-scheduler-token" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
type: Opaque
stringData:
  # Bearer token mounted into every CronJob fired by the Scheduling
  # service. The same value is registered as a static admin token on
  # the API itself (see configmap.yaml) so the API trusts the
  # `user_id` field on CreateRun requests carrying this bearer.
  token: {{ .Values.nightshift_api.scheduling.token | quote }}
{{- end }}
