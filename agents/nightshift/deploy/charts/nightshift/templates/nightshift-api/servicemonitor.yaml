{{- if .Values.nightshift_api.metrics.serviceMonitor.enabled }}
{{- $name := include "nightshift.fullname" (dict "Release" .Release "component" "nightshift-api") }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: nightshift-api
    {{- with .Values.nightshift_api.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "nightshift.selectorLabels" (dict "Release" .Release "component" "nightshift-api") | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.nightshift_api.metrics.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.nightshift_api.metrics.serviceMonitor.scrapeTimeout | default "10s" }}
      path: /metrics
{{- end }}
