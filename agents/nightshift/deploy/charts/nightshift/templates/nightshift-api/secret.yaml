{{- $name := include "nightshift.fullname" (dict "Release" .Release "component" "nightshift-api") }}
{{- $isFs := eq .Values.nightshift_api.objectsBackend "filesystem" }}
{{- $isPg := eq (.Values.nightshift_api.recordsBackend | default "sqlite") "postgres" }}
{{- if not .Values.nightshift_api.workerHmac }}
{{- fail "nightshift_api.workerHmac is required. Provide via --set-file nightshift_api.workerHmac=<path>." }}
{{- end }}
{{- if and $isFs (not .Values.nightshift_api.objectsHmac) }}
{{- fail "nightshift_api.objectsHmac is required for the filesystem objects backend. Provide via --set-file nightshift_api.objectsHmac=<path>, or set nightshift_api.objectsBackend=s3." }}
{{- end }}
{{- /* Records-Postgres DSN. Two paths:
       - bundled Postgres (postgres.enabled=true): DSN is composed at
         pod start from the live nightshift-postgres Secret via K8s
         $(VAR) substitution, so the chart-rendered Secret does NOT
         carry a DSN. See nightshift-api/deployment.yaml + the
         migrate Job + _helpers.tpl `nightshift.postgresEnv`.
       - external Postgres (postgres.enabled=false): operator supplies
         a complete DSN via nightshift_api.postgresDSN, which is
         written verbatim into NS_POSTGRES_DSN below. */ -}}
{{- $pgDSN := "" }}
{{- if and $isPg (not .Values.postgres.enabled) }}
  {{- if not .Values.nightshift_api.postgresDSN }}
  {{- fail "nightshift_api.postgresDSN is required when recordsBackend=postgres and postgres.enabled=false." }}
  {{- end }}
  {{- $pgDSN = .Values.nightshift_api.postgresDSN }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: nightshift-api
type: Opaque
stringData:
  # A single YAML file surfaced at NS_SECRETS_FILE. The server's
  # internal/secrets.File backend reads it as a map of path -> KV.
  # Keeping everything in one file means all secrets rotate as a
  # single mount update.
  secrets.yaml: |
    secret/nightshift/worker-hmac:
      value: {{ .Values.nightshift_api.workerHmac | trim | quote }}
    {{- $static := .Values.nightshift_api.auth.staticTokens | default dict }}
    {{- $schedTok := .Values.nightshift_api.scheduling.token }}
    {{- if and $schedTok (not (hasKey $static "scheduler")) }}
    {{- $static = merge (dict "scheduler" $schedTok) $static }}
    {{- end }}
    {{- if $static }}
    {{ .Values.nightshift_api.auth.staticTokensPath }}:
      {{- range $name, $token := $static }}
      {{ $name }}: {{ $token | quote }}
      {{- end }}
    {{- end }}
  {{- if $isFs }}
  # NS_OBJECTS_HMAC is read from env directly (not from the Secrets
  # backend), so we expose it here for envFrom. S3 backend doesn't
  # use it (presign V4 uses the S3 access keys instead).
  NS_OBJECTS_HMAC: {{ .Values.nightshift_api.objectsHmac | trim | quote }}
  {{- end }}
  {{- if and $isPg (not .Values.postgres.enabled) }}
  # External-Postgres DSN. Bundled-Postgres composes the DSN at pod
  # start from nightshift-postgres Secret via K8s $(VAR) substitution
  # — see deployment.yaml + the migrate Job — so this key is only
  # rendered when the operator brings their own database.
  NS_POSTGRES_DSN: {{ $pgDSN | quote }}
  {{- end }}
