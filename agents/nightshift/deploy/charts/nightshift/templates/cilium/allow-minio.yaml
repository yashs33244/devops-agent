{{- if and .Values.cilium.enabled .Values.minio.enabled (eq .Values.nightshift_api.objectsBackend "s3") }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "nightshift.fullname" (dict "Release" .Release "component" "worker-allow-minio") }}
  namespace: {{ include "nightshift.workerNamespace" . }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: nightshift
      app.kubernetes.io/component: worker
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: nightshift
            app.kubernetes.io/component: minio
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
{{- end }}
