{{- if .Values.cilium.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "nightshift.fullname" (dict "Release" .Release "component" "worker-default-deny") }}
  namespace: {{ include "nightshift.workerNamespace" . }}
  labels:
    {{- include "nightshift.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: nightshift
      app.kubernetes.io/component: worker
  ingress: []
  egress: []
{{- end }}
