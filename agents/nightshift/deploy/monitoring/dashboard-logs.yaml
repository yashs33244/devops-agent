apiVersion: v1
kind: ConfigMap
metadata:
  name: chicklet-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  chicklet-logs.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Chicklet Logs",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{job=\"chicklet\", chicklet=~\"$chicklet\", namespace=~\"$namespace\"} | json",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        },
        {
          "title": "API Server Logs",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 12 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{unit=\"chicklet-api.service\"} |= \"$api_filter\"",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["chicklet", "logs", "loki"],
      "templating": {
        "list": [
          {
            "name": "chicklet",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": { "label": "chicklet", "stream": "{job=\"chicklet\"}", "type": 1 },
            "includeAll": true,
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "multi": true,
            "refresh": 2,
            "sort": 1
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": { "label": "namespace", "stream": "{job=\"chicklet\"}", "type": 1 },
            "includeAll": true,
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "multi": true,
            "refresh": 2,
            "sort": 1
          },
          {
            "name": "api_filter",
            "type": "textbox",
            "current": { "selected": false, "text": "", "value": "" },
            "label": "API Log Filter"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Chicklet Logs",
      "uid": "chicklet-logs"
    }
