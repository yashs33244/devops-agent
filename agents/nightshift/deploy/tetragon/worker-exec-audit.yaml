# nightshift worker — exec audit.
#
# The reference worker is a single-process Go binary. It never execs
# child processes. Any exec event from a worker pod is, by definition,
# anomalous — either an unexpected agent-generated tool call or an
# intrusion. Audit-only (Post); operators may layer on Sigkill once
# they've calibrated against their LLM worker's expected behavior.
#
# Forward note: chunk 14's LLM worker may legitimately exec child
# processes (e.g. for shell-tool support). When that lands, this policy
# either narrows its selector or allow-lists specific exec paths.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: nightshift-worker-exec-audit
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nightshift
      app.kubernetes.io/component: worker
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
        - index: 1
          type: "char_buf"
          sizeArgIndex: 2
      selectors:
        - matchActions:
            - action: Post
