# nightshift worker — sensitive file access audit.
#
# Audits reads of credential files (`/etc/shadow`, `/etc/passwd`,
# `~/.ssh/`) and the projected service-account token directory. The
# launcher sets `automountServiceAccountToken: false` on worker pods,
# so any access to the SA token path is anomalous by construction.
# Also audits writes to `/etc/` and `/var/log/` — the worker container
# runs with `readOnlyRootFilesystem: true`, so writes outside of an
# explicit `emptyDir` mount will fail; this policy logs the attempt.
#
# Action is Post (audit-only). Ported and narrowed from
# deploy/tetragon-demo/tp-file-access.yaml.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: nightshift-worker-file-audit
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nightshift
      app.kubernetes.io/component: worker
  kprobes:
    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      returnArgAction: "Post"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/shadow"
                - "/etc/passwd"
                - "/root/.ssh"
                - "/var/run/secrets/kubernetes.io/serviceaccount"
            - index: 1
              operator: "Equal"
              values:
                - "4"
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc"
                - "/var/log"
            - index: 1
              operator: "Equal"
              values:
                - "2"
