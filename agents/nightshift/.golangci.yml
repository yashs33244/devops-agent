version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    rules:
      # Generated protobuf code is not under our style budget.
      - path: ^gen/
        linters: [errcheck, govet, ineffassign, staticcheck, unused]
      # Test files may ignore errors from setup helpers.
      - path: _test\.go$
        linters: [errcheck]

formatters:
  enable:
    - gofmt
    - goimports
