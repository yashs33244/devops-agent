# Nginx bounded by CPU limits; StressChaos raises CPU load inside the container.
#
# kubectl apply -f .../stress-cpu-demo.yaml --context=kind-tracer-k8s-test
# kubectl apply -f .../stress-cpu-chaos.yaml --context=kind-tracer-k8s-test
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-cpu-demo
  namespace: default
  labels:
    app: stress-cpu-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stress-cpu-demo
  template:
    metadata:
      labels:
        app: stress-cpu-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 4
