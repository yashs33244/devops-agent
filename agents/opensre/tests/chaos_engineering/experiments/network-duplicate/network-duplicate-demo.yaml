# Nginx target for NetworkChaos action: duplicate (packet duplication).
#
# kubectl apply -f .../network-duplicate-demo.yaml --context=kind-tracer-k8s-test
# kubectl apply -f .../network-duplicate-chaos.yaml --context=kind-tracer-k8s-test
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-duplicate-demo
  namespace: default
  labels:
    app: network-duplicate-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-duplicate-demo
  template:
    metadata:
      labels:
        app: network-duplicate-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
