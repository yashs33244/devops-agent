# Nginx for NetworkChaos action: netem (combined delay + loss + rate cap).
#
# kubectl apply -f .../network-netem-combo-demo.yaml --context=kind-tracer-k8s-test
# kubectl apply -f .../network-netem-combo-chaos.yaml --context=kind-tracer-k8s-test
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-netem-combo-demo
  namespace: default
  labels:
    app: network-netem-combo-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-netem-combo-demo
  template:
    metadata:
      labels:
        app: network-netem-combo-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
