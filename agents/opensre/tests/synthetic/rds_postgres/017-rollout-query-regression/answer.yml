root_cause_category: cpu_saturation_bad_query
equivalent_root_cause_categories:
  - cpu_saturation
required_keywords:
  - rollout
  - query
  - sequential scan
  - cpu
  - performance insights
required_evidence_sources:
  - aws_performance_insights
  - aws_cloudwatch_metrics
  - k8s_rollout
  - k8s_pod_metrics
forbidden_categories:
  - infrastructure
