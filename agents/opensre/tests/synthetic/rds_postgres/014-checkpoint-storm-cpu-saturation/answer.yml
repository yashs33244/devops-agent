root_cause_category: checkpoint_io_storm
equivalent_root_cause_categories:
  - vacuum_freeze_storm
  - vacuum_checkpoint_storm
  - checkpoint_storm
required_keywords:
  - vacuum
  - checkpoint
  - LWLock
  - WAL
required_evidence_sources:
  - aws_performance_insights
forbidden_categories:
  - cpu_saturation
ruling_out_keywords:
  # "vacuum" — agent must identify VACUUM FREEZE as the initiating process
  # "checkpoint" — agent must name checkpoint storms as the mechanism, not CPU as root cause
  # "LWLock" — agent must cite LWLock:BufferMapping as the dominant wait, not CPU:user
  - vacuum
  - checkpoint
  - LWLock
optimal_trajectory:
  - query_grafana_metrics
  - query_grafana_logs
  - query_grafana_alert_rules
  - describe_rds_instance
  - describe_rds_events
max_investigation_loops: 4
model_response: |
  ROOT_CAUSE: A runaway VACUUM FREEZE on the billing_events table triggered checkpoint storms that saturated I/O and — as a downstream effect — drove CPUUtilization to 92%. This is NOT a cpu_saturation event caused by application queries. The CPU spike is a symptom, not the root cause.
  ROOT_CAUSE_CATEGORY: checkpoint_io_storm

  VALIDATED_CLAIMS:
  - Performance Insights shows autovacuum VACUUM FREEZE on billing_events as the dominant process at 7.8 AAS — accounting for 79% of all database load. [evidence: aws_performance_insights]
  - The dominant wait event is LWLock:BufferMapping at 3.9 AAS, followed by IO:WALWrite at 2.4 AAS and IO:DataFileWrite at 1.4 AAS. CPU:user is only 0.2 AAS — confirming this is an I/O-bound, not a CPU-bound, workload. [evidence: aws_performance_insights]
  - WriteIOPS spiked from 890 to 25,000+ at 22:02Z — coinciding with the VACUUM FREEZE start. This is the checkpoint flush storm writing dirty pages to disk. [evidence: aws_cloudwatch_metrics]
  - DiskQueueDepth reached 44.6, indicating severe I/O saturation from the checkpoint write storm. [evidence: aws_cloudwatch_metrics]
  - WriteLatency grew from 1ms to 168ms over 20 minutes — consistent with I/O queuing from checkpoint-driven write amplification. [evidence: aws_cloudwatch_metrics]
  - TransactionLogsGeneration grew from 4.5 MB/s to ~200 MB/s — consistent with massive WAL output from VACUUM FREEZE processing billions of tuples. [evidence: aws_cloudwatch_metrics]
  - FreeStorageSpace is declining at ~1.3 GB/min — a secondary effect of the VACUUM FREEZE generating WAL and temporary files. Not yet critical at 82 GB remaining. [evidence: aws_cloudwatch_metrics]
  - CPUUtilization reached 92% — this is the effect of the kernel thrashing on I/O waits and buffer management, not an application query consuming CPU. The rdsadmin user (autovacuum) accounts for 7.9 AAS, confirming the load is internal. [evidence: aws_cloudwatch_metrics, aws_performance_insights]
  - Application queries (billing_writer INSERT at 1.2 AAS) are blocked on Lock:relation — the VACUUM FREEZE holds table-level locks that block normal writes. [evidence: aws_performance_insights]
  - DatabaseConnections are growing (98 → 254) because application threads are accumulating waiting on the blocked INSERT workload, not from a connection pool issue. [evidence: aws_cloudwatch_metrics]

  NON_VALIDATED_CLAIMS:
  - SwapUsage growing (~83MB → 289MB) may indicate the shared_buffers pool is being repurposed for the vacuum, causing some memory-mapped pages to swap. Not a primary cause.
  - MaximumUsedTransactionIDs at 198M with steady drift is consistent with VACUUM FREEZE being triggered by XID age — this is the autovacuum threshold being hit, confirming the causal origin.

  CAUSAL_CHAIN:
  - billing_events table accumulated enough transaction age to trigger PostgreSQL's autovacuum VACUUM FREEZE threshold (~200M XIDs).
  - Autovacuum launched VACUUM FREEZE on billing_events, touching every page in a large table — generating massive WAL output (~200 MB/s) and checkpoint storms.
  - Checkpoint storms drove WriteIOPS to 25,000+ and DiskQueueDepth to 44.6, saturating the EBS volume.
  - I/O saturation caused kernel-level wait (LWLock:BufferMapping) as processes compete for buffer slots — this is what drives CPU to 92%, not user-space query computation.
  - The CPU spike is a downstream symptom of the I/O storm, not the root cause. An agent that diagnoses "cpu_saturation" from the CPU metric alone gets the causal chain backwards.
  - Classifying this as cpu_saturation would lead to wrong remediation (e.g. upgrading CPU capacity) rather than correct remediation (adjusting autovacuum settings, splitting the VACUUM FREEZE, or increasing EBS IOPS).
