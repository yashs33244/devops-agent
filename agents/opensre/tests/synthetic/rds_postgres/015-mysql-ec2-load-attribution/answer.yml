root_cause_category: application_tier_load_spike
required_keywords:
  - web tier
  - DBConnections
  - CPU
  - MySQL
required_evidence_sources:
  - ec2_instances_by_tag
  - aws_cloudwatch_metrics
  - elb_target_health
  - aws_rds_events
optimal_trajectory:
  - describe_rds_instance
  - describe_rds_events
  - ec2_instances_by_tag
  - get_elb_target_health
  - query_grafana_metrics
  - query_grafana_logs
max_investigation_loops: 2
ruling_out_keywords:
  - worker tier
  - replication
forbidden_categories:
  - replication_lag
  - storage_full
model_response: |
  ROOT_CAUSE: A sustained load spike from the orders-web EC2 tier is driving the connection and CPU growth on the orders-prod MySQL primary. Web tier CPU rose from ~30% to ~85% across all four instances behind target group orders-web-tg in lockstep with RDS DatabaseConnections climbing from 120 to ~640 and RDS CPUUtilization reaching 78%. The worker tier remained flat at ~25% CPU and is not implicated.
  ROOT_CAUSE_CATEGORY: application_tier_load_spike

  VALIDATED_CLAIMS:
  - RDS DatabaseConnections climbed from ~120 to ~640 in 8 minutes; CPUUtilization peaked at 78%. [evidence: aws_cloudwatch_metrics]
  - All four EC2 instances tagged tier=web in target group orders-web-tg show CPU climbing from ~30% to ~85% over the same window. [evidence: ec2_instances_by_tag, aws_cloudwatch_metrics]
  - The two EC2 instances tagged tier=worker remained flat at ~25% CPU and did not contribute to the load. [evidence: ec2_instances_by_tag, aws_cloudwatch_metrics]
  - Target group orders-web-tg reports 4/4 healthy targets — no draining or unhealthy state to explain the growth. [evidence: elb_target_health]
  - No replication lag or storage saturation events were emitted by RDS during the window. [evidence: aws_rds_events]

  CAUSAL_CHAIN:
  - The orders-web EC2 tier (4 instances behind the ALB target group orders-web-tg) is the only application tier whose load profile correlates with the RDS connection and CPU climb. The worker tier and infrastructure events are ruled out. The web tier is the plausible driver of the MySQL load.
