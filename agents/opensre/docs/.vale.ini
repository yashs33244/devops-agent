StylesPath = styles
MinAlertLevel = warning
Vocab = Mintlify

[formats]
mdx = md

[*.md]
BasedOnStyles = Vale
Vale.Terms = NO

BlockIgnores = (?sm)^```[\s\S]*?```$

[*.mdx]
BasedOnStyles = Vale
Vale.Terms = NO

TokenIgnores = (?m)((?:import|export) .+?$), \
(?<!`)(<\w+ ?.+ ?\/>)(?!`), \
(<[A-Z]\w+>.+?<\/[A-Z]\w+>), \
(<[^>]*>), \
\{[^}]*\}, \
(`[^`]*`)

BlockIgnores = (?sm)^<style>[\s\S]*?<\/style>$, \
(?sm)^(<\w+\n .*\s\/>)$, \
(?sm)^({.+.*})$, \
(?sm)^```[\s\S]*?```$

# Auto-generated contributor and PR metadata — spelling is dominated by
# proper names, GitHub handles, and code tokens that are not dictionary words.
[**/daily-updates/**/*.mdx]
Vale.Spelling = NO
