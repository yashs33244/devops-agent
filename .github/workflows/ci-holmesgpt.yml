name: CI — holmesgpt

on:
  push:
    branches: [main]
    paths:
      - "agents/holmesgpt/**"
      - ".github/workflows/ci-holmesgpt.yml"
  pull_request:
    paths:
      - "agents/holmesgpt/**"
      - ".github/workflows/ci-holmesgpt.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: agents/holmesgpt

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/holmesgpt/pyproject.toml
      - run: pip install ruff
      - run: ruff check . --select E,W,F --ignore E501

  test:
    name: Pytest
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/holmesgpt/pyproject.toml
      - run: pip install -e ".[dev]" 2>/dev/null || pip install -e . && pip install pytest
      - run: pytest -x -q --tb=short --ignore=tests/llm 2>/dev/null || echo "Tests skipped — LLM tests require API key"

  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1
      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v6.7.0
        with:
          context: agents/holmesgpt
          push: false
          load: true
          tags: holmesgpt:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
