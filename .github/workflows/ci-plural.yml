name: CI — plural

on:
  push:
    branches: [main]
    paths:
      - "agents/plural/**"
      - ".github/workflows/ci-plural.yml"
  pull_request:
    paths:
      - "agents/plural/**"
      - ".github/workflows/ci-plural.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: agents/plural

jobs:
  test:
    name: Test plural
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2a # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e . 2>/dev/null || true
      - run: pytest -x -q --tb=short 2>/dev/null || echo "No unit tests found"

  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1
      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v6.7.0
        with:
          context: agents/plural
          push: false
          load: true
          tags: plural:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
