name: CI — sre-guard

on:
  push:
    branches: [main]
    paths:
      - "agents/sre-guard/**"
      - ".github/workflows/ci-sre-guard.yml"
  pull_request:
    paths:
      - "agents/sre-guard/**"
      - ".github/workflows/ci-sre-guard.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: agents/sre-guard

jobs:
  test:
    name: Lint + test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/sre-guard/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pip install ruff
      - run: ruff check src/ --select E,W,F --ignore E501 || true
      - run: pytest tests/ -x -q --tb=short

  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1
      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v6.7.0
        with:
          context: agents/sre-guard
          push: false
          load: true
          tags: sre-guard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
