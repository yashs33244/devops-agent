name: Security — Trivy + CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-repo:
    name: Trivy — repo scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          scan-type: fs
          scan-ref: "."
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          exit-code: "0" # don't fail CI; upload results to Security tab
      - uses: github/codeql-action/upload-sarif@0952a80decea52ce9d6031fc0693720942efef47 # v3.28.9
        with:
          sarif_file: trivy-results.sarif

  secret-scan:
    name: Hardcoded secrets check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql-python:
    name: CodeQL — Python
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: github/codeql-action/init@0952a80decea52ce9d6031fc0693720942efef47 # v3.28.9
        with:
          languages: python
      - uses: github/codeql-action/analyze@0952a80decea52ce9d6031fc0693720942efef47 # v3.28.9
