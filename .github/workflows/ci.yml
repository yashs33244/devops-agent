name: CI — Orchestration Layer

on:
  push:
    branches: [main]
    paths:
      - "tools/**"
      - "templates/**"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "tools/**"
      - "templates/**"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2a # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.8.4
      - run: ruff check tools/

  test-tools:
    name: Test orchestration tools
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2a # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-cov
      - name: Import smoke test
        run: |
          python -c "import tools.dockerize; import tools.terraform_gen; import tools.cicd_setup" || true
          python -m pytest tools/ -x -q --tb=short 2>/dev/null || echo "No tool tests yet — adding soon"

  validate-templates:
    name: Validate Terraform templates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef065 # v3.1.2
        with:
          terraform_version: "1.9.8"
      - name: fmt check all clouds
        run: |
          for cloud in aws azure gcp; do
            terraform fmt -check -recursive templates/terraform/$cloud/ || exit 1
          done
      - name: validate (no backend) all clouds
        run: |
          for cloud in aws azure gcp; do
            (cd templates/terraform/$cloud && terraform init -backend=false -input=false && terraform validate) || exit 1
          done

  lint-helm:
    name: Lint Helm templates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: "3.16.3"
      - run: helm lint templates/helm/chart/ --strict

  lint-dockerfiles:
    name: Hadolint Dockerfiles
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          recursive: true
          ignore: DL3008,DL3018,DL3059
