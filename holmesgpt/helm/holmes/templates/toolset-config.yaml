{{- if or (.Values.toolsets | not | empty) .Values.mcpAddons.aws.enabled .Values.mcpAddons.mariadb.enabled .Values.mcpAddons.gcp.enabled .Values.mcpAddons.azure.enabled .Values.mcpAddons.github.enabled .Values.mcpAddons.gitlabMcp.enabled .Values.mcpAddons.sentry.enabled .Values.mcpAddons.prefect.enabled .Values.mcpAddons.kubernetesRemediation.enabled .Values.mcpAddons.kubernetes.enabled .Values.mcpAddons.confluenceMcp.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-toolsets-configmap
  namespace: {{ .Release.Namespace }}
  {{- with (include "holmes.commonLabels" .) }}
  labels:
    {{- . | nindent 4 }}
  {{- end }}
  {{- with (include "holmes.commonAnnotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  custom_toolset.yaml: |-
    {{- $toolsets := .Values.toolsets }}
    {{- if .Values.k8sRBAC }}
    {{- $rbacOverrides := dict "kubernetes/core" (dict "enabled" false) "kubernetes/logs" (dict "enabled" false) "bash" (dict "enabled" false) }}
    {{- $toolsets = mergeOverwrite $toolsets $rbacOverrides }}
    {{- end }}
    toolsets: {{ toYaml $toolsets | nindent 6 }}
    {{- $mcpServers := .Values.mcp_servers }}
    {{- if .Values.mcpAddons.aws.enabled }}
    {{- $awsMcpServers := dict "aws_api" (dict
        "description" "AWS API MCP Server - comprehensive AWS service access. Allow executing any AWS CLI commands."
        "config" (dict
          "url" (printf "http://%s-aws-mcp-server.%s.svc.cluster.local:8000" .Release.Name (.Values.mcpAddons.aws.config.namespace | default .Release.Namespace))
          "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/aws.svg"
        )
        "llm_instructions" (include "holmes.awsMcp.llmInstructions" . | trim)
      )
    }}
    {{- $mcpServers = merge $mcpServers $awsMcpServers }}
    {{- end }}
    {{- if .Values.mcpAddons.azure.enabled }}
    {{- $azureMcpServers := dict "azure_api" (dict
        "description" "Azure API MCP Server - comprehensive Azure service access. Execute any Azure CLI commands."
        "config" (dict
          "url" (printf "http://%s-azure-mcp-server.%s.svc.cluster.local:8000/mcp" .Release.Name (.Values.mcpAddons.azure.config.namespace | default .Release.Namespace))
          "mode" "streamable-http"
          "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/microsoft-azure.svg"
        )
        "llm_instructions" (include "holmes.azureMcp.llmInstructions" . | trim)
      )
    }}
    {{- $mcpServers = merge $mcpServers $azureMcpServers }}
    {{- end }}
    {{- if .Values.mcpAddons.mariadb.enabled }}
    {{- $mariadbMcpServers := dict "mariadb" (dict
        "description" "MariaDB database troubleshooting and monitoring MCP server"
        "config" (dict
          "url" (printf "http://%s-mariadb-mcp-server.%s.svc.cluster.local:8000/mcp" .Release.Name (.Values.mcpAddons.mariadb.config.namespace | default .Release.Namespace))
          "mode" "streamable-http"
          "headers" (dict "Content-Type" "application/json")
          "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/mariadb.svg"
        )
        "llm_instructions" (include "holmes.mariadbMcp.llmInstructions" . | trim)
      )
    }}
    {{- $mcpServers = merge $mcpServers $mariadbMcpServers }}
    {{- end }}
    {{- if .Values.mcpAddons.gcp.enabled }}
    {{- $gcpMcpServers := dict }}
    {{- if .Values.mcpAddons.gcp.gcloud.enabled }}
    {{- $gcpMcpServers = merge $gcpMcpServers (dict "gcp_gcloud" (dict
        "description" "Google Cloud management via gcloud CLI"
        "config" (dict
          "url" (printf "http://%s-gcp-mcp-server.%s.svc.cluster.local:%d/sse" .Release.Name (.Values.mcpAddons.gcp.config.namespace | default .Release.Namespace) (int .Values.mcpAddons.gcp.gcloud.port))
          "mode" "sse"
          "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/google-cloud.svg"
        )
        "llm_instructions" (include "holmes.gcpMcp.gcloud.llmInstructions" . | trim)
      ))
    }}
    {{- end }}
    {{- if .Values.mcpAddons.gcp.observability.enabled }}
    {{- $gcpMcpServers = merge $gcpMcpServers (dict "gcp_observability" (dict
        "description" "GCP Observability - logs, metrics, traces, errors"
        "config" (dict
          "url" (printf "http://%s-gcp-mcp-server.%s.svc.cluster.local:%d/sse" .Release.Name (.Values.mcpAddons.gcp.config.namespace | default .Release.Namespace) (int .Values.mcpAddons.gcp.observability.port))
          "mode" "sse"
          "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/google-cloud.svg"
        )
        "llm_instructions" (include "holmes.gcpMcp.observability.llmInstructions" . | trim)
      ))
    }}
    {{- end }}
    {{- if .Values.mcpAddons.gcp.storage.enabled }}
    {{- $gcpMcpServers = merge $gcpMcpServers (dict "gcp_storage" (dict
        "description" "Google Cloud Storage operations"
        "config" (dict
          "url" (printf "http://%s-gcp-mcp-server.%s.svc.cluster.local:%d/sse" .Release.Name (.Values.mcpAddons.gcp.config.namespace | default .Release.Namespace) (int .Values.mcpAddons.gcp.storage.port))
          "mode" "sse"
          "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/google-cloud.svg"
        )
        "llm_instructions" (include "holmes.gcpMcp.storage.llmInstructions" . | trim)
      ))
    }}
    {{- end }}
    {{- $mcpServers = merge $mcpServers $gcpMcpServers }}
    {{- end }}
    {{- if .Values.mcpAddons.github.enabled }}
    {{- if .Values.mcpAddons.github.auth.githubApp.secretName }}
    {{- $githubConfig := dict
        "url" (printf "http://%s-github-mcp-server.%s.svc.cluster.local:8000/mcp" .Release.Name .Release.Namespace)
        "mode" "streamable-http"
        "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/github.svg"
    }}
    {{- $githubMcpServers := dict "github" (dict
        "description" "GitHub MCP Server - access repositories, pull requests, issues, and GitHub Actions. Debug CI failures, search code, and delegate tasks to Copilot."
        "config" $githubConfig
        "llm_instructions" (include "holmes.githubMcp.llmInstructions" . | trim)
      )
    }}
    {{- $mcpServers = merge $mcpServers $githubMcpServers }}
    {{- else }}
    {{- $githubConfig := dict
        "url" (printf "http://%s-github-mcp-server.%s.svc.cluster.local:8000/sse" .Release.Name .Release.Namespace)
        "mode" "sse"
        "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/github.svg"
    }}
    {{- $githubMcpServers := dict "github" (dict
        "description" "GitHub MCP Server - access repositories, pull requests, issues, and GitHub Actions. Debug CI failures, search code, and delegate tasks to Copilot."
        "config" $githubConfig
        "llm_instructions" (include "holmes.githubMcp.llmInstructions" . | trim)
      )
    }}
    {{- $mcpServers = merge $mcpServers $githubMcpServers }}
    {{- end }}
    {{- end }}
    {{- if .Values.mcpAddons.gitlabMcp.enabled }}
    {{- $gitlabMcpServers := dict "gitlab" (dict
        "description" "GitLab MCP Server - access projects, merge requests, issues, pipelines, and code. Debug CI failures, search code, and create MRs."
        "config" (dict
          "url" (printf "http://%s-gitlab-mcp-server.%s.svc.cluster.local:8000/sse" .Release.Name .Release.Namespace)
          "mode" "sse"
          "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/gitlab.svg"
        )
        "llm_instructions" (include "holmes.gitlabMcp.llmInstructions" . | trim)
      )
    }}
    {{- $mcpServers = merge $mcpServers $gitlabMcpServers }}
    {{- end }}
    {{- if .Values.mcpAddons.sentry.enabled }}
    {{- $sentryMcpServers := dict "sentry" (dict
        "description" "Sentry error tracking and monitoring - search issues, get stack traces, and analyze error patterns"
        "config" (dict
          "url" (printf "http://%s-sentry-mcp-server.%s.svc.cluster.local:8000/sse" .Release.Name .Release.Namespace)
          "mode" "sse"
          "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/sentry.svg"
        )
        "llm_instructions" (include "holmes.sentryMcp.llmInstructions" . | trim)
      )
    }}
    {{- $mcpServers = merge $mcpServers $sentryMcpServers }}
    {{- end }}
    {{- if .Values.mcpAddons.prefect.enabled }}
    {{- $prefectMcpServers := dict "prefect" (dict
        "description" "Prefect workflow orchestration - monitor flow runs, check deployments, and troubleshoot failures"
        "config" (dict
          "url" (printf "http://%s-prefect-mcp-server.%s.svc.cluster.local:8000/sse" .Release.Name .Release.Namespace)
          "mode" "sse"
          "icon_url" "https://cdn.simpleicons.org/prefect/024DFD"
        )
        "llm_instructions" (include "holmes.prefectMcp.llmInstructions" . | trim)
      )
    }}
    {{- $mcpServers = merge $mcpServers $prefectMcpServers }}
    {{- end }}
    {{- if .Values.mcpAddons.kubernetesRemediation.enabled }}
    {{- $k8sRemediationMcpServers := dict "kubernetes_remediation" (dict
        "description" "Kubernetes remediation - execute kubectl commands to fix cluster issues"
        "config" (dict
          "url" (printf "http://%s-k8s-remediation-mcp-server.%s.svc.cluster.local:8000/mcp" .Release.Name .Release.Namespace)
          "mode" "streamable-http"
          "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/kubernetes.svg"
        )
        "llm_instructions" (include "holmes.kubernetesRemediationMcp.llmInstructions" . | trim)
        "restricted_tools" .Values.mcpAddons.kubernetesRemediation.restrictedTools
        "approval_required_tools" .Values.mcpAddons.kubernetesRemediation.approvalRequiredTools
      )
    }}
    {{- $mcpServers = merge $mcpServers $k8sRemediationMcpServers }}
    {{- end }}
    {{- if .Values.mcpAddons.kubernetes.enabled }}
    {{- $k8sMcpConfig := dict
          "url" (printf "http://%s-k8s-mcp-server.%s.svc.cluster.local:8000/mcp" .Release.Name .Release.Namespace)
          "mode" "streamable-http"
          "icon_url" "https://cdn.simpleicons.org/kubernetes/326CE5"
    }}
    {{- with .Values.mcpAddons.kubernetes.config.oauth }}
    {{- if . }}
    {{- $_ := set $k8sMcpConfig "oauth" . }}
    {{- end }}
    {{- end }}
    {{- $k8sMcpServers := dict "kubernetes" (dict
        "description" "Kubernetes cluster access - pods, events, logs, resources, nodes, and namespaces"
        "config" $k8sMcpConfig
        "llm_instructions" (include "holmes.kubernetesMcp.llmInstructions" . | trim)
      )
    }}
    {{- $mcpServers = merge $mcpServers $k8sMcpServers }}
    {{- end }}
    {{- if .Values.mcpAddons.confluenceMcp.enabled }}
    {{- $confluenceMcpServers := dict "confluence_mcp" (dict
        "description" "Confluence documentation search and retrieval - find runbooks and internal documentation"
        "config" (dict
          "url" (printf "http://%s-confluence-mcp-server.%s.svc.cluster.local:8000/sse" .Release.Name .Release.Namespace)
          "mode" "sse"
          "icon_url" "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/confluence.svg"
        )
        "llm_instructions" (include "holmes.confluenceMcp.llmInstructions" . | trim)
      )
    }}
    {{- $mcpServers = merge $mcpServers $confluenceMcpServers }}
    {{- end }}
    mcp_servers: {{ toYaml $mcpServers | nindent 6 }}
  model_list.yaml: |-
    {{ .Values.modelList | toYaml | nindent 4 }}

{{- end }}
