{{- if .Values.mcpAddons.prefect.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prefect-mcp-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-prefect-mcp
    app.kubernetes.io/name: prefect-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: holmes
    {{- include "holmes.commonLabels" . | nindent 4 }}
  {{- with (include "holmes.commonAnnotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  PREFECT_API_URL: {{ required "mcpAddons.prefect.config.apiUrl is required" .Values.mcpAddons.prefect.config.apiUrl | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-prefect-mcp-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-prefect-mcp
    app.kubernetes.io/name: prefect-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: holmes
    {{- include "holmes.commonLabels" . | nindent 4 }}
  {{- with (include "holmes.commonAnnotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-prefect-mcp
      app.kubernetes.io/name: prefect-mcp-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-prefect-mcp
        app.kubernetes.io/name: prefect-mcp-server
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/part-of: holmes
        {{- include "holmes.commonLabels" . | nindent 8 }}
      annotations:
        {{- with (include "holmes.commonAnnotations" .) }}
        {{- . | nindent 8 }}
        {{- end }}
        checksum/config: {{ .Values.mcpAddons.prefect | toYaml | sha256sum }}
    spec:
      {{- if .Values.mcpAddons.prefect.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.mcpAddons.prefect.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.mcpAddons.prefect.tolerations }}
      tolerations:
        {{- toYaml .Values.mcpAddons.prefect.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.mcpAddons.prefect.affinity }}
      affinity:
        {{- toYaml .Values.mcpAddons.prefect.affinity | nindent 8 }}
      {{- end }}
      containers:
      - name: prefect-mcp
        image: "{{ .Values.mcpAddons.prefect.registry }}/{{ .Values.mcpAddons.prefect.image }}"
        imagePullPolicy: {{ .Values.mcpAddons.prefect.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: PREFECT_API_URL
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-prefect-mcp-config
              key: PREFECT_API_URL
        {{- if .Values.mcpAddons.prefect.auth.secretName }}
        - name: PREFECT_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mcpAddons.prefect.auth.secretName }}
              key: {{ .Values.mcpAddons.prefect.auth.secretKey | default "token" }}
        {{- end }}
        resources:
          {{- toYaml .Values.mcpAddons.prefect.resources | nindent 10 }}
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-prefect-mcp-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-prefect-mcp
    app.kubernetes.io/name: prefect-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: holmes
    {{- include "holmes.commonLabels" . | nindent 4 }}
  {{- with (include "holmes.commonAnnotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  selector:
    app: {{ .Release.Name }}-prefect-mcp
    app.kubernetes.io/name: prefect-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
{{- end }}
