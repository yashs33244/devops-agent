name: Build and Deploy HolmesGPT Documentation
on:
  push:
    branches:
      - master
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for mike to work with git history
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 1.4.0
          poetry config virtualenvs.create false
      - run: poetry install --with dev
      # Deploy versioned docs on stable release tags only (skip alpha, beta, rc)
      - name: Deploy versioned docs (release)
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          poetry run mike deploy --push --update-aliases $VERSION latest
          poetry run mike set-default --push latest
      # Deploy dev docs on master push
      - name: Deploy dev docs (master)
        if: github.ref == 'refs/heads/master'
        run: |
          poetry run mike deploy --push dev
