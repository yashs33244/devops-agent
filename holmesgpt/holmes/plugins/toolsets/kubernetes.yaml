toolsets:
  kubernetes/core:
    description: "Read access to cluster resources (excluding secrets and other sensitive data)"
    docs_url: "https://holmesgpt.dev/data-sources/builtin-toolsets/kubernetes/"
    icon_url: "https://raw.githubusercontent.com/gilbarbara/logos/de2c1f96ff6e74ea7ea979b43202e8d4b863c655/logos/kubernetes.svg"
    tags:
      - core
    prerequisites:
      - command: "kubectl version --client"

    # Note: Many tools in this toolset use transformers with llm_summarize
    # to automatically summarize large kubectl outputs when a fast model is configured.
    # This reduces context window usage while preserving key information for debugging.

    tools:
      - name: "kubernetes_jq_query"
        user_description: "jq query: kubectl get {{kind}} | jq '{{jq_expr}}'"
        description: >
          Use kubectl to get json for all resources of a specific kind and filter with jq.
          More memory-efficient than bash for large queries - uses Kubernetes API pagination
          to process resources in batches of 500, avoiding context window overflow.
          Returns a JSON object with keys: "total_items_processed" (number of resources examined),
          "matches_found" (number of results), "results" (array of matching resources), and
          "stderr" (any error output from kubectl, or null).
          IMPORTANT: The 'kind' parameter must be the plural form of the resource type
          (e.g., use "pods" not "pod", "services" not "service", "jobs" not "job").
          Do not worry about escaping the jq_expr - it will be done by the system.
          Example: .items[] | .spec.containers[].image | select(test("^gcr.io/") | not)
        script: |
          #!/bin/bash

          # Collapse multi-line jq expressions (LLMs sometimes write multi-line jq)
          # Note: use $'\n' syntax instead of '\n' because Jinja2 interprets \n as literal newlines
          JQ_FILTER={{ jq_expr }}
          JQ_FILTER=$(printf '%s' "$JQ_FILTER" | tr $'\n\r' '  ')

          err_file=$(mktemp)

          # Get the API path for the resource kind using kubectl
          API_INFO=$(kubectl api-resources --no-headers 2>>"$err_file" | grep "^{{ kind }} " | head -1)

          if [ -z "$API_INFO" ]; then
            err_content=$(cat "$err_file" 2>/dev/null)
            rm -f "$err_file"
            jq -n --arg stderr "Unable to find resource kind '{{ kind }}'. $err_content" \
              '{total_items_processed: 0, matches_found: 0, results: [], stderr: $stderr}'
            exit 0
          fi

          # Extract NAMESPACED value
          if [[ "$API_INFO" == *" true "* ]]; then
            PREFIX=$(echo "$API_INFO" | sed 's/ true .*//')
          elif [[ "$API_INFO" == *" false "* ]]; then
            PREFIX=$(echo "$API_INFO" | sed 's/ false .*//')
          else
            err_content=$(cat "$err_file" 2>/dev/null)
            rm -f "$err_file"
            jq -n --arg stderr "Could not parse API info for '{{ kind }}'. $err_content" \
              '{total_items_processed: 0, matches_found: 0, results: [], stderr: $stderr}'
            exit 0
          fi

          # Trim trailing spaces from prefix and collapse internal spaces
          PREFIX=$(echo "$PREFIX" | sed 's/  *$//' | sed 's/  */ /g')

          IFS=' ' read -ra PREFIX_FIELDS <<< "$PREFIX"
          FIELD_COUNT=0
          for field in "${PREFIX_FIELDS[@]}"; do
            ((FIELD_COUNT++))
          done

          RESOURCE_NAME="${PREFIX_FIELDS[0]}"
          if [ $FIELD_COUNT -ge 2 ]; then
            API_VERSION="${PREFIX_FIELDS[$((FIELD_COUNT - 1))]}"
          else
            API_VERSION=""
          fi

          if [ -z "$API_VERSION" ] || [ -z "$RESOURCE_NAME" ]; then
            err_content=$(cat "$err_file" 2>/dev/null)
            rm -f "$err_file"
            jq -n --arg stderr "Unable to parse API info for resource kind '{{ kind }}'. $err_content" \
              '{total_items_processed: 0, matches_found: 0, results: [], stderr: $stderr}'
            exit 0
          fi

          # Build API path
          if [[ "$API_VERSION" == "v1" ]]; then
            API_PATH="/api/v1/${RESOURCE_NAME}"
          else
            API_PATH="/apis/${API_VERSION}/${RESOURCE_NAME}"
          fi

          # Process resources in chunks using API pagination
          LIMIT=500
          CONTINUE=""
          PROCESSED=0
          TOTAL_MATCHES=0
          ALL_MATCHES=""

          while true; do
            if [ -z "$CONTINUE" ]; then
              QUERY="${API_PATH}?limit=${LIMIT}"
            else
              QUERY="${API_PATH}?limit=${LIMIT}&continue=${CONTINUE}"
            fi

            OUTPUT=$(kubectl get --raw "$QUERY" 2>>"$err_file")
            exit_code=$?

            if [ $exit_code -ne 0 ]; then
              err_content=$(cat "$err_file" 2>/dev/null)
              rm -f "$err_file"
              jq -n --arg stderr "kubectl get --raw failed for $QUERY. $err_content" \
                --argjson total "$PROCESSED" \
                '{total_items_processed: $total, matches_found: 0, results: [], stderr: $stderr}'
              exit 0
            fi

            ITEMS_COUNT=$(echo "$OUTPUT" | jq '.items | length')

            MATCHES=$(echo "$OUTPUT" | jq -c "$JQ_FILTER" 2>>"$err_file")
            jq_exit=$?
            if [ $jq_exit -ne 0 ]; then
              err_content=$(cat "$err_file" 2>/dev/null)
              rm -f "$err_file"
              jq -n --arg stderr "jq expression failed. $err_content" \
                --argjson total "$PROCESSED" \
                '{total_items_processed: $total, matches_found: 0, results: [], stderr: $stderr}'
              exit 0
            fi

            if [ "$ITEMS_COUNT" -gt 0 ]; then
              if [ -n "$MATCHES" ]; then
                if [ -z "$ALL_MATCHES" ]; then
                  ALL_MATCHES="$MATCHES"
                else
                  ALL_MATCHES="$ALL_MATCHES"$'\n'"$MATCHES"
                fi
                MATCH_COUNT=$(echo "$MATCHES" | grep -c . || true)
                TOTAL_MATCHES=$((TOTAL_MATCHES + MATCH_COUNT))
              fi
              PROCESSED=$((PROCESSED + ITEMS_COUNT))
            fi

            CONTINUE=$(echo "$OUTPUT" | jq -r '.metadata.continue // empty')

            if [ -z "$CONTINUE" ]; then
              break
            fi
          done

          err_content=$(cat "$err_file" 2>/dev/null)
          rm -f "$err_file"

          # Output results as a JSON object with metadata
          if [ -n "$ALL_MATCHES" ]; then
            RESULTS=$(echo "$ALL_MATCHES" | jq -s '.')
          else
            RESULTS="[]"
          fi

          jq -n \
            --argjson results "$RESULTS" \
            --argjson total_items_processed "$PROCESSED" \
            --argjson matches_found "$TOTAL_MATCHES" \
            --arg stderr "$err_content" \
            '{total_items_processed: $total_items_processed, matches_found: $matches_found, results: $results, stderr: (if $stderr == "" then null else $stderr end)}'
        transformers:
          - name: llm_summarize
            config:
              input_threshold: 10000
              prompt: |
                Summarize this jq query output focusing on:
                - Key patterns and commonalities in the data
                - Notable outliers, anomalies, or items that need attention
                - Group similar results into aggregate descriptions when possible
                - Highlight any empty results, null values, or missing data
                - When applicable, mention specific resource names, namespaces, or values that stand out
                - Organize findings in a structured way that helps with troubleshooting
                - Be concise: aim for ≤ 50% of the original text; prioritize aggregates and actionable outliers
                - Include grep-ready keys/values; avoid repeating entire objects or unchanged defaults

      - name: "kubernetes_tabular_query"
        user_description: "filter: kubectl get {{kind}} columns='{{columns}}'{% if filter_pattern %} filter={{filter_pattern}}{% endif %}"
        description: >
          Extract specific fields from Kubernetes resources in tabular format with optional filtering.
          Returns a JSON object with keys: "count" (number of rows), "header" (column header line),
          "rows" (array of data rows), and "stderr" (any error output, or null).
          Memory-efficient way to query large clusters - only requested fields are transmitted.
          Column specification format: HEADER:FIELD_PATH,HEADER2:FIELD_PATH2,...

          Optional filtering parameter:
          - filter_pattern: Pattern to match in any column (supports grep regex)

          Examples:
          - Basic fields: NAME:.metadata.name,STATUS:.status.phase,NODE:.spec.nodeName
          - Filter by status: filter_pattern="Running"
          - Nested fields: CREATED:.metadata.creationTimestamp,IMAGE:.spec.containers[0].image
          - Array fields: LABELS:.metadata.labels,PORTS:.spec.ports[*].port

          LIMITATIONS - not allowed characters in columns: ' / ; and newline.
          Label keys containing dots or slashes (e.g. kubernetes.io/arch, app.kubernetes.io/name)
          CANNOT be queried with this tool because dots are path separators in JSONPath and
          slashes are forbidden characters. Use kubernetes_jq_query instead for labels with
          special characters, e.g.: .items[] | {name: .metadata.name, arch: .metadata.labels["kubernetes.io/arch"]}
          Similarly, use .status.nodeInfo.architecture instead of .metadata.labels["kubernetes.io/arch"] when possible.
        script: |
          #!/bin/bash
          err_file=$(mktemp)
          output=$(kubectl get {{ kind }} --all-namespaces -o custom-columns='{{ columns }}' 2>"$err_file")
          kubectl_exit=$?
          err_content=$(cat "$err_file" 2>/dev/null)
          rm -f "$err_file"

          if [ $kubectl_exit -ne 0 ] || [ -z "$output" ]; then
            if command -v jq &>/dev/null; then
              jq -n --arg stderr "$err_content" '{count: 0, header: null, rows: [], stderr: $stderr}'
            else
              echo "=== STDERR ==="
              echo "$err_content"
              echo "=== ROWS ==="
              echo "=== COUNT ==="
              echo 0
            fi
            exit 0
          fi

          # Split header and data rows
          header=$(echo "$output" | head -1)
          {% if filter_pattern %}
          data=$(echo "$output" | tail -n +2 | grep -E '{{ filter_pattern }}' || true)
          {% else %}
          data=$(echo "$output" | tail -n +2)
          {% endif %}

          if command -v jq &>/dev/null; then
            if [ -n "$data" ]; then
              rows=$(echo "$data" | jq -R . | jq -s '.')
              count=$(echo "$data" | wc -l)
            else
              rows="[]"
              count=0
            fi
            jq -n \
              --argjson count "$count" \
              --arg header "$header" \
              --argjson rows "$rows" \
              --arg stderr "$err_content" \
              '{count: $count, header: $header, rows: $rows, stderr: (if $stderr == "" then null else $stderr end)}'
          else
            echo "=== STDERR ==="
            echo "$err_content"
            echo "=== HEADER ==="
            echo "$header"
            echo "=== ROWS ==="
            echo "$data"
            echo "=== COUNT ==="
            if [ -n "$data" ]; then echo "$data" | wc -l; else echo 0; fi
          fi
        transformers:
          - name: llm_summarize
            config:
              input_threshold: 10000
              prompt: |
                Summarize this tabular output focusing on:
                - Key patterns and trends in the data
                - Resources that need attention (errors, pending, failures)
                - Group similar items into aggregate descriptions
                - Highlight outliers or unusual values
                - Mention specific resource names only for problematic items
                - Provide counts and distributions where relevant
                - Be concise: aim for ≤ 50% of the original size
                - Keep output actionable and focused on anomalies

      - name: "kubernetes_count"
        user_description: "count: kubectl get {{kind}} | jq '{{jq_expr}}'"
        description: >
          Use kubectl to apply a jq filter and then count the results.
          Use this whenever asked to count kubernetes resources.
          More memory-efficient than bash for large queries - uses Kubernetes API pagination
          to process resources in batches of 500, avoiding context window overflow.
          Returns a JSON object with keys: "total_items_processed", "matches_found" (number of matches),
          "preview" (first 10 results truncated to 200 chars), and "stderr" (any error output, or null).
          IMPORTANT: The 'kind' parameter must be the plural form of the resource type
          (e.g., use "pods" not "pod", "services" not "service", "jobs" not "job").
          Use select() to filter objects before extracting properties, e.g. .items[] | select(.metadata.namespace == "test-1") | .metadata.name
          Do not worry about escaping the jq_expr it will be done by the system on an unescaped expression that you give.
          e.g. give an expression like .items[] | select(.spec.containers[].image | test("^gcr.io/") | not) | .metadata.name
        script: |
          #!/bin/bash

          err_file=$(mktemp)

          # Get the API path for the resource kind
          API_INFO=$(kubectl api-resources --no-headers 2>>"$err_file" | grep "^{{ kind }} " | head -1)

          if [ -z "$API_INFO" ]; then
            err_content=$(cat "$err_file" 2>/dev/null)
            rm -f "$err_file"
            jq -n --arg stderr "Unable to find resource kind '{{ kind }}'. $err_content" \
              '{total_items_processed: 0, matches_found: 0, preview: [], stderr: $stderr}'
            exit 0
          fi

          if [[ "$API_INFO" == *" true "* ]]; then
            PREFIX=$(echo "$API_INFO" | sed 's/ true .*//')
          elif [[ "$API_INFO" == *" false "* ]]; then
            PREFIX=$(echo "$API_INFO" | sed 's/ false .*//')
          else
            err_content=$(cat "$err_file" 2>/dev/null)
            rm -f "$err_file"
            jq -n --arg stderr "Could not parse API info for '{{ kind }}'. $err_content" \
              '{total_items_processed: 0, matches_found: 0, preview: [], stderr: $stderr}'
            exit 0
          fi

          PREFIX=$(echo "$PREFIX" | sed 's/  *$//' | sed 's/  */ /g')

          IFS=' ' read -ra PREFIX_FIELDS <<< "$PREFIX"
          FIELD_COUNT=0
          for field in "${PREFIX_FIELDS[@]}"; do
            ((FIELD_COUNT++))
          done
          RESOURCE_NAME="${PREFIX_FIELDS[0]}"

          if [ $FIELD_COUNT -ge 2 ]; then
            API_VERSION="${PREFIX_FIELDS[$((FIELD_COUNT - 1))]}"
          else
            API_VERSION=""
          fi

          if [ -z "$API_VERSION" ] || [ -z "$RESOURCE_NAME" ]; then
            err_content=$(cat "$err_file" 2>/dev/null)
            rm -f "$err_file"
            jq -n --arg stderr "Unable to parse API info for resource kind '{{ kind }}'. $err_content" \
              '{total_items_processed: 0, matches_found: 0, preview: [], stderr: $stderr}'
            exit 0
          fi

          # Build API path
          if [[ "$API_VERSION" == "v1" ]]; then
            API_PATH="/api/v1/${RESOURCE_NAME}"
          else
            API_PATH="/apis/${API_VERSION}/${RESOURCE_NAME}"
          fi

          # Process resources in chunks using API pagination
          LIMIT=500
          CONTINUE=""
          ALL_MATCHES=""
          TOTAL_PROCESSED=0

          while true; do
            if [ -z "$CONTINUE" ]; then
              QUERY="${API_PATH}?limit=${LIMIT}"
            else
              QUERY="${API_PATH}?limit=${LIMIT}&continue=${CONTINUE}"
            fi

            OUTPUT=$(kubectl get --raw "$QUERY" 2>>"$err_file")
            exit_code=$?

            if [ $exit_code -ne 0 ]; then
              err_content=$(cat "$err_file" 2>/dev/null)
              rm -f "$err_file"
              jq -n --arg stderr "kubectl get --raw failed for $QUERY. $err_content" \
                --argjson total "$TOTAL_PROCESSED" \
                '{total_items_processed: $total, matches_found: 0, preview: [], stderr: $stderr}'
              exit 0
            fi

            ITEMS_COUNT=$(echo "$OUTPUT" | jq '.items | length')
            TOTAL_PROCESSED=$((TOTAL_PROCESSED + ITEMS_COUNT))

            BATCH_MATCHES=$(echo "$OUTPUT" | jq -c -r {{ jq_expr }} 2>>"$err_file")
            jq_exit=$?
            if [ $jq_exit -ne 0 ]; then
              err_content=$(cat "$err_file" 2>/dev/null)
              rm -f "$err_file"
              jq -n --arg stderr "jq expression failed. $err_content" \
                --argjson total "$TOTAL_PROCESSED" \
                '{total_items_processed: $total, matches_found: 0, preview: [], stderr: $stderr}'
              exit 0
            fi

            if [ -n "$BATCH_MATCHES" ]; then
              if [ -z "$ALL_MATCHES" ]; then
                ALL_MATCHES="$BATCH_MATCHES"
              else
                ALL_MATCHES="$ALL_MATCHES"$'\n'"$BATCH_MATCHES"
              fi
            fi

            CONTINUE=$(echo "$OUTPUT" | jq -r '.metadata.continue // empty')
            if [ -z "$CONTINUE" ]; then
              break
            fi
          done

          err_content=$(cat "$err_file" 2>/dev/null)
          rm -f "$err_file"

          # Count and preview the collected matches
          filtered_matches=$(echo "$ALL_MATCHES" | grep -v '^$' | grep -v '^null$')
          if [ -z "$filtered_matches" ]; then
            MATCHES_FOUND=0
            PREVIEW="[]"
          else
            MATCHES_FOUND=$(echo "$filtered_matches" | wc -l)
            PREVIEW=$(echo "$filtered_matches" | head -n 10 | cut -c 1-200 | jq -R . | jq -s '.')
          fi

          jq -n \
            --argjson matches_found "$MATCHES_FOUND" \
            --argjson preview "$PREVIEW" \
            --argjson total_items_processed "$TOTAL_PROCESSED" \
            --arg stderr "$err_content" \
            '{total_items_processed: $total_items_processed, matches_found: $matches_found, preview: $preview, stderr: (if $stderr == "" then null else $stderr end)}'

    # NOTE: this is only possible for probes with a healthz endpoint - we do this to avoid giving the LLM generic
    # http GET capabilities which are more powerful than we want to expose
