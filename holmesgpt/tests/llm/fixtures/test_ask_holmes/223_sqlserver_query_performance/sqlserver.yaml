apiVersion: v1
kind: Secret
metadata:
  name: sqlserver-secret
  namespace: app-223
type: Opaque
stringData:
  MSSQL_SA_PASSWORD: "HolmesTest123!"
  ACCEPT_EULA: "Y"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
  namespace: app-223
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlserver
  template:
    metadata:
      labels:
        app: sqlserver
    spec:
      containers:
      - name: sqlserver
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
        - containerPort: 1433
        envFrom:
        - secretRef:
            name: sqlserver-secret
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "2000m"
        readinessProbe:
          exec:
            command:
            - /opt/mssql-tools18/bin/sqlcmd
            - -S
            - localhost
            - -U
            - sa
            - -P
            - HolmesTest123!
            - -C
            - -Q
            - SELECT 1
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sqlserver
  namespace: app-223
spec:
  selector:
    app: sqlserver
  ports:
  - port: 1433
    targetPort: 1433
