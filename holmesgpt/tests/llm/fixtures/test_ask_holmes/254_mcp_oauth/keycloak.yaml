---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: app-254
data:
  mcp-oauth-realm.json: |
    {
      "id": "mcp-oauth",
      "realm": "mcp-oauth",
      "displayName": "MCP OAuth Test Realm",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": false,
      "editUsernameAllowed": false,
      "bruteForceProtected": false,
      "accessTokenLifespan": 1800,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 36000,
      "clientScopes": [
        {
          "name": "mcp:tools",
          "description": "Access to MCP server tools",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true",
            "consent.screen.text": "Access MCP server tools"
          },
          "protocolMappers": [
            {
              "name": "audience-mcp-server",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "consentRequired": false,
              "config": {
                "included.custom.audience": "http://localhost:18254",
                "id.token.claim": "false",
                "access.token.claim": "true",
                "introspection.token.claim": "true"
              }
            }
          ]
        }
      ],
      "defaultDefaultClientScopes": [
        "mcp:tools"
      ],
      "clients": [
        {
          "clientId": "mcp-server",
          "name": "MCP OAuth Server",
          "description": "Confidential client for MCP server token introspection",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "mcp-server-secret",
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "publicClient": false,
          "protocol": "openid-connect"
        },
        {
          "clientId": "holmes-client",
          "name": "Holmes OAuth Client",
          "description": "Public client for end-users to obtain tokens via authorization code + PKCE",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": false,
          "protocol": "openid-connect",
          "redirectUris": [
            "http://localhost:*",
            "http://127.0.0.1:*"
          ],
          "webOrigins": [
            "+"
          ],
          "defaultClientScopes": [
            "mcp:tools"
          ],
          "attributes": {
            "pkce.code.challenge.method": "S256"
          }
        }
      ],
      "users": [
        {
          "username": "test-user",
          "email": "test@example.com",
          "emailVerified": true,
          "enabled": true,
          "firstName": "Test",
          "lastName": "User",
          "credentials": [
            {
              "type": "password",
              "value": "test-password",
              "temporary": false
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: app-254
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /data && mkdir -p /data/import && cp /realm-config/*.json /data/import/ && chown -R 1000:1000 /data/import"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: keycloak-data
              mountPath: /data
            - name: realm-config
              mountPath: /realm-config
              readOnly: true
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0.7
          args: ["start-dev", "--import-realm"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: management
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: "admin"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_HOSTNAME
              value: "http://localhost:18080"
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "true"
          volumeMounts:
            - name: keycloak-data
              mountPath: /opt/keycloak/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          # No readiness/liveness probes — we poll from before_test instead
          # to avoid race between probe passing and realm import completing
      volumes:
        - name: keycloak-data
          emptyDir: {}
        - name: realm-config
          configMap:
            name: keycloak-realm-config
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: app-254
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: http
      name: http
  type: ClusterIP
