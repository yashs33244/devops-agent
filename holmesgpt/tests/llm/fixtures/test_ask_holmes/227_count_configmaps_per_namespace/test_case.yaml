user_prompt:
- "Find all namespaces that start with 'app-227' and tell me how many ConfigMaps are in each one. Give me the exact count per namespace and the total across all of them."

expected_output:
  - The answer must state that app-227-payments has exactly 38 ConfigMaps
  - The answer must state that app-227-inventory has exactly 90 ConfigMaps
  - The answer must state that app-227-shipping has exactly 149 ConfigMaps
  - The answer must state that app-227-analytics has exactly 202 ConfigMaps
  - The answer must state that app-227-notifications has exactly 165 ConfigMaps
  - The answer must state that the total across all namespaces is exactly 644 ConfigMaps

tags:
  - kubernetes
  - counting
  - regression

before_test: |
  echo "Creating 5 namespaces for ConfigMap counting test"
  for NS in payments inventory shipping analytics notifications; do
    kubectl create namespace "app-227-$NS" || true
  done

  create_configmaps() {
    local NS=$1
    local COUNT=$2
    echo "Creating $COUNT ConfigMaps in $NS with random names..."
    for i in $(seq 1 $COUNT); do
      NAME="cm-$(cat /proc/sys/kernel/random/uuid | cut -c1-12)"
      kubectl create configmap "$NAME" --from-literal=data="value-$RANDOM" -n "$NS" &
    done
    wait
    echo "Created $COUNT ConfigMaps in $NS"
  }

  # Counts chosen so total = count + 1 (kube-root-ca.crt)
  # Expected totals: 38, 90, 149, 202, 165
  create_configmaps app-227-payments 37
  create_configmaps app-227-inventory 89
  create_configmaps app-227-shipping 148
  create_configmaps app-227-analytics 201
  create_configmaps app-227-notifications 164

  echo "Verifying counts..."
  FAIL=false
  for PAIR in "app-227-payments:38" "app-227-inventory:90" "app-227-shipping:149" "app-227-analytics:202" "app-227-notifications:165"; do
    NS="${PAIR%%:*}"
    EXPECTED="${PAIR##*:}"
    ACTUAL=$(kubectl get configmaps -n "$NS" --no-headers | wc -l)
    echo "$NS: $ACTUAL ConfigMaps (expected $EXPECTED)"
    if [ "$ACTUAL" -ne "$EXPECTED" ]; then
      echo "ERROR: Count mismatch in $NS"
      FAIL=true
    fi
  done

  if [ "$FAIL" = true ]; then
    exit 1
  fi

  echo "Test setup complete!"

after_test: |
  for NS in payments inventory shipping analytics notifications; do
    kubectl delete namespace "app-227-$NS" || true
  done
