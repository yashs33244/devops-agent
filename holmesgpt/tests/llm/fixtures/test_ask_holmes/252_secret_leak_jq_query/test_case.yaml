user_prompt: "This is a massive cluster with thousands of deployments. Check all deployments for hardcoded passwords or API keys in environment variables using a jq query to filter efficiently. Report the deployment names and variable names you find."

# Core criteria: the kubernetes_jq_query tool must succeed (not error from shell parsing)
# and Holmes must discover the specific workloads and env var names proving it actually queried the data.
include_tool_calls: true
expected_output:
  - Must call kubernetes_jq_query tool successfully (no jq errors)
  - "inventory-api"
  - "DB_PASSWORD"
  - "checkout-service"
  - "STRIPE_API_KEY"

tags:
  - kubernetes
  - medium

before_test: |
  kubectl create namespace app-252 --save-config --dry-run=client -o yaml | kubectl apply -f - || true

  cat <<'EOF' | kubectl apply -f -
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: inventory-api
    namespace: app-252
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: inventory-api
    template:
      metadata:
        labels:
          app: inventory-api
      spec:
        containers:
        - name: api
          image: busybox:1.36
          command: ["sleep", "3600"]
          env:
          - name: DB_PASSWORD
            value: "prod-db-pass-HOLMES-EVAL-LEAK-9x7m"
          - name: APP_NAME
            value: "inventory-api"
          - name: SERVICE_PORT
            value: "8080"
  ---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: checkout-service
    namespace: app-252
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: checkout-service
    template:
      metadata:
        labels:
          app: checkout-service
      spec:
        containers:
        - name: checkout
          image: busybox:1.36
          command: ["sleep", "3600"]
          env:
          - name: STRIPE_API_KEY
            value: "sk_live_HOLMES-EVAL-LEAK-9x7m"
          - name: LOG_LEVEL
            value: "info"
  ---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: safe-worker
    namespace: app-252
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: safe-worker
    template:
      metadata:
        labels:
          app: safe-worker
      spec:
        containers:
        - name: worker
          image: busybox:1.36
          command: ["sleep", "3600"]
          env:
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-creds
                key: password
          - name: APP_NAME
            value: "safe-worker"
  EOF

  READY=false
  for i in {1..60}; do
    COUNT=$(kubectl get deployments -n app-252 --no-headers 2>/dev/null | wc -l)
    if [ "$COUNT" -ge 3 ]; then
      echo "✅ All 3 deployments created in app-252"
      READY=true
      break
    fi
    echo "⏳ Attempt $i/60: $COUNT/3 deployments found..."
    sleep 1
  done
  if [ "$READY" = false ]; then
    echo "❌ Deployments not created after 60s"
    kubectl get deployments -n app-252
    exit 1
  fi

  # Verify the data is queryable via a jq pattern with pipes, regex, and semicolons
  VERIFY=$(kubectl get deployments -n app-252 -o json | jq -r '.items[] | .spec.template.spec.containers[] | .env // [] | .[] | select(.value != null and (.valueFrom == null)) | select(.name | test("PASSWORD|SECRET|API_KEY|CREDENTIAL"; "i")) | .name')
  if echo "$VERIFY" | grep -q "DB_PASSWORD" && echo "$VERIFY" | grep -q "STRIPE_API_KEY"; then
    echo "✅ Verification: found DB_PASSWORD and STRIPE_API_KEY via jq query"
  else
    echo "❌ Verification failed: expected DB_PASSWORD and STRIPE_API_KEY in jq output"
    echo "Got: $VERIFY"
    exit 1
  fi

after_test: |
  kubectl delete namespace app-252 || true
