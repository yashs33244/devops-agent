apiVersion: v1
kind: Namespace
metadata:
  name: app-228
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-service
  namespace: app-228
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-service
  template:
    metadata:
      labels:
        app: web-service
    spec:
      containers:
      - name: web-service
        image: nginx:tag-does-not-exist-228
        ports:
        - containerPort: 80
