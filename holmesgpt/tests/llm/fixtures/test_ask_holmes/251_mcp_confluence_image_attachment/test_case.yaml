# Test: MCP server image support - Confluence page with image attachment
# Tests that Holmes can receive and interpret images returned by MCP tools.
# The mcp-atlassian server's confluence_get_page_images tool returns ImageContent
# blocks, which Holmes must pass through to the vision-capable LLM.
#
# Currently RED: MCP tool results only extract text content (c.type == "text"),
# dropping image content blocks entirely. Holmes cannot see images from MCP tools.
#
# Requirements:
#   CONFLUENCE_BASE_URL - Atlassian instance URL (e.g. https://robusta-llm-test.atlassian.net)
#   CONFLUENCE_USER - Email/username for Confluence (personal API key)
#   CONFLUENCE_API_KEY - Atlassian API token (personal API key)
#   CONFLUENCE_SA_USER - Service account email (used only for setup)
#   CONFLUENCE_SA_API_KEY - Service account API token (used only for setup)
#   CONFLUENCE_SA_BASE_URL - API gateway URL (used only for setup, auto-derived by conftest.py)
#
# Reentrancy: This test is fully idempotent. The space, page, and attachment
# use static names and are created-or-reused on each run. after_test is a no-op
# so parallel CI runs on different PRs never delete resources out from under
# each other.

user_prompt: |
  In the Confluence space 'HLMS233', find the page titled 'Platform Credentials'
  and look at the image attached to it. Tell me the code shown in the image.

expected_output:
  - "Must report the code from the image: IMGVERIFY-7Q3X9P"

include_tool_calls: true

tags:
  - confluence
  - images
  - question-answer
  - hard
  - fast

before_test: |
  set -e

  # Validate required environment variables
  # SA creds are used for both setup (Bearer auth) and MCP server (basic auth via API gateway)
  [ -n "${CONFLUENCE_BASE_URL:-}" ] || { echo "Missing env var: CONFLUENCE_BASE_URL"; exit 1; }
  [ -n "${CONFLUENCE_SA_USER:-}" ] || { echo "Missing env var: CONFLUENCE_SA_USER"; exit 1; }
  [ -n "${CONFLUENCE_SA_API_KEY:-}" ] || { echo "Missing env var: CONFLUENCE_SA_API_KEY"; exit 1; }
  [ -n "${CONFLUENCE_SA_BASE_URL:-}" ] || { echo "Missing env var: CONFLUENCE_SA_BASE_URL (should be auto-derived by conftest.py)"; exit 1; }
  API_BASE="${CONFLUENCE_SA_BASE_URL}"

  SPACE_KEY="HLMS233"
  SPACE_NAME="Holmes Eval 233"
  PAGE_TITLE="Platform Credentials"

  # Path to pre-generated verification image (no Pillow dependency needed)
  # before_test runs with cwd set to the fixture directory
  IMAGE_PATH="${PWD}/credentials.png"
  if [ ! -f "$IMAGE_PATH" ]; then
    echo "Missing fixture image: ${IMAGE_PATH}"
    exit 1
  fi

  echo "Creating Confluence space ${SPACE_KEY} (idempotent)..."
  RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${API_BASE}/wiki/rest/api/space" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"key\": \"${SPACE_KEY}\",
      \"name\": \"${SPACE_NAME}\",
      \"description\": {
        \"plain\": {
          \"value\": \"Test space for Holmes MCP image eval 233\",
          \"representation\": \"plain\"
        }
      }
    }")

  HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
  BODY=$(echo "$RESPONSE" | sed '$d')

  if [ "$HTTP_CODE" -eq 200 ]; then
    echo "Space created."
  elif echo "$BODY" | grep -q "already exists"; then
    echo "Space already exists, reusing."
  else
    echo "Failed to create space. HTTP ${HTTP_CODE}: ${BODY}"
    exit 1
  fi

  # Poll until space is queryable (eventual consistency)
  SPACE_READY=false
  for i in $(seq 1 15); do
    if curl -L -s "${API_BASE}/wiki/rest/api/space/${SPACE_KEY}" \
      -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" | grep -q "${SPACE_KEY}"; then
      SPACE_READY=true
      break
    fi
    sleep 1
  done
  if [ "$SPACE_READY" = false ]; then
    echo "Space not queryable after 15s"
    exit 1
  fi

  echo "Creating page (idempotent)..."
  PAGE_RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${API_BASE}/wiki/rest/api/content" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"type\": \"page\",
      \"title\": \"${PAGE_TITLE}\",
      \"space\": {\"key\": \"${SPACE_KEY}\"},
      \"body\": {
        \"storage\": {
          \"value\": \"<p>This page has an image attachment. Look at the attached image to find the code.</p>\",
          \"representation\": \"storage\"
        }
      }
    }")

  PAGE_HTTP=$(echo "$PAGE_RESPONSE" | tail -n1)
  PAGE_BODY=$(echo "$PAGE_RESPONSE" | sed '$d')

  if [ "$PAGE_HTTP" -eq 200 ]; then
    PAGE_ID=$(echo "$PAGE_BODY" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
  else
    echo "Page creation returned HTTP ${PAGE_HTTP}, searching for existing page..."
    SEARCH_RESP=$(curl -L -s -w "\n%{http_code}" -G \
      "${API_BASE}/wiki/rest/api/content" \
      --data-urlencode "title=${PAGE_TITLE}" \
      --data-urlencode "spaceKey=${SPACE_KEY}" \
      -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")
    SEARCH_HTTP=$(echo "$SEARCH_RESP" | tail -n1)
    SEARCH_BODY=$(echo "$SEARCH_RESP" | sed '$d')
    if [ "$SEARCH_HTTP" -ne 200 ]; then
      echo "Page search returned HTTP ${SEARCH_HTTP}: ${SEARCH_BODY}"
      exit 1
    fi
    PAGE_ID=$(echo "$SEARCH_BODY" | python3 -c 'import sys,json; r=json.load(sys.stdin).get("results",[]); print(r[0]["id"]) if r else sys.exit(1)')
    if [ -z "$PAGE_ID" ]; then
      echo "Failed to create or find page."
      exit 1
    fi
    echo "Found existing page."
  fi
  echo "Page ID: ${PAGE_ID}"

  echo "Uploading image attachment to page ${PAGE_ID} (idempotent)..."
  ATTACH_RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${API_BASE}/wiki/rest/api/content/${PAGE_ID}/child/attachment" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "X-Atlassian-Token: nocheck" \
    -F "file=@${IMAGE_PATH};filename=credentials.png" \
    -F "comment=Platform access credentials")

  ATTACH_HTTP=$(echo "$ATTACH_RESPONSE" | tail -n1)
  ATTACH_BODY=$(echo "$ATTACH_RESPONSE" | sed '$d')

  if [ "$ATTACH_HTTP" -eq 200 ]; then
    echo "Image attached successfully"
  elif echo "$ATTACH_BODY" | grep -q "same file name"; then
    echo "Attachment already exists, reusing."
  else
    echo "Attachment upload returned HTTP ${ATTACH_HTTP}: ${ATTACH_BODY}"
    exit 1
  fi

  # Poll until attachment is visible (eventual consistency)
  ATTACH_VERIFIED=false
  for i in $(seq 1 15); do
    COUNT=$(curl -L -s \
      "${API_BASE}/wiki/rest/api/content/${PAGE_ID}/child/attachment" \
      -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
      | python3 -c 'import sys,json; print(json.load(sys.stdin)["size"])' 2>/dev/null || echo "0")
    if [ "$COUNT" -gt 0 ]; then
      echo "Verified: ${COUNT} attachment(s) on page ${PAGE_ID}"
      ATTACH_VERIFIED=true
      break
    fi
    sleep 1
  done
  if [ "$ATTACH_VERIFIED" = false ]; then
    echo "No attachments found after 15s"
    exit 1
  fi

  echo "Setup complete"

# No after_test cleanup — intentionally omitted for reentrancy.
# Cloud service evals with static resource names must NOT delete resources
# in after_test because parallel CI runs would race. The space/page/attachment
# are tiny and reused across runs. See CLAUDE.md "Cloud Service Eval Reentrancy".
