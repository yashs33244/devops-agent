## Datadog Monitor definitions for failed Kubernetes jobs.
## Deployed via the Datadog API (POST /api/v1/monitor).
## See: https://docs.datadoghq.com/api/latest/monitors/#create-a-monitor

monitors:
  - name: "[tracer] Kubernetes Job Failed"
    type: metric alert
    query: >-
      sum(last_1m):sum:kubernetes_state.job.failed{kube_namespace:tracer-test} by {kube_job} > 0
    message: >-
      {{#is_alert}}
      Kubernetes job {{kube_job.name}} failed in namespace tracer-test.
      Check pod logs and events for details.
      @slack-devs-alerts
      {{/is_alert}}

      {{#is_recovery}}
      Job {{kube_job.name}} has recovered.
      @slack-devs-alerts
      {{/is_recovery}}
    tags:
      - managed_by:tracer-agent
      - env:test
      - service:tracer-k8s-test
    priority: 3
    options:
      thresholds:
        critical: 0
      notify_no_data: false
      renotify_interval: 0
      evaluation_delay: 0

  - name: "[tracer] Pipeline Error in Logs"
    type: log alert
    query: >-
      logs("PIPELINE_ERROR kube_namespace:tracer-test").index("*").rollup("count").last("1m") > 0
    message: >-
      {{#is_alert}}
      Pipeline error detected in tracer-test namespace.
      Review application logs for the PIPELINE_ERROR pattern.
      @slack-devs-alerts
      {{/is_alert}}

      {{#is_recovery}}
      No more pipeline errors detected.
      @slack-devs-alerts
      {{/is_recovery}}
    tags:
      - managed_by:tracer-agent
      - env:test
      - service:tracer-k8s-test
    priority: 3
    options:
      thresholds:
        critical: 0
      notify_no_data: false
      renotify_interval: 0
      enable_logs_sample: true
