# Nginx HTTP server for HTTPChaos (abort on port 80). HTTPChaos does not support HTTPS.
#
# Prereq: `make chaos-mesh-up`. No Chaos control-plane pods on the target (see Chaos Mesh docs).
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-abort-demo
  namespace: default
  labels:
    app: http-abort-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-abort-demo
  template:
    metadata:
      labels:
        app: http-abort-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
