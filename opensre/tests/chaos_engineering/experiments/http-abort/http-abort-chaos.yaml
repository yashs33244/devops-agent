# HTTPChaos: abort HTTP requests matching port/path/method on target pods.
#
apiVersion: chaos-mesh.org/v1alpha1
kind: HTTPChaos
metadata:
  name: http-abort-demo
  namespace: default
spec:
  mode: all
  duration: "3m"
  selector:
    namespaces:
      - default
    labelSelectors:
      app: http-abort-demo
  target: Request
  port: 80
  path: "*"
  method: GET
  abort: true
