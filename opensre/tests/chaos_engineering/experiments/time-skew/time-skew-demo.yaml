# Nginx target for TimeChaos (clock offset in PID 1 namespace). Cache/TLS apps are more sensitive.
#
# kubectl apply -f .../time-skew-demo.yaml --context=kind-tracer-k8s-test
# kubectl apply -f .../time-skew-chaos.yaml --context=kind-tracer-k8s-test
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: time-skew-demo
  namespace: default
  labels:
    app: time-skew-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: time-skew-demo
  template:
    metadata:
      labels:
        app: time-skew-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
