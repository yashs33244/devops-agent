# Nginx target for NetworkChaos (action: loss).
#
# Prereq: `make chaos-mesh-up`. Apply workload, then chaos CR.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-loss-demo
  namespace: default
  labels:
    app: network-loss-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-loss-demo
  template:
    metadata:
      labels:
        app: network-loss-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
