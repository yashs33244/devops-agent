# Nginx deployment targeted by PodChaos (action: pod-kill). Separate from shared chaos-demo.
#
# Prereq: `make chaos-mesh-up`.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-kill-victim-demo
  namespace: default
  labels:
    app: pod-kill-victim-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod-kill-victim-demo
  template:
    metadata:
      labels:
        app: pod-kill-victim-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
