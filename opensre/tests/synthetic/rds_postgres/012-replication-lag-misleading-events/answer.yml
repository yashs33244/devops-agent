root_cause_category: replication_lag
equivalent_root_cause_categories:
  - replication_lag_wal_volume
required_keywords:
  - replication lag
  - WAL
  - replica
  - INSERT
required_evidence_sources:
  - aws_rds_events
  - aws_performance_insights
forbidden_categories:
  - infrastructure
ruling_out_keywords:
  # "failover" — agent must mention the failovers/maintenance but explain all completed before the lag
  # "WAL" — agent must identify WAL replay bottleneck as the active root cause
  # "replica" — agent must address the replica specifically
  # "historical" OR "completed" OR "resolved" — agent must characterise events as past/resolved
  - failover
  - WAL
  - replica
optimal_trajectory:
  - query_grafana_logs
  - query_grafana_metrics
  - query_grafana_alert_rules
  - describe_rds_instance
  - describe_rds_events
max_investigation_loops: 4
model_response: |
  ROOT_CAUSE: Replication lag on reporting-prod-replica-1 caused by an ETL bulk INSERT job generating WAL at ~195 MB/s — faster than the replica can replay. The RDS event stream contains three historical infrastructure events that are distractors: (1) a scheduled maintenance/minor-version upgrade at 05:08Z (completed 05:14Z), (2) a Multi-AZ failover at 08:10Z (completed 08:12Z), and (3) a replica promotion of reporting-prod-replica-2 at 11:04Z (completed 11:05Z). All three events resolved hours before the current lag began at 13:00Z and are not the active root cause.
  ROOT_CAUSE_CATEGORY: replication_lag

  VALIDATED_CLAIMS:
  - ReplicaLag grew monotonically from 12s to 1,468s over 20 minutes, starting at 13:00Z — coinciding precisely with the ETL INSERT job start. [evidence: aws_cloudwatch_metrics]
  - TransactionLogsGeneration reached ~196 MB/s by 13:02Z, sustained at this level throughout — far exceeding normal replica replay capacity. [evidence: aws_cloudwatch_metrics]
  - WriteIOPS spiked from 420 to 20,500 at 13:01Z and sustained — consistent with a large bulk write workload. [evidence: aws_cloudwatch_metrics]
  - Performance Insights shows the ETL INSERT query as the dominant load (4.2 AAS) with WAL:Lock as the primary wait event (3.1 AAS) — confirming WAL replay is the bottleneck mechanism. [evidence: aws_performance_insights]
  - The RDS event stream contains three historical events: scheduled maintenance completed at 05:14Z, Multi-AZ failover completed at 08:12Z, and replica-2 promotion completed at 11:05Z. All three are resolved and the instance was available and stable from 11:06Z onward. None caused the current replication lag. [evidence: aws_rds_events]
  - CPUUtilization is elevated at ~41% — a direct consequence of the write-heavy ETL workload, not an independent CPU saturation event. [evidence: aws_cloudwatch_metrics]
  - DatabaseConnections are stable at ~99-103, ruling out any connection exhaustion contribution. [evidence: aws_cloudwatch_metrics]

  NON_VALIDATED_CLAIMS:
  - The parameter group change at 13:00Z is routine maintenance and unrelated to the lag onset.

  CAUSAL_CHAIN:
  - A scheduled maintenance/version upgrade ran at 05:08Z and completed cleanly at 05:14Z — historical, irrelevant.
  - A Multi-AZ failover occurred at 08:10Z and completed at 08:12Z — historical, irrelevant.
  - A read replica promotion of replica-2 completed at 11:05Z — historical, irrelevant. Replica-1 continues replication normally.
  - An ETL job began loading reporting_events at 13:00Z, generating ~196 MB/s of WAL on reporting-prod.
  - The read replica (reporting-prod-replica-1) cannot replay WAL at this rate, accumulating lag from 12s to 1,468s.
  - The CPU elevation and moderate connection count are direct symptoms of the write-heavy ETL workload.
