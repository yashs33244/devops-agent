root_cause_category: connection_exhaustion
required_keywords:
  - connection
  - idle
  - Client:ClientRead
  - CPU
  - root
  - single
forbidden_keywords:
  - two independent problems
  - separate root causes
  - two root causes
required_evidence_sources:
  - aws_performance_insights
optimal_trajectory:
  - query_grafana_metrics
  - query_grafana_logs
  - query_grafana_alert_rules
  - describe_rds_instance
  - describe_rds_events
max_investigation_loops: 4
model_response: |
  ROOT_CAUSE: The root cause is a connection pool leak in search_svc — a single shared root that simultaneously drives connection exhaustion and CPU saturation. Leaked connections hold open long-running search_index queries whose results are never read by the caller (Client:ClientRead wait). These idle-but-open connections accumulate until the connection ceiling is hit while each one continues to consume CPU, making this a single causal chain not two independent problems.
  ROOT_CAUSE_CATEGORY: connection_exhaustion

  VALIDATED_CLAIMS:
  - DatabaseConnections grew monotonically from 4,612 to 4,998 (99.96% of 5,000 max), with new connections being refused by 20:14Z. [evidence: aws_cloudwatch_metrics]
  - CPUUtilization rose concurrently from 88% to 94% — correlated with, not independent of, the connection growth. [evidence: aws_cloudwatch_metrics]
  - ReadIOPS also rose monotonically (12,840 → 15,320), consistent with increasing scan load from accumulated connections. [evidence: aws_cloudwatch_metrics]
  - Performance Insights shows Client:ClientRead as the dominant wait event at 5.9 AAS — the queries have completed server-side processing but the client is not reading the results, confirming idle-but-open connections. [evidence: aws_performance_insights]
  - The top two SQL statements are both full-table scans on search_index with no filtering index, each consuming 1-2 CPU AAS per query. At 4,000+ such connections, cumulative CPU reaches saturation. [evidence: aws_performance_insights]
  - No storage or replication metrics deviate from normal. No infrastructure events. [evidence: aws_cloudwatch_metrics, aws_rds_events]

  NON_VALIDATED_CLAIMS:
  - The connection pool leak likely originates from a search_svc deployment that introduced unbounded connection creation without proper cleanup on query timeout.

  CAUSAL_CHAIN:
  - A search_svc connection pool bug creates connections faster than it releases them.
  - Each leaked connection holds an open search_index query waiting on Client:ClientRead (server has finished; client is gone or hung).
  - As connections accumulate, each one continues to consume CPU from the periodic full-table scans.
  - The dual signal (connections at ceiling + CPU at 94%) are not two independent faults — they are the same leaked-connection fault expressing itself through two metrics.
  - Fixing the connection pool cleanup will resolve both the connection exhaustion and the CPU saturation.
