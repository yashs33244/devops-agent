root_cause_category: healthy
equivalent_root_cause_categories:
  - storage_exhaustion
required_keywords:
  - autoscal
required_evidence_sources:
  - aws_rds_events
ruling_out_keywords:
  # "recovered" — agent must note the storage has recovered to a safe level
  # "autoscal" — agent must attribute the resolution to storage autoscaling
  # "no active" — agent must conclude there is no active failure at investigation time
  - recovered
  - autoscal
  - no active
optimal_trajectory:
  - query_grafana_logs
  - query_grafana_metrics
  - query_grafana_alert_rules
  - describe_rds_instance
  - describe_rds_events
max_investigation_loops: 4
model_response: |
  ROOT_CAUSE: No active failure. FreeStorageSpace dropped to ~3.5 GB at 15:11Z due to an order write burst, triggering storage autoscaling. The volume was expanded from 100 GB to 200 GB, completing at 15:13Z. By investigation time, FreeStorageSpace has recovered to ~200 GB and all metrics are within normal operating bounds. The alert fired during the brief storage pressure window and is now stale.
  ROOT_CAUSE_CATEGORY: healthy

  VALIDATED_CLAIMS:
  - FreeStorageSpace dropped from 30 GB to 3.5 GB between 15:00Z and 15:11Z, driven by a write burst reaching 8,100 WriteIOPS. [evidence: aws_cloudwatch_metrics]
  - RDS events confirm storage autoscaling was triggered at 15:08Z and completed at 15:13Z, expanding allocated storage from 100 GB to 200 GB. FreeStorageSpace jumped back to ~110 GB at 15:13Z. [evidence: aws_rds_events]
  - At investigation time (15:15Z onward), FreeStorageSpace shows 200 GB — the full post-expansion value — confirming the recovery is complete. No active storage pressure exists. [evidence: aws_cloudwatch_metrics]
  - CPUUtilization is at 18% — entirely normal for this instance class and workload pattern. There is no CPU saturation. [evidence: aws_cloudwatch_metrics]
  - DatabaseConnections are stable at 87-93 — well within normal range and not approaching any ceiling. There is no connection exhaustion. [evidence: aws_cloudwatch_metrics]
  - WriteLatency peaked at 21ms during the storage pressure window (15:08-15:12Z) and returned to 1ms baseline after autoscaling completed. No active latency issue remains. [evidence: aws_cloudwatch_metrics]
  - Performance Insights shows normal write workload (1.4 AAS on INSERT, IO:DataFileWrite dominant) with db_load of 0.7-0.8 AAS post-recovery — well within normal bounds. [evidence: aws_performance_insights]
  - ReplicaLag remained under 2 seconds throughout, peaking briefly at 2.1s during the write burst. No replication issue. [evidence: aws_cloudwatch_metrics]

  NON_VALIDATED_CLAIMS:
  - The write burst that triggered the storage pressure appears to be a normal order processing peak rather than a runaway process — the write rate returned to baseline without intervention.
  - Storage autoscaling threshold may benefit from a higher warning threshold or a pre-emptive increase to the allocation to avoid future alerts of this type.

  CAUSAL_CHAIN:
  - A write burst in order INSERT workload consumed ~27 GB of storage between 15:00Z and 15:11Z.
  - FreeStorageSpace fell below the autoscaling trigger threshold at 15:08Z.
  - RDS storage autoscaling expanded the volume from 100 GB to 200 GB, completing at 15:13Z.
  - The alert fired during the pressure window and is now stale — no active failure exists at investigation time.
  - All metrics (CPU, connections, latency, replica lag) are currently within normal operating bounds.
